<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osaka Tracker Tests</title>
<style>
body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: #0f1115; color: #f5f5f7; padding: 24px; }
h1 { margin-bottom: 8px; }
.muted { color: #8b8ea1; margin-bottom: 18px; }
.pass { color: #34d399; }
.fail { color: #ff4d6a; }
.test { padding: 4px 0; }
.summary { margin-top: 20px; font-size: 18px; font-weight: 700; padding: 12px 14px; border-radius: 8px; }
.summary.all-pass { background: rgba(52,211,153,0.12); color: #34d399; }
.summary.has-fail { background: rgba(255,77,106,0.12); color: #ff4d6a; }
iframe { width: 0; height: 0; border: 0; position: absolute; left: -9999px; }
</style>
</head>
<body>
<h1>Osaka Tracker Test Suite</h1>
<p class="muted">Loads the actual rebuilt tracker in a hidden iframe and asserts against its exported helpers.</p>
<div id="results"></div>
<div id="summary"></div>
<iframe id="tracker-frame" src="../index.html" title="tracker test frame"></iframe>
<script>
'use strict';

var passed = 0;
var failed = 0;
var results = [];

function assert(name, condition, detail) {
  if (condition) {
    passed += 1;
    results.push('<div class="test pass">✓ ' + name + '</div>');
  } else {
    failed += 1;
    results.push('<div class="test fail">✗ ' + name + (detail ? ' (' + detail + ')' : '') + '</div>');
  }
}

function assertEqual(name, actual, expected) {
  assert(name, actual === expected, 'got ' + JSON.stringify(actual) + ', expected ' + JSON.stringify(expected));
}

function renderResults() {
  document.getElementById('results').innerHTML = results.join('');
  var summary = document.getElementById('summary');
  summary.className = 'summary ' + (failed ? 'has-fail' : 'all-pass');
  summary.textContent = passed + ' passed, ' + failed + ' failed';
}

function run() {
  var frame = document.getElementById('tracker-frame');
  var win = frame.contentWindow;
  var api = win.OsakaTracker;
  var programs = win.PROGRAMS;
  win.localStorage.removeItem(api.STORAGE_KEY);
  win.localStorage.removeItem('valueAdvisorPrefs');
  win.localStorage.removeItem('osaka_household');

  assert('tracker API exported', !!api);
  assert('shared programs exported', !!programs);
  assertEqual('schema version is v3', api.SCHEMA_VERSION, 3);
  assertEqual('defaultData schema is v3', api.defaultData()._version, 3);

  assertEqual('sanitize strips script tags', api.sanitize('<scr' + 'ipt>alert(1)<' + '/script>'), 'alert(1)');
  assertEqual('sanitize strips nested tags', api.sanitize('Hello <b><i>world</i></b>'), 'Hello world');
  assertEqual('validateType accepts flexible', api.validateType('flexible'), 'flexible');
  assertEqual('validateType rejects invalid', api.validateType('crypto'), 'other');
  assertEqual('validateCurrency accepts miles', api.validateCurrency('miles'), 'miles');
  assertEqual('validateCurrency rejects invalid', api.validateCurrency('gold'), 'points');
  assertEqual('validateBalance negative becomes zero', api.validateBalance(-100), 0);
  assertEqual('validateBalance floors decimal', api.validateBalance(99.9), 99);
  assertEqual('validateCpp clamps and rounds', api.validateCpp(2.234), 2.23);

  var migrated = api.migrateData({
    accounts: [{ id: 'a1', program: 'Chase Ultimate Rewards', balance: 50000 }],
    benefits: []
  });
  assertEqual('migrateData upgrades to v3', migrated._version, 3);
  assertEqual('migrateData adds programSlug', migrated.accounts[0].programSlug, 'chase-ur');
  assertEqual('migrateData adds cards array', Array.isArray(migrated.accounts[0].cards), true);
  assertEqual('migrateData adds cpp', migrated.accounts[0].cpp, 2);

  var repaired = api.repairAccount({ program: 'World of Hyatt', balance: 120000, cards: [{ name: 'Card', annualFee: 95, earnRates: { dining: 3 } }] });
  assertEqual('repairAccount infers program slug', repaired.programSlug, 'hyatt-woh');
  assertEqual('repairAccount infers hotel type', repaired.type, 'hotel');
  assertEqual('repairAccount infers currency', repaired.currency, 'points');
  assertEqual('repairAccount keeps card array', repaired.cards.length, 1);
  assertEqual('calculateAccountValue uses cpp', api.calculateAccountValue({ balance: 85000, cpp: 2 }), 1700);
  assertEqual('calculateAnnualFeeTotal sums fees', api.calculateAnnualFeeTotal({ cards: [{ annualFee: 95 }, { annualFee: 550 }] }), 645);

  var programBySlug = api.getProgramBySlug('chase-ur');
  assertEqual('getProgramBySlug finds Chase', programBySlug.cpp, 2);
  assertEqual('getProgramByName exposes Hyatt cpp', api.getProgramByName('World of Hyatt').cpp, 2);

  var options = api.filterProgramOptions('chase');
  assert('filterProgramOptions finds Chase', options.some(function (item) { return item.slug === 'chase-ur'; }));
  assertEqual('filterProgramOptions keeps Custom last', options[options.length - 1].name, 'Custom');

  var importErrors = api.validateImport({ benefits: [] });
  assert('validateImport rejects missing accounts', importErrors.length > 0);

  var sanitized = api.sanitizeImport({
    _version: 2,
    accounts: [
      { id: 'a1', program: '<b>Delta SkyMiles</b>', type: 'airline', balance: 5000, currency: 'miles', notes: '<scr' + 'ipt>x</scr' + 'ipt>' }
    ],
    benefits: [
      { id: 'b1', cardId: 'a1', name: '<b>Lounge</b>', used: false },
      { id: 'b2', cardId: 'missing', name: 'Ghost', used: false }
    ]
  });
  assertEqual('sanitizeImport upgrades schema', sanitized._version, 3);
  assertEqual('sanitizeImport strips account html', sanitized.accounts[0].program, 'Delta SkyMiles');
  assertEqual('sanitizeImport strips notes html', sanitized.accounts[0].notes, 'x');
  assertEqual('sanitizeImport removes orphan benefit', sanitized.benefits.length, 1);
  assertEqual('sanitizeImport adds program slug', sanitized.accounts[0].programSlug, 'delta-sm');

  var benefit = api.repairBenefit({ name: 'Credit', used: 'truthy' });
  assert('repairBenefit creates id', typeof benefit.id === 'string');
  assertEqual('repairBenefit coerces used to boolean', benefit.used, true);

  var saved = api.defaultData();
  saved.accounts.push(api.repairAccount({
    id: 'acct-1',
    program: 'Chase Ultimate Rewards',
    programSlug: 'chase-ur',
    type: 'flexible',
    balance: 100000,
    currency: 'points',
    cpp: 2,
    cards: [programBySlug.cards[0]]
  }));
  saved.benefits.push(api.repairBenefit({ id: 'ben-1', cardId: 'acct-1', name: 'DoorDash credit', used: false }));
  api.saveData(saved);
  var loaded = api.loadData();
  assertEqual('save/load round trip keeps account', loaded.accounts[0].program, 'Chase Ultimate Rewards');
  assertEqual('save/load round trip keeps benefit', loaded.benefits[0].name, 'DoorDash credit');

  win.document.getElementById('account-program-manual').value = 'Custom Program';
  win.document.getElementById('account-type').value = 'other';
  win.document.getElementById('account-currency').value = 'points';
  win.document.getElementById('account-cpp').value = '1.5';
  win.document.getElementById('account-balance').value = '12000';
  win.document.getElementById('account-number').value = 'ABCD';
  win.document.getElementById('account-notes').value = 'Manual entry';
  api.collectAccountFormData();
  assertEqual('program picker input uses combobox role', win.document.getElementById('program-picker-input').getAttribute('role'), 'combobox');
  assertEqual('program picker references listbox', win.document.getElementById('program-picker-input').getAttribute('aria-controls'), 'program-picker-list');

  api.render();
  assert('rendered hero includes advisor link', win.document.getElementById('chart-card').textContent.indexOf('Open Value Advisor') >= 0);
  assert('rendered account card shows dollar approximation', win.document.getElementById('accounts-groups').textContent.indexOf('$2,000') >= 0);
  assert('rendered account detail toggle exists', !!win.document.querySelector('[data-toggle-account="acct-1"]'));

  var earnRates = api.formatEarnRates(programBySlug.cards[0]);
  assert('formatEarnRates exposes dining multiplier', earnRates.some(function (item) { return item.indexOf('dining') === 0; }));

  renderResults();
}

document.getElementById('tracker-frame').addEventListener('load', function () {
  setTimeout(run, 80);
});
</script>
</body>
</html>
