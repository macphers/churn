<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Churn Tracker Tests</title>
<style>
body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: #F5F2ED; color: #1A1A1A; padding: 24px; }
h1 { margin-bottom: 8px; }
.muted { color: #6B6560; margin-bottom: 18px; }
.pass { color: #2D7A4F; }
.fail { color: #A63D40; }
.test { padding: 4px 0; }
.summary { margin-top: 20px; font-size: 18px; font-weight: 700; padding: 12px 14px; border-radius: 8px; }
.summary.all-pass { background: rgba(45,122,79,0.12); color: #2D7A4F; }
.summary.has-fail { background: rgba(166,61,64,0.12); color: #A63D40; }
iframe { width: 0; height: 0; border: 0; position: absolute; left: -9999px; }
</style>
</head>
<body>
<h1>Churn Tracker Test Suite</h1>
<p class="muted">Loads the actual rebuilt tracker in a hidden iframe and asserts against its exported helpers.</p>
<div id="results"></div>
<div id="summary"></div>
<iframe id="tracker-frame" src="../index.html" title="tracker test frame"></iframe>
<script>
'use strict';

var passed = 0;
var failed = 0;
var results = [];

function assert(name, condition, detail) {
  if (condition) {
    passed += 1;
    results.push('<div class="test pass">✓ ' + name + '</div>');
  } else {
    failed += 1;
    results.push('<div class="test fail">✗ ' + name + (detail ? ' (' + detail + ')' : '') + '</div>');
  }
}

function assertEqual(name, actual, expected) {
  assert(name, actual === expected, 'got ' + JSON.stringify(actual) + ', expected ' + JSON.stringify(expected));
}

function renderResults() {
  document.getElementById('results').innerHTML = results.join('');
  var summary = document.getElementById('summary');
  summary.className = 'summary ' + (failed ? 'has-fail' : 'all-pass');
  summary.textContent = passed + ' passed, ' + failed + ' failed';
}

function run() {
  var frame = document.getElementById('tracker-frame');
  var win = frame.contentWindow;
  var api = win.ChurnTracker;
  var programs = win.PROGRAMS;
  win.localStorage.removeItem(api.STORAGE_KEY);
  win.localStorage.removeItem('valueAdvisorPrefs');
  win.localStorage.removeItem('churn_household');

  assert('tracker API exported', !!api);
  assert('shared programs exported', !!programs);
  assertEqual('schema version is v3', api.SCHEMA_VERSION, 3);
  assertEqual('defaultData schema is v3', api.defaultData()._version, 3);

  assertEqual('sanitize strips script tags and content', api.sanitize('<scr' + 'ipt>alert(1)<' + '/script>'), '');
  assertEqual('sanitize strips nested tags', api.sanitize('Hello <b><i>world</i></b>'), 'Hello world');
  assertEqual('validateType accepts flexible', api.validateType('flexible'), 'flexible');
  assertEqual('validateType rejects invalid', api.validateType('crypto'), 'other');
  assertEqual('validateCurrency accepts miles', api.validateCurrency('miles'), 'miles');
  assertEqual('validateCurrency rejects invalid', api.validateCurrency('gold'), 'points');
  assertEqual('validateBalance negative becomes zero', api.validateBalance(-100), 0);
  assertEqual('validateBalance floors decimal', api.validateBalance(99.9), 99);
  assertEqual('validateCpp clamps and rounds', api.validateCpp(2.234), 2.23);

  var migrated = api.migrateData({
    accounts: [{ id: 'a1', program: 'Chase Ultimate Rewards', balance: 50000 }],
    benefits: []
  });
  assertEqual('migrateData upgrades to v3', migrated._version, 3);
  assertEqual('migrateData adds programSlug', migrated.accounts[0].programSlug, 'chase-ur');
  assertEqual('migrateData adds cards array', Array.isArray(migrated.accounts[0].cards), true);
  assertEqual('migrateData adds cpp', migrated.accounts[0].cpp, 2);

	  var repaired = api.repairAccount({ program: 'World of Hyatt', balance: 120000, cards: [{ name: 'Card', annualFee: 95, earnRates: { dining: 3 } }] });
	  assertEqual('repairAccount infers program slug', repaired.programSlug, 'hyatt-woh');
	  assertEqual('repairAccount infers hotel type', repaired.type, 'hotel');
	  assertEqual('repairAccount infers currency', repaired.currency, 'points');
	  assertEqual('repairAccount keeps card array', repaired.cards.length, 1);
	  assertEqual('repairAccount seeds last activity date', repaired.lastActivityDate, repaired.lastUpdated);
	  assertEqual('calculateAccountValue uses cpp', api.calculateAccountValue({ balance: 85000, cpp: 2 }), 1700);
	  assertEqual('calculateAnnualFeeTotal sums fees', api.calculateAnnualFeeTotal({ cards: [{ annualFee: 95 }, { annualFee: 550 }] }), 645);

  var programBySlug = api.getProgramBySlug('chase-ur');
  assertEqual('getProgramBySlug finds Chase', programBySlug.cpp, 2);
  assertEqual('getProgramByName exposes Hyatt cpp', api.getProgramByName('World of Hyatt').cpp, 2);

  var options = api.filterProgramOptions('chase');
  assert('filterProgramOptions finds Chase', options.some(function (item) { return item.slug === 'chase-ur'; }));
  assertEqual('filterProgramOptions keeps Custom last', options[options.length - 1].name, 'Custom');

  var importErrors = api.validateImport({ benefits: [] });
  assert('validateImport rejects missing accounts', importErrors.length > 0);

  var sanitized = api.sanitizeImport({
    _version: 2,
    accounts: [
      { id: 'a1', program: '<b>Delta SkyMiles</b>', type: 'airline', balance: 5000, currency: 'miles', notes: '<scr' + 'ipt>x</scr' + 'ipt>' }
    ],
    benefits: [
      { id: 'b1', cardId: 'a1', name: '<b>Lounge</b>', used: false },
      { id: 'b2', cardId: 'missing', name: 'Ghost', used: false }
    ]
  });
  assertEqual('sanitizeImport upgrades schema', sanitized._version, 3);
  assertEqual('sanitizeImport strips account html', sanitized.accounts[0].program, 'Delta SkyMiles');
  assertEqual('sanitizeImport strips script tags and content from notes', sanitized.accounts[0].notes, '');
  assertEqual('sanitizeImport removes orphan benefit', sanitized.benefits.length, 1);
  assertEqual('sanitizeImport adds program slug', sanitized.accounts[0].programSlug, 'delta-sm');

  var benefit = api.repairBenefit({ name: 'Credit', used: 'truthy' });
  assert('repairBenefit creates id', typeof benefit.id === 'string');
  assertEqual('repairBenefit coerces used to boolean', benefit.used, true);

  var saved = api.defaultData();
  saved.accounts.push(api.repairAccount({
    id: 'acct-1',
    program: 'Chase Ultimate Rewards',
    programSlug: 'chase-ur',
    type: 'flexible',
    balance: 100000,
    currency: 'points',
    cpp: 2,
    cards: [programBySlug.cards[0]]
  }));
	  saved.benefits.push(api.repairBenefit({ id: 'ben-1', cardId: 'acct-1', name: 'DoorDash credit', used: false }));
	  api.saveData(saved);
	  var loaded = api.loadData();
	  assertEqual('save/load round trip keeps account', loaded.accounts[0].program, 'Chase Ultimate Rewards');
	  assertEqual('save/load round trip keeps benefit', loaded.benefits[0].name, 'DoorDash credit');
	  win.localStorage.setItem('valueAdvisorResults', JSON.stringify({ portfolio: [{ program: 'Chase Ultimate Rewards', balance: 100000 }], verdict: { title: 'Cached' } }));
	  api.saveData(saved);
	  assertEqual('saveData clears cached advisor results', win.localStorage.getItem('valueAdvisorResults'), null);
	  win.localStorage.setItem('valueAdvisorResults', JSON.stringify({ portfolio: [{ program: 'Some Other Program', balance: 999 }], verdict: { title: 'Stale' } }));
	  assertEqual('readAdvisorResults rejects stale portfolio mismatch', api.readAdvisorResults(api.loadData()), null);
	  win.localStorage.setItem('valueAdvisorResults', JSON.stringify({ portfolio: [{ program: 'Chase Ultimate Rewards', balance: 100000 }], verdict: { title: 'Fresh' } }));
	  assert('readAdvisorResults accepts matching portfolio', !!api.readAdvisorResults(api.loadData()));

	  win.document.getElementById('account-program-manual').value = 'Custom Program';
	  win.document.getElementById('account-type').value = 'other';
	  win.document.getElementById('account-currency').value = 'points';
	  win.document.getElementById('account-cpp').value = '1.5';
	  win.document.getElementById('account-balance').value = '12000';
	  win.document.getElementById('account-last-activity').value = '2026-02-14';
	  win.document.getElementById('account-number').value = 'ABCD';
	  win.document.getElementById('account-notes').value = 'Manual entry';
	  var collected = api.collectAccountFormData();
	  assertEqual('collectAccountFormData includes last activity date', collected.lastActivityDate, '2026-02-14');
	  assertEqual('program picker input uses combobox role', win.document.getElementById('program-picker-input').getAttribute('role'), 'combobox');
	  assertEqual('program picker references listbox', win.document.getElementById('program-picker-input').getAttribute('aria-controls'), 'program-picker-list');
	  var expiration = api.getExpirationRisk({ program: 'United MileagePlus', lastUpdated: '2026-03-20', lastActivityDate: '2024-10-01' });
	  assert('getExpirationRisk prefers last activity date over lastUpdated', !!expiration && typeof expiration.label === 'string' && expiration.label.indexOf('Expires') === 0);

  api.render();
  assert('rendered hero includes advisor link', win.document.getElementById('chart-card').textContent.indexOf('Open Value Advisor') >= 0);
  assert('rendered account card shows dollar approximation', win.document.getElementById('accounts-groups').textContent.indexOf('$2,000') >= 0);
  assert('rendered account detail toggle exists', !!win.document.querySelector('[data-toggle-account="acct-1"]'));

  var earnRates = api.formatEarnRates(programBySlug.cards[0]);
  assert('formatEarnRates exposes dining multiplier', earnRates.some(function (item) { return item.indexOf('dining') === 0; }));

  // ── deleteAccount with cascade ────────────────────────────────────────────
  (function () {
    var data = api.defaultData();
    data.accounts.push(api.repairAccount({
      id: 'del-acct-1',
      program: 'Chase Ultimate Rewards',
      programSlug: 'chase-ur',
      type: 'flexible',
      balance: 50000,
      currency: 'points',
      cpp: 2,
      cards: []
    }));
    data.benefits.push(api.repairBenefit({ id: 'del-ben-1', cardId: 'del-acct-1', name: 'Lounge Pass', used: false }));
    api.saveData(data);
    var before = api.loadData();
    assertEqual('deleteAccount cascade setup: 1 account', before.accounts.length, 1);
    assertEqual('deleteAccount cascade setup: 1 benefit', before.benefits.length, 1);
    // Simulate deleteAccount without confirm: filter out the account and its linked benefits
    var after = api.loadData();
    after.accounts = after.accounts.filter(function (a) { return a.id !== 'del-acct-1'; });
    after.benefits = after.benefits.filter(function (b) { return b.cardId !== 'del-acct-1'; });
    api.saveData(after);
    var result = api.loadData();
    assertEqual('deleteAccount removes account', result.accounts.length, 0);
    assertEqual('deleteAccount removes linked benefit', result.benefits.length, 0);
    api.saveData(api.defaultData());
  }());

  // ── deleteBenefit ─────────────────────────────────────────────────────────
  (function () {
    var data = api.defaultData();
    data.accounts.push(api.repairAccount({
      id: 'del-acct-2',
      program: 'World of Hyatt',
      programSlug: 'hyatt-woh',
      type: 'hotel',
      balance: 30000,
      currency: 'points',
      cpp: 2,
      cards: []
    }));
    data.benefits.push(api.repairBenefit({ id: 'del-ben-2', cardId: 'del-acct-2', name: 'Free Night Award', used: false }));
    api.saveData(data);
    var before = api.loadData();
    assertEqual('deleteBenefit setup: 1 benefit exists', before.benefits.length, 1);
    // Simulate deleteBenefit without confirm: filter out the benefit
    var after = api.loadData();
    after.benefits = after.benefits.filter(function (b) { return b.id !== 'del-ben-2'; });
    api.saveData(after);
    var result = api.loadData();
    assertEqual('deleteBenefit removes the benefit', result.benefits.length, 0);
    assertEqual('deleteBenefit leaves account intact', result.accounts.length, 1);
    api.saveData(api.defaultData());
  }());

  // ── toggleBenefit ─────────────────────────────────────────────────────────
  (function () {
    var data = api.defaultData();
    data.accounts.push(api.repairAccount({
      id: 'tog-acct-1',
      program: 'Delta SkyMiles',
      programSlug: 'delta-sm',
      type: 'airline',
      balance: 20000,
      currency: 'miles',
      cpp: 1.2,
      cards: []
    }));
    data.benefits.push(api.repairBenefit({ id: 'tog-ben-1', cardId: 'tog-acct-1', name: 'Companion Certificate', used: false }));
    api.saveData(data);
    // First toggle: false → true
    var d1 = api.loadData();
    var b1 = d1.benefits.find(function (b) { return b.id === 'tog-ben-1'; });
    b1.used = !b1.used;
    api.saveData(d1);
    var after1 = api.loadData();
    var toggled1 = after1.benefits.find(function (b) { return b.id === 'tog-ben-1'; });
    assertEqual('toggleBenefit false→true', toggled1.used, true);
    // Second toggle: true → false
    var d2 = api.loadData();
    var b2 = d2.benefits.find(function (b) { return b.id === 'tog-ben-1'; });
    b2.used = !b2.used;
    api.saveData(d2);
    var after2 = api.loadData();
    var toggled2 = after2.benefits.find(function (b) { return b.id === 'tog-ben-1'; });
    assertEqual('toggleBenefit true→false', toggled2.used, false);
    api.saveData(api.defaultData());
  }());

  // ── Profile save/load ─────────────────────────────────────────────────────
  (function () {
    var data = api.defaultData();
    data.profile = {
      homeAirport: 'LAX',
      preferredAlliances: ['Star Alliance', 'Oneworld'],
      travelPreferences: {
        regions: ['North America', 'Europe'],
        classPreference: 'business'
      }
    };
    api.saveData(data);
    var loaded = api.loadData();
    assertEqual('profile save/load homeAirport', loaded.profile.homeAirport, 'LAX');
    assertEqual('profile save/load classPreference', loaded.profile.travelPreferences.classPreference, 'business');
    assert('profile save/load preferredAlliances includes Star Alliance', loaded.profile.preferredAlliances.indexOf('Star Alliance') >= 0);
    assert('profile save/load regions includes Europe', loaded.profile.travelPreferences.regions.indexOf('Europe') >= 0);
    api.saveData(api.defaultData());
  }());

  // ── exportData format ─────────────────────────────────────────────────────
  (function () {
    api.saveData(api.defaultData());
    var exported = api.loadData();
    assert('exportData structure has _version', '_version' in exported);
    assert('exportData structure has accounts', 'accounts' in exported);
    assert('exportData structure has benefits', 'benefits' in exported);
    assert('exportData structure has profile', 'profile' in exported);
    api.saveData(api.defaultData());
  }());

  // ── importData validation ─────────────────────────────────────────────────
  (function () {
    var missingAccounts = api.validateImport({ benefits: [] });
    assert('validateImport rejects missing accounts array', missingAccounts.length > 0);

    var missingBenefits = api.validateImport({ accounts: [] });
    assert('validateImport rejects missing benefits array', missingBenefits.length > 0);

    var missingAccountId = api.validateImport({
      accounts: [{ program: 'Delta SkyMiles', balance: 5000 }],
      benefits: []
    });
    assert('validateImport rejects account missing id', missingAccountId.some(function (e) { return e.indexOf('missing id') >= 0; }));

    var missingBenefitId = api.validateImport({
      accounts: [{ id: 'a1', program: 'Delta SkyMiles', balance: 5000 }],
      benefits: [{ name: 'Lounge' }]
    });
    assert('validateImport rejects benefit missing id', missingBenefitId.some(function (e) { return e.indexOf('missing id') >= 0; }));
  }());

  // ── Custom card add/normalize ─────────────────────────────────────────────
  (function () {
    var data = api.defaultData();
    data.accounts.push(api.repairAccount({
      id: 'cust-acct-1',
      program: 'My Custom Program',
      type: 'other',
      balance: 15000,
      currency: 'points',
      cpp: 1.5,
      cards: [{
        name: 'My Custom Card',
        annualFee: 120,
        earnRates: { dining: 3, travel: 2, other: 1 },
        custom: true
      }]
    }));
    api.saveData(data);
    var loaded = api.loadData();
    var acct = loaded.accounts.find(function (a) { return a.id === 'cust-acct-1'; });
    assert('custom card persists after save/load', acct && acct.cards.length === 1);
    assert('custom card custom flag preserved', acct && acct.cards[0].custom === true);
    assertEqual('custom card name preserved', acct && acct.cards[0].name, 'My Custom Card');
    assertEqual('custom card annualFee preserved', acct && acct.cards[0].annualFee, 120);
    assert('custom card earn rates normalized', acct && acct.cards[0].earnRates && acct.cards[0].earnRates.dining === 3);
    api.saveData(api.defaultData());
  }());

  // ── Staleness & Refresh Tests ──────────────────────────────────

  // getStaleness: fresh flexible account (updated today)
  var freshFlexible = { program: 'Chase Ultimate Rewards', lastUpdated: new Date().toISOString().split('T')[0] };
  assertEqual('getStaleness fresh flexible returns fresh', api.getStaleness(freshFlexible).level, 'fresh');

  // getStaleness: aging flexible account (35 days old)
  var agingDate = new Date(Date.now() - 35 * 86400000).toISOString().split('T')[0];
  var agingFlexible = { program: 'Chase Ultimate Rewards', lastUpdated: agingDate };
  assertEqual('getStaleness aging flexible returns aging', api.getStaleness(agingFlexible).level, 'aging');

  // getStaleness: stale flexible account (65 days old)
  var staleDate = new Date(Date.now() - 65 * 86400000).toISOString().split('T')[0];
  var staleFlexible = { program: 'Chase Ultimate Rewards', lastUpdated: staleDate };
  assertEqual('getStaleness stale flexible returns stale', api.getStaleness(staleFlexible).level, 'stale');

  // getStaleness: fresh airline (updated 5 days ago)
  var freshAirlineDate = new Date(Date.now() - 5 * 86400000).toISOString().split('T')[0];
  var freshAirline = { program: 'Delta SkyMiles', lastUpdated: freshAirlineDate };
  assertEqual('getStaleness fresh airline returns fresh', api.getStaleness(freshAirline).level, 'fresh');

  // getStaleness: aging airline (18 days old — past 14d threshold)
  var agingAirlineDate = new Date(Date.now() - 18 * 86400000).toISOString().split('T')[0];
  var agingAirline = { program: 'Delta SkyMiles', lastUpdated: agingAirlineDate };
  assertEqual('getStaleness aging airline returns aging', api.getStaleness(agingAirline).level, 'aging');

  // getStaleness: stale hotel (35 days old — past 30d threshold)
  var staleHotelDate = new Date(Date.now() - 35 * 86400000).toISOString().split('T')[0];
  var staleHotel = { program: 'Marriott Bonvoy', lastUpdated: staleHotelDate };
  assertEqual('getStaleness stale hotel returns stale', api.getStaleness(staleHotel).level, 'stale');

  // getStaleness: missing lastUpdated → stale
  var noDate = { program: 'Chase Ultimate Rewards' };
  assertEqual('getStaleness missing date returns stale', api.getStaleness(noDate).level, 'stale');

  // getStaleness: invalid lastUpdated → stale
  var badDate = { program: 'Chase Ultimate Rewards', lastUpdated: 'not-a-date' };
  assertEqual('getStaleness invalid date returns stale', api.getStaleness(badDate).level, 'stale');

  // getStaleness: boundary — exactly 14 days for airline (should be aging, not fresh)
  var boundary14 = new Date(Date.now() - 14 * 86400000).toISOString().split('T')[0];
  var boundaryAirline = { program: 'United MileagePlus', lastUpdated: boundary14 };
  assertEqual('getStaleness airline at 14d boundary returns aging', api.getStaleness(boundaryAirline).level, 'aging');

  // getStaleness: boundary — exactly 30 days for flexible (should be aging, not fresh)
  var boundary30 = new Date(Date.now() - 30 * 86400000).toISOString().split('T')[0];
  var boundaryFlexible = { program: 'American Express Membership Rewards', lastUpdated: boundary30 };
  assertEqual('getStaleness flexible at 30d boundary returns aging', api.getStaleness(boundaryFlexible).level, 'aging');

  // getLoginUrl: known program returns URL
  var chaseAccount = { program: 'Chase Ultimate Rewards' };
  assert('getLoginUrl returns URL for Chase', api.getLoginUrl(chaseAccount) !== null);
  assert('getLoginUrl Chase URL contains chase', api.getLoginUrl(chaseAccount).indexOf('chase') >= 0);

  // getLoginUrl: custom program returns null
  var customAccount = { program: 'My Custom Program' };
  assertEqual('getLoginUrl returns null for custom program', api.getLoginUrl(customAccount), null);

  // getStalenessText: returns formatted label
  var textAccount = { program: 'Chase Ultimate Rewards', lastUpdated: new Date().toISOString().split('T')[0] };
  var stalenessText = api.getStalenessText(textAccount);
  assert('getStalenessText includes Fresh', stalenessText.indexOf('Fresh') >= 0);
  assert('getStalenessText includes separator', stalenessText.indexOf('\u00b7') >= 0);

  // countStale: counts correctly
  var testData = api.defaultData();
  testData.accounts = [
    api.repairAccount({ program: 'Chase Ultimate Rewards', balance: 100000, lastUpdated: new Date().toISOString().split('T')[0] }),
    api.repairAccount({ program: 'Delta SkyMiles', balance: 50000, lastUpdated: staleDate }),
    api.repairAccount({ program: 'Marriott Bonvoy', balance: 80000, lastUpdated: agingDate })
  ];
  var counts = api.countStale(testData);
  assert('countStale identifies stale accounts', counts.stale >= 1);
  assert('countStale needsRefresh sums stale + aging', counts.needsRefresh === counts.stale + counts.aging);

  // Rendered output: staleness label appears in account card
  api.saveData(testData);
  api.render();
  var accountsHtml = win.document.getElementById('accounts-groups').innerHTML;
  assert('rendered account card has staleness-label class', accountsHtml.indexOf('staleness-label') >= 0);
  assert('rendered account card has staleness-dot class', accountsHtml.indexOf('staleness-dot') >= 0);

  // Rendered output: hero contains/hides staleness CTA
  var heroHtml = win.document.getElementById('hero-card').innerHTML;
  assert('rendered hero shows refresh CTA when stale accounts exist', heroHtml.indexOf('need') >= 0 || heroHtml.indexOf('refresh') >= 0);

  // Nav refresh button exists and has stale state
  var navBtn = win.document.getElementById('nav-refresh-btn');
  assert('nav refresh button exists', !!navBtn);
  assert('nav refresh button has has-stale class when stale', navBtn.classList.contains('has-stale'));

  // Refresh modal exists
  assert('refresh modal element exists', !!win.document.getElementById('refresh-modal'));

  renderResults();
}

document.getElementById('tracker-frame').addEventListener('load', function () {
  setTimeout(run, 80);
});
</script>
</body>
</html>
