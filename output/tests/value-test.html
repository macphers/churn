<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Churn Advisor Tests</title>
<style>
body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: #F5F2ED; color: #1A1A1A; padding: 24px; }
h1 { margin-bottom: 8px; }
.muted { color: #6B6560; margin-bottom: 18px; }
.pass { color: #2D7A4F; }
.fail { color: #A63D40; }
.test { padding: 4px 0; }
.summary { margin-top: 20px; font-size: 18px; font-weight: 700; padding: 12px 14px; border-radius: 8px; }
.summary.all-pass { background: rgba(45,122,79,0.12); color: #2D7A4F; }
.summary.has-fail { background: rgba(166,61,64,0.12); color: #A63D40; }
iframe { width: 0; height: 0; border: 0; position: absolute; left: -9999px; }
</style>
</head>
<body>
<h1>Churn Advisor Test Suite</h1>
<p class="muted">Loads the actual advisor page, then asserts against the exported scoring helpers and rendered UI.</p>
<div id="results"></div>
<div id="summary"></div>
<iframe id="advisor-frame" src="../value.html" title="advisor test frame"></iframe>
<script>
'use strict';

var passed = 0;
var failed = 0;
var results = [];

function assert(name, condition, detail) {
  if (condition) {
    passed += 1;
    results.push('<div class="test pass">✓ ' + name + '</div>');
  } else {
    failed += 1;
    results.push('<div class="test fail">✗ ' + name + (detail ? ' (' + detail + ')' : '') + '</div>');
  }
}

function assertEqual(name, actual, expected) {
  assert(name, actual === expected, 'got ' + JSON.stringify(actual) + ', expected ' + JSON.stringify(expected));
}

function renderResults() {
  document.getElementById('results').innerHTML = results.join('');
  var summary = document.getElementById('summary');
  summary.className = 'summary ' + (failed ? 'has-fail' : 'all-pass');
  summary.textContent = passed + ' passed, ' + failed + ' failed';
}

function makeFetch(payload) {
  return function () {
    return Promise.resolve({
      ok: true,
      json: function () { return Promise.resolve(payload); }
    });
  };
}

function findAccountCard(doc, programName) {
  var cards = doc.querySelectorAll('.account-card');
  for (var i = 0; i < cards.length; i++) {
    var name = cards[i].querySelector('.account-name');
    if (name && name.textContent.indexOf(programName) >= 0) return cards[i];
  }
  return null;
}

async function run() {
  var frame = document.getElementById('advisor-frame');
  var win = frame.contentWindow;
  var api = win.ChurnAdvisor;
  var sweetSpotsStub = {
    flights: [
      {
        id: 'united-hawaii',
        destination: 'Hawaii',
        route: 'US → Hawaii',
        cabin: 'economy',
        direction: 'round_trip',
        program: 'United MileagePlus',
        points_required: 22500,
        caveat: 'Saver award availability.',
        cpp_estimate: 2.2
      }
    ],
    hotels: [
      {
        id: 'hyatt-nyc',
        destination: 'Park Hyatt New York',
        region: 'domestic-us',
        category: 8,
        nights: 2,
        program: 'World of Hyatt',
        points_required: 60000,
        caveat: 'Premium city hotel redemption.',
        cpp_estimate: 2.7
      }
    ]
  };
  var baseData = {
    _version: 3,
    accounts: [
      {
        id: 'acct-1',
        program: 'Chase Ultimate Rewards',
        programSlug: 'chase-ur',
        type: 'flexible',
        balance: 90000,
        currency: 'points',
        cpp: 2,
        lastUpdated: '2026-02-01'
      },
      {
        id: 'acct-2',
        program: 'United MileagePlus',
        programSlug: 'united-mp',
        type: 'airline',
        balance: 40000,
        currency: 'miles',
        cpp: 1.4,
        lastUpdated: '2024-10-01'
      },
      {
        id: 'acct-3',
        program: 'Local Rewards',
        type: 'other',
        balance: 15000,
        currency: 'points',
        cpp: 1,
        lastUpdated: '2026-02-10'
      }
    ],
    benefits: [],
    profile: {
      homeAirport: 'SFO',
      preferredAlliances: ['Star Alliance'],
      travelPreferences: { regions: ['Asia'], classPreference: 'business' }
    }
  };

  win.localStorage.setItem('churn_data', JSON.stringify(baseData));
  win.localStorage.removeItem('valueAdvisorPrefs');
  win.localStorage.removeItem('churn_household');
  win.localStorage.removeItem('valueAdvisorResults');

  assert('advisor API exported', !!api);
  if (!api) {
    renderResults();
    return;
  }
  await api.loadSweetSpots(makeFetch(sweetSpotsStub), true);
  assert('advisor nav has refresh button', !!win.document.getElementById('nav-refresh-btn'));
  assert('advisor nav has export button', !!win.document.getElementById('nav-export-btn'));
  var defaultPrefs = api.readPrefs();
  assertEqual('auto-detect picks expiring for expiring account', defaultPrefs.mode, 'expiring');
  assertEqual('default prefs travel enabled', defaultPrefs.interestedInTravel, true);

  api.savePrefs({ wtpCaps: { economy: 450 } });
  var mergedPrefs = api.readPrefs();
  assertEqual('prefs merge keeps default business cap', mergedPrefs.wtpCaps.business, 2500);
  assertEqual('prefs merge overrides economy cap', mergedPrefs.wtpCaps.economy, 450);

  api.savePrefs({ cabinPref: 'first', interestedInTravel: true });
  var luxuryPrefs = api.readPrefs();
  assertEqual('auto-detect resolves luxury for premium prefs', luxuryPrefs.mode, 'luxury');

  api.savePrefs({ interestedInTravel: false });
  var noTravelPrefs = api.readPrefs();
  assertEqual('auto-detect resolves no_travel when travel is off', noTravelPrefs.mode, 'no_travel');

  api.savePrefs({ interestedInTravel: true, complexityTolerance: 'low' });
  var simplePrefs = api.readPrefs();
  assertEqual('auto-detect resolves simple for low complexity', simplePrefs.mode, 'simple');

  assertEqual('applyWTP below cap unchanged', api.applyWTP(400, 'economy', defaultPrefs), 400);
  assert('applyWTP above cap discounted', api.applyWTP(4000, 'business', defaultPrefs) < 4000);
  assertEqual('applyWTP resort uses hotel cap', api.applyWTP(900, 'resort', defaultPrefs), 835);

  assert('calcNetCpp penalizes high surcharges', api.calcNetCpp(50000, 2.5, { surcharges: 'high', availability: 'low', flexibility: 'medium' }) < 2.5);
  assert('calcNetCpp keeps low-surcharge close to best cpp', api.calcNetCpp(50000, 2.0, { surcharges: 'low', availability: 'high', flexibility: 'high' }) > 1.9);

  var simpleRank = api.rankByMode([
    { baseScore: 60, liftRatio: 0.2, kind: 'fallback', isSimple: true, isNonTravel: true, surcharges: 'low', availability: 'high', flexibility: 'high', complexity: 'low', cabinType: 'cash' },
    { baseScore: 70, liftRatio: 0.3, kind: 'transfer_partner', isSimple: false, isNonTravel: false, surcharges: 'medium', availability: 'medium', flexibility: 'medium', complexity: 'high', cabinType: 'business' }
  ], 'simple');
  assertEqual('simple mode prefers simple option', simpleRank[0].kind, 'fallback');

  var luxuryRank = api.rankByMode([
    { baseScore: 70, liftRatio: 0.2, kind: 'fallback', isSimple: true, isNonTravel: false, surcharges: 'low', availability: 'high', flexibility: 'high', complexity: 'low', cabinType: 'economy' },
    { baseScore: 68, liftRatio: 0.1, kind: 'transfer_partner', isSimple: false, isNonTravel: false, surcharges: 'medium', availability: 'medium', flexibility: 'medium', complexity: 'medium', cabinType: 'first' }
  ], 'luxury');
  assertEqual('luxury mode prefers premium cabin', luxuryRank[0].cabinType, 'first');

  var noTravelRank = api.rankByMode([
    { baseScore: 60, liftRatio: 0.1, kind: 'fallback', isSimple: true, isNonTravel: true, surcharges: 'low', availability: 'high', flexibility: 'high', complexity: 'low', cabinType: 'cash' },
    { baseScore: 72, liftRatio: 0.4, kind: 'transfer_partner', isSimple: false, isNonTravel: false, surcharges: 'low', availability: 'medium', flexibility: 'medium', complexity: 'medium', cabinType: 'business' }
  ], 'no_travel');
  assertEqual('no travel mode prefers non-travel option', noTravelRank[0].kind, 'fallback');

	  assertEqual('checkExpiration ignores non-expiring Delta', api.checkExpiration({ program: 'Delta SkyMiles', lastUpdated: '2026-01-01' }), null);
	  var exp = api.checkExpiration({ program: 'United MileagePlus', lastUpdated: '2024-10-01' });
	  assert('checkExpiration flags at-risk account', !!exp && exp.atRisk);
	  var expFromActivity = api.checkExpiration({ program: 'United MileagePlus', lastUpdated: '2026-03-20', lastActivityDate: '2024-10-01' });
	  assert('checkExpiration prefers lastActivityDate when present', !!expFromActivity && expFromActivity.atRisk);

  var program = api.findProgram('Chase Ultimate Rewards');
  assertEqual('findProgram by name returns chase slug', program.slug, 'chase-ur');
  assertEqual('findProgram by slug returns hyatt', api.findProgram(null, 'hyatt-woh').slug, 'hyatt-woh');

  assertEqual('default household is empty array', api.readHousehold().length, 0);
  api.saveHousehold([{ memberName: 'Alex', program: 'Chase Ultimate Rewards', programSlug: 'chase-ur', balance: 25000, currency: 'points', type: 'flexible' }]);
  assertEqual('household round trip count', api.readHousehold().length, 1);
  assertEqual('household round trip slug', api.readHousehold()[0].programSlug, 'chase-ur');
  assertEqual('scoreLabel humanizes high scores', api.scoreLabel(91), 'Very strong fit');
  assertEqual('scoreLabel humanizes mid scores', api.scoreLabel(76), 'Good fit');

  api.savePrefs({ mode: 'max_value', interestedInTravel: true });
  var analysis = api.buildAnalysis(baseData, api.readPrefs(), api.readHousehold());
  assert('buildAnalysis finds active accounts', analysis.activeAccounts.length === 3);
  assert('buildAnalysis total best beats floor', analysis.totalBest > analysis.totalFloor);
  assert('buildAnalysis produces best overall', !!analysis.bestOverall);
  assert('buildAnalysis finds sweet spots', analysis.sweetSpots.length > 0);
  assertEqual('buildAnalysis carries household boost', analysis.activeAccounts[0].householdBalance, 25000);
  assertEqual('buildAnalysis keeps surface mode after legacy max_value', analysis.prefs.surfaceMode, 'stretch_value');

  api.savePrefs({ mode: 'no_travel', interestedInTravel: false });
  var noTravelAnalysis = api.buildAnalysis(baseData, api.readPrefs(), api.readHousehold());
  assert('no-travel analysis chooses fallback-style best option', noTravelAnalysis.activeAccounts[0].bestOption.kind === 'fallback');

  var scored = api.scoreBFB({
    adjustedValue: 1800,
    rawValue: 2000,
    kind: 'transfer_partner',
    type: 'transfer_partner',
    surcharges: 'medium',
    availability: 'medium',
    flexibility: 'high',
    complexity: 'medium',
    cabinType: 'business',
    householdBalance: 0,
    isSimple: false,
    isNonTravel: false,
    urgencyBoost: 0
  }, { adjustedValue: 1200 }, api.readPrefs(), 'max_value');
  assert('scoreBFB returns finite base score', isFinite(scored.baseScore));

  api.savePrefs({ mode: 'expiring', interestedInTravel: true });
  assertEqual('detectAutoMode picks expiring for expiring prefs', api.readPrefs().mode, 'expiring');
  var expiringAnalysis = api.buildAnalysis(baseData, api.readPrefs(), api.readHousehold());
  assert('expiring mode still produces best option', !!expiringAnalysis.activeAccounts[1].bestOption);

  var results = api.writeAgentResults(baseData, api.readPrefs());
  assertEqual('writeAgentResults stores mode', results.mode, 'expiring');
  assert('writeAgentResults stores totals', results.totals.best > 0);
  assert('writeAgentResults stores verdict payload', !!results.verdict && typeof results.verdict.title === 'string' && results.verdict.title.length > 0);
  assert('writeAgentResults stores verdict summary', typeof results.verdict.summary === 'string' && results.verdict.summary === results.verdict.title);
  assert('writeAgentResults stores verdict state', typeof results.verdict.state === 'string');
  assert('valueAdvisorResults stored in localStorage', !!win.localStorage.getItem('valueAdvisorResults'));

  win.localStorage.setItem('churn_data', '{broken json');
  assertEqual('readRewardsData returns corrupted sentinel', api.readRewardsData(), 'corrupted');
  win.localStorage.setItem('churn_data', JSON.stringify(baseData));

  api.render();
  assert('render produces no mode tabs (removed)', win.document.querySelectorAll('[data-mode]').length === 0);
  assert('render produces verdict line', win.document.getElementById('app').textContent.indexOf('Best opportunity') >= 0 || win.document.getElementById('app').textContent.indexOf('expiring') >= 0);
  assert('render produces freshness footer', win.document.getElementById('app').textContent.indexOf('Dataset updated') >= 0);

  var chaseCard = findAccountCard(win.document, 'Chase Ultimate Rewards');
  var unitedCard = findAccountCard(win.document, 'United MileagePlus');
  var localCard = findAccountCard(win.document, 'Local Rewards');
  var unitedBadge = unitedCard && unitedCard.querySelector('.account-expiry-badge');

  assert('render shows transfer trip bridge match', !!chaseCard && chaseCard.textContent.indexOf('Park Hyatt New York') >= 0);
  assert('render shows transfer path copy in trip bridge', !!chaseCard && chaseCard.textContent.indexOf('Transfer from Chase Ultimate Rewards at 1:1') >= 0);
  assert('render shows direct program match in trip bridge', !!unitedCard && unitedCard.textContent.indexOf('Direct balance in United MileagePlus') >= 0);
  assert('render shows expiry badge on expiring account', !!unitedBadge && unitedBadge.textContent.toLowerCase().indexOf('remaining') >= 0);
  assert('render shows trip bridge empty state for unmatched account', !!localCard && localCard.textContent.indexOf('No matching sweet spots yet.') >= 0);

  await api.loadSweetSpots(function () {
    return Promise.reject(new Error('offline'));
  }, true);
  api.render();
  chaseCard = findAccountCard(win.document, 'Chase Ultimate Rewards');
  assert('trip bridge fetch failure degrades gracefully', !!chaseCard && chaseCard.textContent.indexOf('Trip ideas unavailable right now.') >= 0);

  renderResults();
}

document.getElementById('advisor-frame').addEventListener('load', function () {
  setTimeout(function () {
    run().catch(function (error) {
      assert('test harness completed', false, error && error.message ? error.message : String(error));
      renderResults();
    });
  }, 80);
});
</script>
</body>
</html>
