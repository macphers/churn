<!DOCTYPE html>
<html lang="en" style="color-scheme:light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Churn — Value Advisor</title>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
*:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

:root {
  --bg: #F5F2ED; --surface: #FFFFFF; --surface-2: #FAF8F5; --border: #E8E4DF;
  --text: #1A1A1A; --text-muted: #6B6560; --accent: #8B5E10; --accent-hover: #6B4A0C;
  --accent-decorative: #C4841D; --accent-glow: rgba(139,94,16,0.12); --danger: #A63D40; --success: #2D7A4F;
  --warning: #7A5A08; --airline-color: #2563AA; --hotel-color: #7C4D8A;
  --card-color: #8B5E10; --other-color: #6B6560; --radius: 12px; --radius-sm: 8px;
  --gold: var(--accent-decorative);
  --panel-shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
}

html { background: var(--bg); }
body {
  font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
}

@keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
}

.container { width: min(1060px, calc(100vw - 40px)); margin: 0 auto; }
.app-nav {
  position: relative;
  z-index: 40;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.app-nav-inner {
  width: min(1060px, calc(100vw - 40px));
  margin: 0 auto;
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.nav-brand {
  flex: 1;
  font-family: 'Clash Display', 'Satoshi', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text);
}
.nav-links {
  display: flex;
  gap: 4px;
}
.nav-end {
  flex: 1;
  display: flex;
  justify-content: flex-end;
}
.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 500;
  border-radius: 6px;
  transition: color 120ms ease, background 120ms ease;
  min-height: 44px;
  display: flex;
  align-items: center;
}
.nav-links a:hover { color: var(--text); }
.nav-links a.active {
  color: var(--text);
  background: rgba(0,0,0,0.04);
  font-weight: 600;
}

.page-header {
  padding: 40px 0 20px;
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: flex-end;
}
.eyebrow {
  color: var(--accent);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}
.page-header h1 {
  font-family: 'Clash Display', 'Satoshi', sans-serif;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  line-height: 1.1;
  letter-spacing: -0.03em;
  margin-top: 8px;
  color: var(--text);
}
.page-header p {
  color: var(--text-muted);
  margin-top: 8px;
  max-width: 38rem;
  font-size: 15px;
}
.subnav-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--accent);
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
}
.subnav-link:hover { text-decoration: underline; }

.stack {
  display: grid;
  gap: 20px;
  padding-bottom: 48px;
}
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--panel-shadow);
}
.hero-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.5fr) minmax(300px, 0.85fr);
  gap: 20px;
}
.hero-card, .delta-card {
  padding: 26px;
  animation: fadeInUp 220ms ease-out;
}
.mini-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 700;
}
.hero-value {
  font-family: 'Clash Display', 'Satoshi', sans-serif;
  font-size: clamp(2.2rem, 6vw, 3.8rem);
  line-height: 1;
  letter-spacing: -0.04em;
  margin-top: 8px;
  color: var(--text);
}
.hero-copy {
  margin-top: 8px;
  font-size: 14px;
  color: var(--text-muted);
}
.summary-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
}
.summary-chip {
  padding: 7px 10px;
  border-radius: 6px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  font-size: 13px;
  color: var(--text-muted);
}
.delta-card {
  display: grid;
  align-content: start;
  gap: 12px;
}
.delta-figure {
  font-family: 'Clash Display', 'Satoshi', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--accent);
}
.delta-bars {
  display: grid;
  gap: 10px;
}
.delta-bar {
  display: grid;
  grid-template-columns: 100px 1fr auto;
  gap: 10px;
  align-items: center;
}
.delta-track {
  height: 14px;
  border-radius: 999px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  overflow: hidden;
}
.delta-fill {
  height: 100%;
  border-radius: 999px;
}

.modes-panel {
  padding: 20px 22px 22px;
  animation: fadeInUp 280ms ease-out;
}
.mode-strip {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
  margin-top: 10px;
  -webkit-overflow-scrolling: touch;
}
@media (max-width: 640px) {
  .mode-strip {
    mask-image: linear-gradient(to right, black 85%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%);
  }
  .mode-strip.scrolled-end {
    mask-image: linear-gradient(to left, black 85%, transparent 100%);
    -webkit-mask-image: linear-gradient(to left, black 85%, transparent 100%);
  }
  .mode-strip.scrolled-mid {
    mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
  }
}
.mode-strip::-webkit-scrollbar { display: none; }
.mode-pill {
  flex: 0 0 auto;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text-muted);
  padding: 10px 14px;
  min-width: 136px;
  text-align: left;
  cursor: pointer;
  transition: border-color 120ms ease, background 120ms ease;
}
.mode-pill.active {
  border-color: var(--accent);
  background: rgba(139,94,16,0.06);
  color: var(--text);
}
.mode-pill strong {
  display: block;
  font-size: 14px;
}
.mode-pill span {
  display: block;
  margin-top: 2px;
  font-size: 12px;
}

.section-panel {
  padding: 24px;
  animation: fadeInUp 300ms ease-out;
}
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 12px;
  margin-bottom: 16px;
}
.section-header h2 {
  font-family: 'Clash Display', 'Satoshi', sans-serif;
  font-size: 1.2rem;
  letter-spacing: -0.01em;
  font-weight: 600;
}
.section-copy {
  margin-top: 4px;
  font-size: 14px;
  color: var(--text-muted);
}

.lot-grid {
  display: grid;
  gap: 10px;
}
.lot-item {
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  background: var(--surface);
}
.lot-item h3 {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  gap: 12px;
}
.lot-item p {
  color: var(--text-muted);
  margin-top: 4px;
  font-size: 13px;
}
.comparison-bar {
  margin-top: 10px;
  display: grid;
  gap: 6px;
}
.comparison-row {
  display: grid;
  grid-template-columns: 90px 1fr auto;
  gap: 10px;
  align-items: center;
}
.comparison-track {
  height: 12px;
  border-radius: 999px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  overflow: hidden;
}
.comparison-fill {
  height: 100%;
  border-radius: 999px;
}

.warning-list {
  display: grid;
  gap: 10px;
}
.warning-card {
  border: 1px solid rgba(166,61,64,0.2);
  border-radius: 10px;
  background: rgba(166,61,64,0.03);
  padding: 16px;
}
.warning-card h3 {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
}
.warning-card p {
  color: var(--text-muted);
  margin-top: 4px;
  font-size: 13px;
}
.expired-badge {
  padding: 3px 7px;
  border-radius: 4px;
  background: rgba(166,61,64,0.08);
  color: var(--danger);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-size: 11px;
  font-weight: 700;
}

.recommendation-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.2fr) repeat(3, minmax(0, 1fr));
  gap: 12px;
}
.rec-card {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  background: var(--surface);
  display: grid;
  gap: 8px;
}
.rec-card.featured {
  border-color: var(--accent);
  background: rgba(139,94,16,0.03);
}
.rec-card.wait {
  border-color: var(--border);
  opacity: 0.8;
}
.rec-label {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--text-muted);
}
.rec-title {
  font-family: 'Clash Display', 'Satoshi', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.03em;
}
.rec-value {
  font-size: 15px;
  font-weight: 600;
  color: var(--success);
}
.rec-score {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  width: fit-content;
  padding: 4px 8px;
  border-radius: 4px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
}

.account-list {
  display: grid;
  gap: 12px;
}
.account-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
  box-shadow: 0 1px 2px rgba(0,0,0,0.03);
}
.account-shell {
  padding: 18px;
}
.account-header {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: flex-start;
}
.account-name {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.type-dot {
  width: 8px;
  height: 8px;
  border-radius: 999px;
}
.type-dot.flexible, .type-dot.credit_card { background: var(--card-color); }
.type-dot.airline { background: var(--airline-color); }
.type-dot.hotel { background: var(--hotel-color); }
.type-dot.other { background: var(--other-color); }
.account-balance {
  margin-top: 12px;
  font-size: 14px;
  color: var(--text-muted);
}
.account-balance strong {
  display: block;
  color: var(--text);
  font-family: 'Clash Display', 'Satoshi', sans-serif;
  font-size: 26px;
  letter-spacing: -0.03em;
}
.option-list {
  display: grid;
  gap: 8px;
  margin-top: 14px;
}
.option-row {
  display: grid;
  grid-template-columns: minmax(0, 180px) 1fr auto;
  gap: 10px;
  align-items: center;
}
.option-copy strong { display: block; font-size: 14px; }
.option-copy span { display: block; color: var(--text-muted); font-size: 12px; margin-top: 1px; }
.option-track {
  height: 14px;
  border-radius: 999px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  overflow: hidden;
}
.option-fill {
  height: 100%;
  border-radius: 999px;
}
.option-values {
  text-align: right;
  min-width: 110px;
}
.option-values strong {
  display: block;
  font-size: 14px;
}
.option-values span {
  color: var(--text-muted);
  font-size: 12px;
}
.expand-toggle {
  width: 100%;
  border: none;
  border-top: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  cursor: pointer;
  font-size: 13px;
}
.detail-panel {
  display: none;
  border-top: 1px solid var(--border);
  padding: 18px;
  background: var(--surface-2);
}
.detail-panel.open { display: block; }
.detail-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.metric-card, .sweet-card, .household-card, .setting-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  padding: 16px;
}
.metric-card .value {
  font-family: 'Clash Display', 'Satoshi', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.03em;
  margin-top: 6px;
}
.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
}
.tag {
  padding: 3px 7px;
  border-radius: 4px;
  background: rgba(139,94,16,0.08);
  color: var(--accent);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}
.tag.warn { background: rgba(122,90,8,0.1); color: var(--warning); }
.tag.success { background: rgba(45,122,79,0.08); color: var(--success); }

.sweet-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 10px;
}
.sweet-card h3 {
  font-size: 14px;
  font-weight: 600;
}
.sweet-card p {
  color: var(--text-muted);
  margin-top: 4px;
  font-size: 13px;
}

.settings-panel details {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  overflow: hidden;
}
.settings-panel summary {
  list-style: none;
  cursor: pointer;
  padding: 14px 18px;
  font-weight: 600;
  font-size: 14px;
}
.settings-panel summary::-webkit-details-marker { display: none; }
.settings-body {
  padding: 0 18px 18px;
  display: grid;
  gap: 14px;
}
.settings-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.settings-grid .field, .household-form-grid .field {
  display: grid;
  gap: 6px;
}
.field label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 600;
}
.field input, .field select {
  width: 100%;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  padding: 10px 12px;
  font-size: 14px;
}
.field input:focus, .field select:focus {
  border-color: var(--accent);
  outline: none;
  box-shadow: 0 0 0 3px rgba(139,94,16,0.1);
}
.caps-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
}
.caps-grid .field label {
  letter-spacing: 0.06em;
  text-transform: none;
  font-size: 11px;
}
.household-form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 0.8fr auto;
  gap: 8px;
  align-items: end;
}
.household-list {
  display: grid;
  gap: 8px;
}
.household-card h3 {
  font-size: 14px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  gap: 12px;
}
.household-card p {
  color: var(--text-muted);
  margin-top: 4px;
  font-size: 13px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border-radius: 8px;
  border: 1px solid transparent;
  padding: 9px 14px;
  cursor: pointer;
  font: inherit;
  font-size: 14px;
  transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
}
.btn:hover { transform: none; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--surface); border-color: var(--border); color: var(--text); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: rgba(166,61,64,0.04); border-color: rgba(166,61,64,0.2); color: var(--danger); }

.freshness {
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
  padding: 4px 0 12px;
}

.empty-state {
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 28px;
  text-align: center;
  color: var(--text-muted);
}
.empty-state strong { display: block; color: var(--text); margin-bottom: 6px; }

@media (max-width: 980px) {
  .hero-grid, .recommendation-grid, .settings-grid, .caps-grid, .detail-grid {
    grid-template-columns: 1fr;
  }
  .recommendation-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .recommendation-grid .featured { grid-column: 1 / -1; }
  .household-form-grid { grid-template-columns: 1fr; }
}

@media (max-width: 767px) {
  .container, .app-nav-inner { width: calc(100vw - 24px); }
  .page-header { flex-direction: column; align-items: flex-start; padding-top: 28px; }
  .mode-pill { min-width: 128px; }
  .recommendation-grid, .caps-grid { grid-template-columns: 1fr; }
  .option-row, .comparison-row, .delta-bar {
    grid-template-columns: 1fr;
  }
  .option-values, .delta-bar > :last-child { text-align: left; min-width: 0; }
}
</style>
</head>
<body>
<nav class="app-nav">
  <div class="app-nav-inner">
    <span class="nav-brand">Churn</span>
    <div class="nav-links">
      <a href="index.html">Tracker</a>
      <a href="value.html" class="active">Advisor</a>
    </div>
    <div class="nav-end"></div>
  </div>
</nav>

<header class="container page-header">
  <div>
    <div class="eyebrow">Decision Layer</div>
    <h1>Value advice that respects how you actually redeem.</h1>
    <p>Your spending limits, travel preferences, and household balances all shape the answer. This page turns raw points math into the recommendation you would actually follow.</p>
  </div>
</header>

<main class="container stack" id="app"></main>

<script src="programs.js"></script>
<script>
'use strict';

var STORAGE_KEY = 'churn_data';
var LEGACY_STORAGE_KEY = 'osaka_data';
var PREFS_KEY = 'valueAdvisorPrefs';
var HOUSEHOLD_KEY = 'churn_household';
var LEGACY_HOUSEHOLD_KEY = 'osaka_household';
var state = { expanded: {} };
var DEFAULT_PREFS = {
  mode: 'max_value',
  interestedInTravel: true,
  cabinPref: 'economy',
  hotelPref: 'midrangeHotel',
  complexityTolerance: 'medium',
  wtpCaps: {
    economy: 500,
    premiumEconomy: 1000,
    business: 2500,
    first: 5000,
    budgetHotel: 150,
    midrangeHotel: 300,
    luxuryHotel: 600,
    resort: 800
  }
};
var MODE_DEFS = [
  { key: 'max_value', label: 'Max Value', copy: 'Best possible cents-per-point.' },
  { key: 'min_cash', label: 'Min Cash', copy: 'Lower out-of-pocket and low fees.' },
  { key: 'simple', label: 'Simple', copy: 'Few moving parts, easier redemptions.' },
  { key: 'travel_now', label: 'Travel Now', copy: 'Prioritize bookable options fast.' },
  { key: 'no_travel', label: 'No Travel', copy: 'Ignore transfer-heavy travel plays.' },
  { key: 'expiring', label: 'Expiring', copy: 'Urgency beats perfect theoretical value.' },
  { key: 'luxury', label: 'Luxury', copy: 'Bias toward premium cabins and resorts.' }
];
var TYPE_COLORS = {
  flexible: 'var(--card-color)',
  credit_card: 'var(--card-color)',
  airline: 'var(--airline-color)',
  hotel: 'var(--hotel-color)',
  other: 'var(--other-color)'
};

function esc(value) {
  var node = document.createElement('span');
  node.textContent = value == null ? '' : String(value);
  return node.innerHTML;
}

function formatDollars(number) {
  return '$' + Number(number || 0).toLocaleString(undefined, {
    minimumFractionDigits: number % 1 ? 2 : 0,
    maximumFractionDigits: 2
  });
}

function formatPoints(number) {
  return Number(number || 0).toLocaleString();
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function round(value, digits) {
  var scale = Math.pow(10, digits || 0);
  return Math.round(value * scale) / scale;
}

function deepClone(value) {
  return JSON.parse(JSON.stringify(value));
}

function mergePrefs(raw) {
  var prefs = deepClone(DEFAULT_PREFS);
  if (!raw || typeof raw !== 'object') return prefs;
  Object.keys(raw).forEach(function (key) {
    if (key === 'wtpCaps' && raw.wtpCaps && typeof raw.wtpCaps === 'object') {
      Object.keys(raw.wtpCaps).forEach(function (capKey) {
        var amount = Number(raw.wtpCaps[capKey]);
        if (isFinite(amount) && amount > 0) prefs.wtpCaps[capKey] = amount;
      });
    } else if (raw[key] != null) {
      prefs[key] = raw[key];
    }
  });
  return prefs;
}

function readRewardsData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      raw = localStorage.getItem(LEGACY_STORAGE_KEY);
      if (raw) { localStorage.setItem(STORAGE_KEY, raw); localStorage.removeItem(LEGACY_STORAGE_KEY); }
    }
    if (!raw) return null;
    var data = JSON.parse(raw);
    if (!data || !Array.isArray(data.accounts)) return null;
    return data;
  } catch (error) {
    return 'corrupted';
  }
}

function readPrefs() {
  try {
    var raw = localStorage.getItem(PREFS_KEY);
    if (!raw) return deepClone(DEFAULT_PREFS);
    return mergePrefs(JSON.parse(raw));
  } catch (error) {
    return deepClone(DEFAULT_PREFS);
  }
}

function savePrefs(prefs) {
  localStorage.setItem(PREFS_KEY, JSON.stringify(mergePrefs(prefs)));
}

function normalizeHouseholdAccount(item) {
  if (!item || typeof item !== 'object') return null;
  var programName = item.program || getProgramNameBySlug(item.programSlug) || '';
  var program = findProgram(programName, item.programSlug);
  return {
    id: typeof item.id === 'string' ? item.id : genId(),
    memberName: typeof item.memberName === 'string' && item.memberName.trim() ? item.memberName.trim() : 'Player two',
    program: programName,
    programSlug: program ? program.slug : (item.programSlug || null),
    balance: Math.max(0, Math.floor(Number(item.balance) || 0)),
    currency: program ? program.currency : (item.currency || 'points'),
    type: program ? program.type : (item.type || 'other')
  };
}

function readHousehold() {
  try {
    var raw = localStorage.getItem(HOUSEHOLD_KEY);
    if (!raw) {
      raw = localStorage.getItem(LEGACY_HOUSEHOLD_KEY);
      if (raw) { localStorage.setItem(HOUSEHOLD_KEY, raw); localStorage.removeItem(LEGACY_HOUSEHOLD_KEY); }
    }
    if (!raw) return [];
    var parsed = JSON.parse(raw);
    if (Array.isArray(parsed)) {
      return parsed.map(normalizeHouseholdAccount).filter(Boolean);
    }
    if (parsed && Array.isArray(parsed.accounts)) {
      return parsed.accounts.map(normalizeHouseholdAccount).filter(Boolean);
    }
    return [];
  } catch (error) {
    return [];
  }
}

function saveHousehold(items) {
  localStorage.setItem(HOUSEHOLD_KEY, JSON.stringify(items.map(normalizeHouseholdAccount).filter(Boolean)));
}

function genId() {
  try {
    return crypto.randomUUID();
  } catch (error) {
    return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
  }
}

function getProgramEntries() {
  return Object.keys(window.PROGRAMS.programs).map(function (name) {
    var program = window.PROGRAMS.programs[name];
    return {
      name: name,
      slug: program.slug,
      program: program
    };
  }).sort(function (left, right) {
    return left.name.localeCompare(right.name);
  });
}

function getProgramNameBySlug(slug) {
  var entry = getProgramEntries().find(function (item) { return item.slug === slug; });
  return entry ? entry.name : null;
}

function findProgram(name, slug) {
  if (slug) {
    var bySlugName = getProgramNameBySlug(slug);
    if (bySlugName) return Object.assign({ name: bySlugName }, window.PROGRAMS.programs[bySlugName]);
  }
  if (name && window.PROGRAMS.programs[name]) return Object.assign({ name: name }, window.PROGRAMS.programs[name]);
  if (name) {
    var match = getProgramEntries().find(function (entry) {
      return entry.name.toLowerCase() === String(name).toLowerCase();
    });
    if (match) return Object.assign({ name: match.name }, match.program);
  }
  return null;
}

function programFromAccount(account) {
  return findProgram(account.program, account.programSlug);
}

function typeColor(type) {
  return TYPE_COLORS[type] || TYPE_COLORS.other;
}

function hospitalityKey(cabinType, prefs) {
  if (cabinType === 'hotel') return prefs.hotelPref || 'midrangeHotel';
  if (cabinType === 'midrange') return 'midrangeHotel';
  if (cabinType === 'luxury') return 'luxuryHotel';
  return cabinType;
}

function capKeyForCabin(cabinType, prefs) {
  var key = hospitalityKey(cabinType, prefs);
  if (prefs.wtpCaps[key] != null) return key;
  return null;
}

function applyWTP(rawValue, cabinType, prefs) {
  var key = capKeyForCabin(cabinType, prefs);
  if (!key) return round(rawValue, 0);
  var cap = Number(prefs.wtpCaps[key]);
  if (!isFinite(cap) || cap <= 0) return round(rawValue, 0);
  if (rawValue <= cap) return round(rawValue, 0);
  return round(cap + (rawValue - cap) * 0.35, 0);
}

function calcNetCpp(balance, bestCpp, surchargeData) {
  var surcharges = surchargeData && surchargeData.surcharges || 'low';
  var availability = surchargeData && surchargeData.availability || 'high';
  var flexibility = surchargeData && surchargeData.flexibility || 'medium';
  var surchargePenalty = { low: 0.02, medium: 0.11, high: 0.24 }[surcharges] || 0;
  var availabilityPenalty = { high: 0, medium: 0.04, low: 0.1 }[availability] || 0;
  var flexibilityBonus = { high: 0.05, medium: 0.02, low: 0 }[flexibility] || 0;
  return round(Math.max(0.3, bestCpp * (1 - surchargePenalty - availabilityPenalty + flexibilityBonus)), 2);
}

function complexityLevel(option) {
  if (option.kind === 'transfer_partner') {
    if (option.availability === 'low' || option.flexibility === 'low') return 'high';
    return 'medium';
  }
  if (option.type === 'cash_back' || option.type === 'gift_cards' || option.type === 'travel_booking') return 'low';
  return 'medium';
}

function complexityScore(level) {
  return { low: 1, medium: 0.7, high: 0.4 }[level] || 0.7;
}

function availabilityScore(level) {
  return { high: 1, medium: 0.72, low: 0.42 }[level] || 0.72;
}

function flexibilityScore(level) {
  return { high: 1, medium: 0.72, low: 0.44 }[level] || 0.72;
}

function surchargeScore(level) {
  return { low: 1, medium: 0.65, high: 0.32 }[level] || 0.65;
}

function preferenceFit(cabinType, prefs) {
  if (!cabinType || cabinType === 'cash') return 0.82;
  if (cabinType.indexOf('Hotel') > -1 || cabinType === 'resort') {
    var hotelRank = { budgetHotel: 1, midrangeHotel: 2, luxuryHotel: 3, resort: 4 };
    var desiredHotel = hotelRank[prefs.hotelPref || 'midrangeHotel'] || 2;
    var actualHotel = hotelRank[cabinType] || desiredHotel;
    return clamp(1 - Math.abs(desiredHotel - actualHotel) * 0.18, 0.34, 1);
  }
  var cabinRank = { economy: 1, premiumEconomy: 2, business: 3, first: 4 };
  var desiredCabin = cabinRank[prefs.cabinPref || 'economy'] || 1;
  var actualCabin = cabinRank[cabinType] || desiredCabin;
  return clamp(1 - Math.abs(desiredCabin - actualCabin) * 0.2, 0.3, 1);
}

function luxuryFit(cabinType) {
  return { economy: 0.2, premiumEconomy: 0.45, business: 0.85, first: 1, budgetHotel: 0.2, midrangeHotel: 0.45, luxuryHotel: 0.9, resort: 1 }[cabinType] || 0.25;
}

function normalizeBaseOption(option, floor, prefs) {
  var floorValue = floor ? floor.adjustedValue : option.adjustedValue;
  var liftRatio = floorValue > 0 ? (option.adjustedValue - floorValue) / floorValue : 0;
  var valueComponent = clamp(55 + liftRatio * 45, 0, 100);
  var simplicityComponent = complexityScore(option.complexity) * 100;
  var availabilityComponent = availabilityScore(option.availability) * 100;
  var flexibilityComponent = flexibilityScore(option.flexibility) * 100;
  var preferenceComponent = preferenceFit(option.cabinType, prefs) * 100;
  var surchargeComponent = surchargeScore(option.surcharges) * 100;
  var baseScore = valueComponent * 0.38 + simplicityComponent * 0.16 + availabilityComponent * 0.16 + flexibilityComponent * 0.12 + preferenceComponent * 0.1 + surchargeComponent * 0.08;
  if (option.householdBalance > 0) baseScore += 4;
  return Object.assign({}, option, {
    floorValue: floorValue,
    liftRatio: round(liftRatio, 3),
    baseScore: round(baseScore, 1)
  });
}

function scoreBFB(option, floor, prefs, mode) {
  return normalizeBaseOption(option, floor, prefs);
}

function rankByMode(scoredOptions, mode) {
  return scoredOptions.map(function (option) {
    var score = option.baseScore;
    switch (mode) {
      case 'max_value':
        score += option.liftRatio * 32 + (option.kind === 'transfer_partner' ? 6 : 0);
        break;
      case 'min_cash':
        score += surchargeScore(option.surcharges) * 22 + (option.isNonTravel ? 12 : 0) + availabilityScore(option.availability) * 8;
        score -= option.surcharges === 'high' ? 12 : 0;
        break;
      case 'simple':
        score += complexityScore(option.complexity) * 28 + (option.isSimple ? 18 : -12);
        break;
      case 'travel_now':
        score += availabilityScore(option.availability) * 28 + flexibilityScore(option.flexibility) * 10;
        score -= option.availability === 'low' ? 16 : 0;
        break;
      case 'no_travel':
        score += option.isNonTravel ? 34 : -28;
        score += option.isSimple ? 10 : 0;
        break;
      case 'expiring':
        score += option.urgencyBoost || 0;
        score += option.isSimple ? 14 : 0;
        break;
      case 'luxury':
        score += luxuryFit(option.cabinType) * 34 + (option.kind === 'transfer_partner' ? 6 : 0);
        break;
    }
    return Object.assign({}, option, { modeScore: round(score, 1) });
  }).sort(function (left, right) {
    return right.modeScore - left.modeScore;
  });
}

function fallbackCabinType(program, fallbackType, prefs) {
  if (fallbackType === 'cash_back' || fallbackType === 'gift_cards' || fallbackType === 'merchandise') return 'cash';
  if (program && program.type === 'hotel') return program.cpp >= 1.5 ? 'luxuryHotel' : 'midrangeHotel';
  return prefs.cabinPref || 'economy';
}

function buildFallbackOptions(account, program, prefs, householdBalance) {
  var fallbackOptions = program && Array.isArray(program.fallbackOptions) && program.fallbackOptions.length
    ? program.fallbackOptions
    : [{ type: 'cash_back', cpp: account.cpp || 1, label: 'Cash back' }];
  return fallbackOptions.map(function (item) {
    var rawValue = account.balance * item.cpp / 100;
    var cabinType = fallbackCabinType(program, item.type, prefs);
    var adjustedValue = item.type === 'cash_back' || item.type === 'gift_cards' || item.type === 'merchandise'
      ? rawValue
      : applyWTP(rawValue, cabinType, prefs);
    return {
      id: account.id + '-fallback-' + item.type,
      accountId: account.id,
      accountProgram: account.program,
      kind: 'fallback',
      type: item.type,
      label: item.label,
      rawCpp: round(item.cpp, 2),
      netCpp: round(item.cpp, 2),
      rawValue: round(rawValue, 0),
      adjustedValue: round(adjustedValue, 0),
      cabinType: cabinType,
      surcharges: 'low',
      availability: 'high',
      flexibility: item.type === 'travel_portal' ? 'medium' : 'high',
      complexity: item.type === 'travel_portal' ? 'medium' : 'low',
      sweetSpot: '',
      isTravel: item.type.indexOf('travel') === 0 || item.type === 'travel_booking' || item.type === 'pay_with_points',
      isSimple: true,
      isNonTravel: item.type === 'cash_back' || item.type === 'gift_cards' || item.type === 'merchandise',
      householdBalance: householdBalance || 0,
      urgencyBoost: 0
    };
  });
}

function buildTransferOptions(account, program, prefs, householdBalance) {
  if (!program || !Array.isArray(program.transferPartners) || !program.transferPartners.length) return [];
  return program.transferPartners.map(function (partner) {
    var netCpp = calcNetCpp(account.balance, partner.bestCpp, partner);
    var rawValue = account.balance * partner.bestCpp / 100;
    var adjustedValue = applyWTP(account.balance * netCpp / 100, partner.cabinType, prefs);
    var transferShape = {
      kind: 'transfer_partner',
      availability: partner.availability,
      flexibility: partner.flexibility
    };
    return {
      id: account.id + '-transfer-' + partner.partner,
      accountId: account.id,
      accountProgram: account.program,
      kind: 'transfer_partner',
      type: 'transfer_partner',
      label: partner.partner,
      rawCpp: round(partner.bestCpp, 2),
      netCpp: netCpp,
      rawValue: round(rawValue, 0),
      adjustedValue: round(adjustedValue, 0),
      cabinType: partner.cabinType,
      surcharges: partner.surcharges,
      availability: partner.availability,
      flexibility: partner.flexibility,
      complexity: complexityLevel(transferShape),
      sweetSpot: partner.sweetSpot,
      ratio: partner.ratio,
      isTravel: true,
      isSimple: false,
      isNonTravel: false,
      householdBalance: householdBalance || 0,
      urgencyBoost: 0
    };
  });
}

function checkExpiration(account) {
  var rule = window.PROGRAMS.expirationRules[account.program];
  if (!rule || !rule.expires) return null;
  if (!account.lastUpdated) return { atRisk: true, expired: false, daysRemaining: null, message: 'Unknown last activity date.' };
  var lastUpdated = new Date(account.lastUpdated);
  if (isNaN(lastUpdated.getTime())) return { atRisk: true, expired: false, daysRemaining: null, message: 'Unknown last activity date.' };
  var expiresAt = new Date(lastUpdated);
  expiresAt.setMonth(expiresAt.getMonth() + rule.inactivityMonths);
  var daysRemaining = Math.ceil((expiresAt.getTime() - Date.now()) / 86400000);
  if (daysRemaining <= 0) return { atRisk: true, expired: true, daysRemaining: 0, message: 'Expired', expiresAt: expiresAt.toISOString().split('T')[0] };
  if (daysRemaining <= 180) {
    return { atRisk: true, expired: false, daysRemaining: daysRemaining, message: daysRemaining + ' days remaining', expiresAt: expiresAt.toISOString().split('T')[0] };
  }
  return null;
}

function analyzeAccount(rawAccount, prefs, household) {
  var account = Object.assign({}, rawAccount);
  account.balance = Math.max(0, Number(account.balance) || 0);
  account.cpp = Number(account.cpp) || 1;
  var program = programFromAccount(account);
  var householdBalance = household.filter(function (member) {
    return member.programSlug && account.programSlug && member.programSlug === account.programSlug;
  }).reduce(function (sum, member) {
    return sum + member.balance;
  }, 0);
  var fallbackOptions = buildFallbackOptions(account, program, prefs, householdBalance);
  var cashFloor = fallbackOptions.find(function (option) { return option.type === 'cash_back'; }) || fallbackOptions[0];
  var transferOptions = prefs.interestedInTravel === false ? [] : buildTransferOptions(account, program, prefs, householdBalance);
  var expiration = checkExpiration(account);
  var urgencyBoost = expiration && expiration.atRisk ? (expiration.expired ? 24 : 16) : 0;
  var options = fallbackOptions.concat(transferOptions).map(function (option) {
    option.urgencyBoost = urgencyBoost + (option.isSimple ? 6 : 0) + availabilityScore(option.availability) * 4;
    return option;
  });
  var scored = rankByMode(options.map(function (option) {
    return scoreBFB(option, cashFloor, prefs, prefs.mode);
  }), prefs.mode);
  var bestOption = scored[0] || cashFloor;
  var bestSimple = scored.find(function (option) { return option.isSimple; }) || bestOption;
  var bestNonTravel = scored.find(function (option) { return option.isNonTravel; }) || bestSimple;
  var gapValue = Math.max(0, round(bestOption.adjustedValue - cashFloor.adjustedValue, 0));
  var gapPercent = cashFloor.adjustedValue > 0 ? round(gapValue / cashFloor.adjustedValue * 100, 0) : 0;
  return {
    account: account,
    program: program,
    householdBalance: householdBalance,
    floorOption: cashFloor,
    bestOption: bestOption,
    bestSimple: bestSimple,
    bestNonTravel: bestNonTravel,
    options: scored,
    fallbackOptions: fallbackOptions,
    transferOptions: transferOptions,
    expiration: expiration,
    leftOnTable: {
      gap: gapValue,
      gapPercent: gapPercent
    }
  };
}

function buildAnalysis(data, prefs, household) {
  var accounts = (data.accounts || []).map(function (account) {
    return analyzeAccount(account, prefs, household);
  });
  var active = accounts.filter(function (item) { return item.account.balance > 0; });
  var totalBest = active.reduce(function (sum, item) { return sum + item.bestOption.adjustedValue; }, 0);
  var totalFloor = active.reduce(function (sum, item) { return sum + item.floorOption.adjustedValue; }, 0);
  var totalGap = Math.max(0, totalBest - totalFloor);
  var allOptions = active.map(function (item) {
    return item.options[0] ? Object.assign({ account: item.account }, item.options[0]) : null;
  }).filter(Boolean);
  var bestOverall = allOptions.slice().sort(function (left, right) { return right.modeScore - left.modeScore; })[0] || null;
  var bestSimple = active.map(function (item) {
    return Object.assign({ account: item.account }, item.bestSimple);
  }).sort(function (left, right) { return right.modeScore - left.modeScore; })[0] || null;
  var bestNonTravel = active.map(function (item) {
    return Object.assign({ account: item.account }, item.bestNonTravel);
  }).sort(function (left, right) { return right.modeScore - left.modeScore; })[0] || null;
  var expiring = active.filter(function (item) { return item.expiration && item.expiration.atRisk; }).sort(function (left, right) {
    return (left.expiration.daysRemaining || 9999) - (right.expiration.daysRemaining || 9999);
  });
  var sweetSpots = active.reduce(function (items, item) {
    item.options.filter(function (option) {
      return option.kind === 'transfer_partner' && option.rawCpp >= 1.8;
    }).forEach(function (option) {
      items.push({
        account: item.account,
        option: option
      });
    });
    return items;
  }, []).sort(function (left, right) {
    return right.option.modeScore - left.option.modeScore;
  });
  return {
    prefs: prefs,
    household: household,
    accounts: accounts,
    activeAccounts: active,
    totalBest: round(totalBest, 0),
    totalFloor: round(totalFloor, 0),
    totalGap: round(totalGap, 0),
    bestOverall: bestOverall,
    bestSimple: bestSimple,
    bestNonTravel: bestNonTravel,
    expiring: expiring,
    sweetSpots: sweetSpots
  };
}

function worthSavingCard(analysis) {
  var liftPct = analysis.totalFloor > 0 ? (analysis.totalBest - analysis.totalFloor) / analysis.totalFloor : 0;
  var urgent = analysis.expiring.some(function (item) {
    return item.expiration && item.expiration.atRisk && (item.expiration.daysRemaining == null || item.expiration.daysRemaining <= 90);
  });
  if (!urgent && liftPct < 0.12) {
    return {
      state: 'wait',
      title: 'Worth waiting',
      body: 'Your best option is only ' + round(liftPct * 100, 0) + '% above floor value. Points are not under real pressure today, so patience costs very little.',
      accent: 'muted'
    };
  }
  if (!analysis.bestOverall) {
    return {
      state: 'wait',
      title: 'Need more signal',
      body: 'Add more balances or set travel preferences in the tracker to get a stronger recommendation.',
      accent: 'muted'
    };
  }
  return {
    state: 'use_now',
    title: 'Strong opportunity',
    body: analysis.bestOverall.account.program + ' is showing a meaningful edge right now via ' + analysis.bestOverall.label + '.',
    accent: 'highlight',
    option: analysis.bestOverall
  };
}

function writeAgentResults(data, prefs) {
  var household = readHousehold();
  var analysis = buildAnalysis(data, prefs, household);
  var result = {
    generatedAt: new Date().toISOString(),
    mode: prefs.mode,
    userPreferences: prefs,
    household: household,
    totals: {
      best: analysis.totalBest,
      floor: analysis.totalFloor,
      leftOnTable: analysis.totalGap
    },
    portfolio: analysis.activeAccounts.map(function (item) {
      return {
        program: item.account.program,
        balance: item.account.balance,
        bestOption: {
          label: item.bestOption.label,
          kind: item.bestOption.kind,
          raw_cpp: item.bestOption.rawCpp,
          net_cpp: item.bestOption.netCpp,
          adjusted_value: item.bestOption.adjustedValue,
          bfb_score: item.bestOption.modeScore,
          sweet_spot: item.bestOption.sweetSpot || '',
          cabin_type: item.bestOption.cabinType
        },
        floorOption: {
          label: item.floorOption.label,
          adjusted_value: item.floorOption.adjustedValue
        },
        leftOnTable: item.leftOnTable,
        expiration: item.expiration,
        householdBalance: item.householdBalance,
        alternatives: item.options.slice(1, 4).map(function (option) {
          return {
            label: option.label,
            kind: option.kind,
            adjusted_value: option.adjustedValue,
            bfb_score: option.modeScore,
            wtp_adjusted: option.adjustedValue !== option.rawValue
          };
        })
      };
    })
  };
  try {
    localStorage.setItem('valueAdvisorResults', JSON.stringify(result));
  } catch (error) {
    // Ignore storage write failures.
  }
  return result;
}

function renderModeStrip(prefs) {
  return '<section class="panel modes-panel" aria-label="Advisor modes">' +
    '<div class="mini-label">Mode</div>' +
    '<div class="section-copy">Each mode re-ranks the same option set. Switch modes when your constraints change.</div>' +
    '<div class="mode-strip" role="tablist" aria-label="Recommendation modes">' + MODE_DEFS.map(function (mode) {
      var active = mode.key === prefs.mode;
      return '<button type="button" role="tab" class="mode-pill' + (active ? ' active' : '') + '" data-mode="' + mode.key + '" aria-selected="' + (active ? 'true' : 'false') + '" tabindex="' + (active ? '0' : '-1') + '">' +
        '<strong>' + esc(mode.label) + '</strong><span>' + esc(mode.copy) + '</span></button>';
    }).join('') + '</div>' +
  '</section>';
}

function renderHero(analysis) {
  var activeCount = analysis.activeAccounts.length;
  return '<section class="hero-grid">' +
    '<div class="panel hero-card">' +
      '<div class="mini-label">Best-mode portfolio value</div>' +
      '<div class="hero-value">' + esc(formatDollars(analysis.totalBest)) + '</div>' +
      '<div class="hero-copy">Mode: ' + esc(MODE_DEFS.find(function (mode) { return mode.key === analysis.prefs.mode; }).label) + ' across ' + activeCount + ' active account' + (activeCount === 1 ? '' : 's') + '.</div>' +
      '<div class="summary-row">' +
        '<div class="summary-chip">Floor value ' + esc(formatDollars(analysis.totalFloor)) + '</div>' +
        '<div class="summary-chip">Household balances ' + analysis.household.length + '</div>' +
        '<div class="summary-chip">Travel ' + (analysis.prefs.interestedInTravel ? 'on' : 'off') + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="panel delta-card">' +
      '<div class="mini-label">Delta from floor</div>' +
      '<div class="delta-figure">' + esc(formatDollars(analysis.totalGap)) + '</div>' +
      '<div class="section-copy">This is the value gap between your current mode winners and the cash-like fallback floor.</div>' +
      '<div class="delta-bars">' +
        '<div class="delta-bar"><span class="mini-label">Best</span><div class="delta-track"><div class="delta-fill" style="width:100%;background:var(--gold)"></div></div><span>' + esc(formatDollars(analysis.totalBest)) + '</span></div>' +
        '<div class="delta-bar"><span class="mini-label">Floor</span><div class="delta-track"><div class="delta-fill" style="width:' + (analysis.totalBest > 0 ? round(analysis.totalFloor / analysis.totalBest * 100, 0) : 0) + '%;background:var(--accent)"></div></div><span>' + esc(formatDollars(analysis.totalFloor)) + '</span></div>' +
      '</div>' +
    '</div>' +
  '</section>';
}

function renderLeftOnTable(analysis) {
  if (!analysis.activeAccounts.length) return '';
  return '<section class="panel section-panel">' +
    '<div class="section-header"><div><div class="mini-label">Opportunity</div><h2>Unrealized value</h2><p class="section-copy">Programs where the current mode beats the cash-equivalent floor by the widest margin.</p></div></div>' +
    '<div class="lot-grid">' + analysis.activeAccounts.map(function (item) {
      var bestPct = item.bestOption.adjustedValue > 0 ? 100 : 0;
      var floorPct = item.bestOption.adjustedValue > 0 ? round(item.floorOption.adjustedValue / item.bestOption.adjustedValue * 100, 0) : 0;
      return '<article class="lot-item">' +
        '<h3><span>' + esc(item.account.program) + '</span><span>' + esc(formatDollars(item.leftOnTable.gap)) + '</span></h3>' +
        '<p>' + esc(item.leftOnTable.gapPercent + '% lift over the floor via ' + item.bestOption.label) + '</p>' +
        '<div class="comparison-bar">' +
          '<div class="comparison-row"><span class="mini-label">Winner</span><div class="comparison-track"><div class="comparison-fill" style="width:' + bestPct + '%;background:var(--gold)"></div></div><span>' + esc(formatDollars(item.bestOption.adjustedValue)) + '</span></div>' +
          '<div class="comparison-row"><span class="mini-label">Floor</span><div class="comparison-track"><div class="comparison-fill" style="width:' + floorPct + '%;background:var(--accent)"></div></div><span>' + esc(formatDollars(item.floorOption.adjustedValue)) + '</span></div>' +
        '</div>' +
      '</article>';
    }).join('') + '</div></section>';
}

function renderWarnings(analysis) {
  if (!analysis.expiring.length) return '';
  return '<section class="panel section-panel">' +
    '<div class="section-header"><div><div class="mini-label">Urgency</div><h2>Expiration warnings</h2><p class="section-copy">Accounts at risk of expiring should usually be redeemed before chasing higher-value options elsewhere.</p></div></div>' +
    '<div class="warning-list">' + analysis.expiring.map(function (item) {
      var expiration = item.expiration;
      return '<article class="warning-card">' +
        '<h3><span>' + esc(item.account.program) + '</span>' + (expiration.expired ? '<span class="expired-badge">Expired</span>' : '<span class="expired-badge">' + esc(expiration.message) + '</span>') + '</h3>' +
        '<p>' + esc('Best practical option in this mode: ' + item.bestOption.label + ' worth ' + formatDollars(item.bestOption.adjustedValue)) + '</p>' +
        '<p>' + esc('Last updated: ' + (item.account.lastUpdated || 'unknown') + (expiration.expiresAt ? ' • expected expiry ' + expiration.expiresAt : '')) + '</p>' +
      '</article>';
    }).join('') + '</div></section>';
}

function recCard(label, card, extraClass, featured) {
  if (!card) return '';
  var body = '';
  if (card.account) {
    body = card.account.program + ' • ' + (card.sweetSpot || 'Best fit for the current mode and constraints.');
  } else {
    body = card.body || '';
  }
  return '<article class="rec-card' + (featured ? ' featured' : '') + (extraClass ? ' ' + extraClass : '') + '">' +
    '<div class="rec-label">' + esc(label) + '</div>' +
    '<div class="rec-title">' + esc(card.label || card.title) + '</div>' +
    (card.adjustedValue != null ? '<div class="rec-value">' + esc(formatDollars(card.adjustedValue)) + '</div>' : '') +
    (card.modeScore != null ? '<div class="rec-score">Score ' + esc(card.modeScore.toFixed(1)) + '</div>' : '') +
    '<p class="section-copy">' + esc(body) + '</p>' +
    (card.account ? '<p class="section-copy">' + esc(card.sweetSpot || ('Value over floor: ' + round(card.liftRatio * 100, 0) + '%')) + '</p>' : '') +
  '</article>';
}

function renderRecommendations(analysis) {
  var worthSaving = worthSavingCard(analysis);
  return '<section class="panel section-panel">' +
    '<div class="section-header"><div><div class="mini-label">Recommendations</div><h2>Decision-first cards</h2><p class="section-copy">These cards answer the question before the tables do.</p></div></div>' +
    '<div class="recommendation-grid">' +
      recCard('Best Overall', analysis.bestOverall, '', true) +
      recCard('Best Simple', analysis.bestSimple, '', false) +
      recCard('Best Non-Travel', analysis.bestNonTravel, '', false) +
      '<article class="rec-card ' + (worthSaving.state === 'wait' ? 'wait' : '') + '">' +
        '<div class="rec-label">Worth Saving</div>' +
        '<div class="rec-title">' + esc(worthSaving.title) + '</div>' +
        (worthSaving.option ? '<div class="rec-value">' + esc(formatDollars(worthSaving.option.adjustedValue)) + '</div>' : '') +
        '<p class="section-copy">' + esc(worthSaving.body) + '</p>' +
      '</article>' +
    '</div>' +
  '</section>';
}

function renderAccountOptions(item) {
  var max = item.options.length ? item.options[0].adjustedValue : 1;
  return item.options.slice(0, 4).map(function (option) {
    var pct = max > 0 ? round(option.adjustedValue / max * 100, 0) : 0;
    var color = option.kind === 'transfer_partner' ? 'var(--gold)' : (option.isNonTravel ? 'var(--success)' : 'var(--accent)');
    return '<div class="option-row">' +
      '<div class="option-copy"><strong>' + esc(option.label) + '</strong><span>' + esc(option.kind === 'transfer_partner' ? option.cabinType + ' • ' + option.ratio : option.type.replace(/_/g, ' ')) + '</span></div>' +
      '<div class="option-track"><div class="option-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
      '<div class="option-values"><strong>' + esc(formatDollars(option.adjustedValue)) + '</strong><span>' + esc(option.netCpp.toFixed(2) + ' cpp') + '</span></div>' +
    '</div>';
  }).join('');
}

function renderAccountDetails(item) {
  var details = '';
  details += '<div class="detail-grid">' +
    '<div class="metric-card"><div class="mini-label">Best option</div><div class="value">' + esc(formatDollars(item.bestOption.adjustedValue)) + '</div><div class="section-copy">' + esc(item.bestOption.label + ' • ' + item.bestOption.modeScore.toFixed(1) + ' score') + '</div></div>' +
    '<div class="metric-card"><div class="mini-label">Floor option</div><div class="value">' + esc(formatDollars(item.floorOption.adjustedValue)) + '</div><div class="section-copy">' + esc(item.floorOption.label) + '</div></div>' +
  '</div>';
  if (item.householdBalance > 0) {
    details += '<div class="metric-card" style="margin-top:12px"><div class="mini-label">Household balance</div><div class="value">' + esc(formatPoints(item.householdBalance)) + '</div><div class="section-copy">Additional balance in the same program from your household member.</div></div>';
  }
  details += '<div class="sweet-grid" style="margin-top:12px">' + item.options.slice(0, 4).map(function (option) {
    return '<div class="sweet-card">' +
      '<h3>' + esc(option.label) + '</h3>' +
      '<p>' + esc(option.sweetSpot || 'Adjusted for WTP, surcharges, and booking complexity.') + '</p>' +
      '<div class="tag-row">' +
        '<span class="tag">' + esc(option.kind.replace('_', ' ')) + '</span>' +
        '<span class="tag">' + esc(option.cabinType) + '</span>' +
        '<span class="tag ' + (option.surcharges === 'high' ? 'warn' : 'success') + '">surcharges ' + esc(option.surcharges) + '</span>' +
      '</div>' +
    '</div>';
  }).join('') + '</div>';
  return details;
}

function renderByAccount(analysis) {
  return '<section class="panel section-panel">' +
    '<div class="section-header"><div><div class="mini-label">Portfolio</div><h2>By account</h2><p class="section-copy">Every account is scored once, then re-ranked by mode.</p></div></div>' +
    '<div class="account-list">' + analysis.accounts.map(function (item) {
      var expanded = !!state.expanded[item.account.id];
      return '<article class="account-card">' +
        '<div class="account-shell">' +
          '<div class="account-header">' +
            '<div><div class="account-name"><span class="type-dot ' + esc(item.account.type || 'other') + '"></span>' + esc(item.account.program) + '</div>' +
            '<div class="account-balance"><strong>' + esc(formatPoints(item.account.balance)) + ' ' + esc(item.account.currency || 'points') + '</strong><div class="section-copy">Best mode winner: ' + esc(item.bestOption.label) + ' • floor ' + esc(formatDollars(item.floorOption.adjustedValue)) + '</div></div></div>' +
            '<div class="rec-score">Score ' + esc(item.bestOption.modeScore.toFixed(1)) + '</div>' +
          '</div>' +
          '<div class="option-list">' + renderAccountOptions(item) + '</div>' +
        '</div>' +
        '<button type="button" class="expand-toggle" data-expand-account="' + esc(item.account.id) + '" aria-expanded="' + (expanded ? 'true' : 'false') + '">' +
          '<span>See detail and sweet spots</span><span>' + (expanded ? 'Hide' : 'Expand') + '</span></button>' +
        '<div class="detail-panel' + (expanded ? ' open' : '') + '">' + renderAccountDetails(item) + '</div>' +
      '</article>';
    }).join('') + '</div>' +
  '</section>';
}

function renderSweetSpots(analysis) {
  if (!analysis.sweetSpots.length) return '';
  return '<section class="panel section-panel">' +
    '<div class="section-header"><div><div class="mini-label">Sweet spots</div><h2>Transfer opportunities</h2><p class="section-copy">Only the high-value partners survive into this list.</p></div></div>' +
    '<div class="sweet-grid">' + analysis.sweetSpots.slice(0, 8).map(function (item) {
      return '<article class="sweet-card">' +
        '<h3>' + esc(item.account.program + ' → ' + item.option.label) + '</h3>' +
        '<p>' + esc(item.option.sweetSpot || 'High-value transfer partner.') + '</p>' +
        '<div class="tag-row">' +
          '<span class="tag">' + esc(item.option.netCpp.toFixed(2) + ' cpp') + '</span>' +
          '<span class="tag">' + esc(formatDollars(item.option.adjustedValue)) + '</span>' +
          '<span class="tag ' + (item.option.availability === 'high' ? 'success' : 'warn') + '">' + esc(item.option.availability + ' availability') + '</span>' +
        '</div>' +
      '</article>';
    }).join('') + '</div>' +
  '</section>';
}

function renderHouseholdList(household) {
  if (!household.length) {
    return '<div class="empty-state"><strong>Add a household member</strong>When two people hold points in the same program, pooling them can unlock better redemptions.</div>';
  }
  return '<div class="household-list">' + household.map(function (item) {
    return '<article class="household-card">' +
      '<h3><span>' + esc(item.memberName) + '</span><button type="button" class="btn btn-danger" data-remove-household="' + esc(item.id) + '">Remove</button></h3>' +
      '<p>' + esc(item.program) + ' • ' + esc(formatPoints(item.balance)) + ' ' + esc(item.currency) + '</p>' +
    '</article>';
  }).join('') + '</div>';
}

function programSelectOptions() {
  return getProgramEntries().map(function (entry) {
    return '<option value="' + esc(entry.name) + '">' + esc(entry.name) + '</option>';
  }).join('');
}

function renderSettings(analysis) {
  var prefs = analysis.prefs;
  return '<section class="panel section-panel settings-panel">' +
    '<div class="section-header"><div><div class="mini-label">Settings</div><h2>Preference inputs</h2><p class="section-copy">These fields steer scoring. Spending caps discount options that assume you\u0027d pay more than you actually would.</p></div></div>' +
    '<details>' +
      '<summary>Spending caps, complexity, and household</summary>' +
      '<div class="settings-body">' +
        '<div class="settings-grid">' +
          '<div class="setting-card field"><label for="pref-interestedInTravel">Interested in travel</label><select id="pref-interestedInTravel" data-pref="interestedInTravel"><option value="true"' + (prefs.interestedInTravel ? ' selected' : '') + '>Yes</option><option value="false"' + (!prefs.interestedInTravel ? ' selected' : '') + '>No</option></select></div>' +
          '<div class="setting-card field"><label for="pref-complexityTolerance">How many steps you\u0027ll tolerate</label><select id="pref-complexityTolerance" data-pref="complexityTolerance"><option value="low"' + (prefs.complexityTolerance === 'low' ? ' selected' : '') + '>Low</option><option value="medium"' + (prefs.complexityTolerance === 'medium' ? ' selected' : '') + '>Medium</option><option value="high"' + (prefs.complexityTolerance === 'high' ? ' selected' : '') + '>High</option></select></div>' +
          '<div class="setting-card field"><label for="pref-cabinPref">Cabin preference</label><select id="pref-cabinPref" data-pref="cabinPref"><option value="economy"' + (prefs.cabinPref === 'economy' ? ' selected' : '') + '>Economy</option><option value="premiumEconomy"' + (prefs.cabinPref === 'premiumEconomy' ? ' selected' : '') + '>Premium economy</option><option value="business"' + (prefs.cabinPref === 'business' ? ' selected' : '') + '>Business</option><option value="first"' + (prefs.cabinPref === 'first' ? ' selected' : '') + '>First</option></select></div>' +
          '<div class="setting-card field"><label for="pref-hotelPref">Hotel preference</label><select id="pref-hotelPref" data-pref="hotelPref"><option value="budgetHotel"' + (prefs.hotelPref === 'budgetHotel' ? ' selected' : '') + '>Budget</option><option value="midrangeHotel"' + (prefs.hotelPref === 'midrangeHotel' ? ' selected' : '') + '>Midrange</option><option value="luxuryHotel"' + (prefs.hotelPref === 'luxuryHotel' ? ' selected' : '') + '>Luxury</option><option value="resort"' + (prefs.hotelPref === 'resort' ? ' selected' : '') + '>Resort</option></select></div>' +
        '</div>' +
        '<div class="setting-card">' +
          '<div class="mini-label">Spending caps</div>' +
          '<div class="section-copy">When a redemption\u0027s value depends on a cash price you\u0027d never actually pay, these caps bring the estimate back to earth.</div>' +
          '<div class="caps-grid" style="margin-top:12px">' + Object.keys(prefs.wtpCaps).map(function (key) {
            return '<div class="field"><label for="cap-' + esc(key) + '">' + esc(key) + '</label><input id="cap-' + esc(key) + '" type="number" min="1" step="10" data-wtp-key="' + esc(key) + '" value="' + esc(prefs.wtpCaps[key]) + '"></div>';
          }).join('') + '</div>' +
        '</div>' +
        '<div class="setting-card">' +
          '<div class="mini-label">Household</div>' +
          '<div class="section-copy">Add your household member\u0027s loyalty balances here. They\u0027re stored separately from your main tracker data.</div>' +
          '<form id="household-form" class="household-form-grid" style="margin-top:12px">' +
            '<div class="field"><label for="household-name">Member</label><input id="household-name" name="memberName" type="text" placeholder="e.g. Partner, spouse"></div>' +
            '<div class="field"><label for="household-program">Program</label><input id="household-program" name="program" type="text" list="household-program-list" placeholder="Chase Ultimate Rewards"></div>' +
            '<div class="field"><label for="household-balance">Balance</label><input id="household-balance" name="balance" type="number" min="0" step="1" placeholder="25000"></div>' +
            '<button type="submit" class="btn btn-primary">Add balance</button>' +
          '</form>' +
          '<datalist id="household-program-list">' + programSelectOptions() + '</datalist>' +
          '<div style="margin-top:12px">' + renderHouseholdList(analysis.household) + '</div>' +
        '</div>' +
      '</div>' +
    '</details>' +
  '</section>';
}

function renderFreshness() {
  return '<div class="freshness">Program dataset updated ' + esc(window.PROGRAMS.lastUpdated) + ' • results auto-saved • household data stored separately</div>';
}

function renderEmptyState(title, copy, linkHref, linkLabel) {
  var html = '<section class="panel section-panel"><div class="empty-state"><strong>' + esc(title) + '</strong>' + esc(copy);
  if (linkHref && linkLabel) {
    html += '<br><a href="' + esc(linkHref) + '" class="btn btn-primary" style="display:inline-block;margin-top:14px;text-decoration:none">' + esc(linkLabel) + '</a>';
  }
  html += '</div></section>';
  return html;
}

function render() {
  var app = document.getElementById('app');
  var data = readRewardsData();
  if (data === 'corrupted') {
    app.innerHTML = renderEmptyState('Data could not be read', 'Your tracker data couldn\u0027t be read. Go to the tracker page and export a backup, then try re-importing it.', 'index.html', 'Open tracker');
    return;
  }
  if (!data || !data.accounts || !data.accounts.length) {
    app.innerHTML = renderEmptyState('Add accounts in the tracker first', 'Head to the tracker page and add at least one loyalty program balance to get started.', 'index.html', 'Open tracker');
    return;
  }
  var prefs = readPrefs();
  var household = readHousehold();
  var analysis = buildAnalysis(data, prefs, household);
  writeAgentResults(data, prefs);
  if (!analysis.activeAccounts.length) {
    app.innerHTML = renderEmptyState('No active balances to score', 'Your accounts are set up, but every balance is zero. Update your point totals in the tracker to see recommendations.', 'index.html', 'Update balances in tracker');
    return;
  }
  app.innerHTML = '' +
    renderHero(analysis) +
    renderModeStrip(prefs) +
    renderLeftOnTable(analysis) +
    renderWarnings(analysis) +
    renderRecommendations(analysis) +
    renderByAccount(analysis) +
    renderSweetSpots(analysis) +
    renderSettings(analysis) +
    renderFreshness();
  bindModeStripScroll();
}

function handleModeChange(mode) {
  var prefs = readPrefs();
  prefs.mode = mode;
  savePrefs(prefs);
  render();
}

function handlePrefInput(target) {
  var prefs = readPrefs();
  var key = target.getAttribute('data-pref');
  if (!key) return;
  if (key === 'interestedInTravel') prefs[key] = target.value === 'true';
  else prefs[key] = target.value;
  savePrefs(prefs);
  render();
}

function handleWtpInput(target) {
  var prefs = readPrefs();
  var key = target.getAttribute('data-wtp-key');
  if (!key) return;
  var value = Math.max(1, Math.floor(Number(target.value) || 0));
  prefs.wtpCaps[key] = value;
  savePrefs(prefs);
  render();
}

function handleHouseholdSubmit(form) {
  var memberName = form.memberName.value.trim() || 'Player two';
  var programName = form.program.value.trim();
  var balance = Math.max(0, Math.floor(Number(form.balance.value) || 0));
  if (!programName || !balance) return false;
  var program = findProgram(programName);
  if (!program) {
    window.alert('Choose a program from the shared dataset.');
    return false;
  }
  var household = readHousehold();
  household.push(normalizeHouseholdAccount({
    id: genId(),
    memberName: memberName,
    program: program.name,
    programSlug: program.slug,
    balance: balance,
    currency: program.currency,
    type: program.type
  }));
  saveHousehold(household);
  render();
  return false;
}

function bindModeStripScroll() {
  var strip = document.querySelector('.mode-strip');
  if (!strip) return;
  function updateMask() {
    var sl = strip.scrollLeft, max = strip.scrollWidth - strip.clientWidth;
    if (max <= 0) { strip.className = 'mode-strip'; return; }
    if (sl < 4) strip.className = 'mode-strip';
    else if (sl > max - 4) strip.className = 'mode-strip scrolled-end';
    else strip.className = 'mode-strip scrolled-mid';
  }
  strip.addEventListener('scroll', updateMask, { passive: true });
  updateMask();
}

function bindEvents() {
  var app = document.getElementById('app');
  app.addEventListener('click', function (event) {
    var modeButton = event.target.closest('[data-mode]');
    var expandButton = event.target.closest('[data-expand-account]');
    var removeHousehold = event.target.closest('[data-remove-household]');
    if (modeButton) {
      handleModeChange(modeButton.getAttribute('data-mode'));
      return;
    }
    if (expandButton) {
      var id = expandButton.getAttribute('data-expand-account');
      state.expanded[id] = !state.expanded[id];
      render();
      return;
    }
    if (removeHousehold) {
      var household = readHousehold().filter(function (item) {
        return item.id !== removeHousehold.getAttribute('data-remove-household');
      });
      saveHousehold(household);
      render();
    }
  });
  app.addEventListener('change', function (event) {
    if (event.target.matches('[data-pref]')) {
      handlePrefInput(event.target);
      return;
    }
    if (event.target.matches('[data-wtp-key]')) {
      handleWtpInput(event.target);
    }
  });
  app.addEventListener('submit', function (event) {
    if (event.target.id === 'household-form') {
      event.preventDefault();
      handleHouseholdSubmit(event.target);
    }
  });
  app.addEventListener('keydown', function (event) {
    var tab = event.target.closest('[data-mode]');
    if (!tab) return;
    if (event.key !== 'ArrowRight' && event.key !== 'ArrowLeft') return;
    event.preventDefault();
    var index = MODE_DEFS.findIndex(function (mode) { return mode.key === tab.getAttribute('data-mode'); });
    var next = event.key === 'ArrowRight' ? (index + 1) % MODE_DEFS.length : (index - 1 + MODE_DEFS.length) % MODE_DEFS.length;
    handleModeChange(MODE_DEFS[next].key);
    window.setTimeout(function () {
      var button = document.querySelector('[data-mode="' + MODE_DEFS[next].key + '"]');
      if (button) button.focus();
    }, 20);
  });
  window.addEventListener('storage', function (event) {
    if (event.key === STORAGE_KEY || event.key === PREFS_KEY || event.key === HOUSEHOLD_KEY) render();
  });
}

window.ChurnAdvisor = {
  DEFAULT_PREFS: DEFAULT_PREFS,
  MODE_DEFS: MODE_DEFS,
  readRewardsData: readRewardsData,
  readPrefs: readPrefs,
  savePrefs: savePrefs,
  readHousehold: readHousehold,
  saveHousehold: saveHousehold,
  applyWTP: applyWTP,
  calcNetCpp: calcNetCpp,
  scoreBFB: scoreBFB,
  rankByMode: rankByMode,
  checkExpiration: checkExpiration,
  buildAnalysis: buildAnalysis,
  writeAgentResults: writeAgentResults,
  render: render,
  findProgram: findProgram
};

bindEvents();
render();
</script>
</body>
</html>
