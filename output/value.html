<!DOCTYPE html>
<html lang="en" style="color-scheme:light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Churn — Value Advisor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600;1,9..144,700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
*:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

html { background: var(--bg); }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
}

@keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
}

.container { width: min(1060px, calc(100vw - 40px)); margin: 0 auto; }
.app-nav {
  position: relative;
  z-index: 40;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.app-nav-inner {
  width: min(1060px, calc(100vw - 40px));
  margin: 0 auto;
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.nav-brand {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text);
}
.nav-links {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 500;
  border-radius: 6px;
  transition: color 120ms ease, background 120ms ease;
  min-height: 44px;
  display: flex;
  align-items: center;
}
.nav-links a:hover { color: var(--text); }
.nav-links a.active {
  color: var(--text);
  background: var(--nav-active-bg);
  font-weight: 600;
}
.theme-toggle-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  cursor: pointer;
  padding: 6px 10px;
  font-size: 14px;
  line-height: 1;
  transition: color 120ms ease, border-color 120ms ease;
}
.theme-toggle-btn:hover { color: var(--text); border-color: var(--accent); }
[data-theme="dark"] .eyebrow,
[data-theme="dark"] .section-label { color: #C4841D; }
[data-theme="dark"] .btn-primary { background: #A47214; }
[data-theme="dark"] .btn-primary:hover { background: #B8860B; }

.page-header {
  padding: 40px 0 20px;
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: flex-end;
}
.eyebrow {
  color: var(--accent);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.page-header h1 {
  font-family: var(--font-display);
  font-size: 32px;
  line-height: 1.15;
  letter-spacing: -0.01em;
  margin-top: 8px;
  color: var(--text);
}
.page-header p {
  color: var(--text-muted);
  margin-top: 8px;
  max-width: 38rem;
  font-size: 15px;
}
.subnav-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--accent);
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
}
.subnav-link:hover { text-decoration: underline; }

.stack {
  display: grid;
  gap: 20px;
  padding-bottom: 48px;
}
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--panel-shadow);
}
.mini-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 700;
}
.verdict-line {
  color: var(--text-muted);
  font-size: 15px;
  margin-bottom: 4px;
}

.section-panel {
  padding: 24px;
  animation: fadeInUp 300ms ease-out;
}
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 12px;
  margin-bottom: 16px;
}
.section-header h2 {
  font-family: var(--font-display);
  font-size: 1.2rem;
  letter-spacing: -0.01em;
  font-weight: 600;
}
.section-copy {
  margin-top: 4px;
  font-size: 14px;
  color: var(--text-muted);
}

.lot-grid {
  display: grid;
  gap: 10px;
}
.lot-item {
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  background: var(--surface);
}
.lot-item h3 {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  gap: 12px;
}
.lot-item p {
  color: var(--text-muted);
  margin-top: 4px;
  font-size: 13px;
}
.comparison-bar {
  margin-top: 10px;
  display: grid;
  gap: 6px;
}
.comparison-row {
  display: grid;
  grid-template-columns: 90px 1fr auto;
  gap: 10px;
  align-items: center;
}
.comparison-track {
  height: 12px;
  border-radius: 999px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  overflow: hidden;
}
.comparison-fill {
  height: 100%;
  border-radius: 999px;
}

.warning-list {
  display: grid;
  gap: 10px;
}
.warning-card {
  border: 1px solid rgba(166,61,64,0.2);
  border-radius: 10px;
  background: rgba(166,61,64,0.03);
  padding: 16px;
}
.warning-card h3 {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
}
.warning-card p {
  color: var(--text-muted);
  margin-top: 4px;
  font-size: 13px;
}
.expired-badge {
  padding: 3px 7px;
  border-radius: 4px;
  background: rgba(166,61,64,0.08);
  color: var(--danger);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-size: 11px;
  font-weight: 700;
}



.account-list {
  display: grid;
  gap: 12px;
}
.account-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
  box-shadow: 0 1px 2px rgba(0,0,0,0.03);
}
.account-shell {
  padding: 18px;
}
.account-header {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: flex-start;
}
.account-name {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.account-expiry-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 7px;
  border-radius: 999px;
  background: rgba(122,90,8,0.1);
  color: var(--warning);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.account-expiry-badge.is-danger {
  background: var(--error-bg);
  color: var(--danger);
}
.type-dot {
  width: 8px;
  height: 8px;
  border-radius: 999px;
}
.type-dot.flexible, .type-dot.credit_card { background: var(--card-color); }
.type-dot.airline { background: var(--airline-color); }
.type-dot.hotel { background: var(--hotel-color); }
.type-dot.other { background: var(--other-color); }
.account-balance {
  margin-top: 12px;
  font-size: 14px;
  color: var(--text-muted);
}
.account-balance strong {
  display: block;
  color: var(--text);
  font-family: var(--font-display);
  font-size: 26px;
  letter-spacing: -0.03em;
}
.option-list {
  display: grid;
  gap: 8px;
  margin-top: 14px;
}
.trip-bridge {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  display: grid;
  gap: 12px;
}
.trip-bridge--danger {
  margin-top: 14px;
  padding: 14px;
  border: 1px solid rgba(166,61,64,0.2);
  border-radius: 12px;
  background: var(--error-bg);
}
.trip-bridge-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}
.trip-bridge-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 10px;
}
.trip-bridge-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface-2);
  padding: 14px;
  display: grid;
  gap: 10px;
}
.trip-bridge-card.book-now { border-color: rgba(45,122,79,0.22); }
.trip-bridge-card.almost-there { border-color: rgba(122,90,8,0.22); }
.trip-bridge-card.not-enough { border-color: var(--border); }
.trip-bridge-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}
.trip-bridge-top h3 {
  font-size: 14px;
  font-weight: 600;
}
.trip-bridge-top p {
  margin-top: 4px;
  color: var(--text-muted);
  font-size: 12px;
}
.trip-bridge-status {
  display: inline-flex;
  align-items: center;
  white-space: nowrap;
  padding: 4px 8px;
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.trip-bridge-card.book-now .trip-bridge-status {
  color: var(--success);
  border-color: rgba(45,122,79,0.22);
}
.trip-bridge-card.almost-there .trip-bridge-status {
  color: var(--warning);
  border-color: rgba(122,90,8,0.22);
}
.trip-bridge-card.not-enough .trip-bridge-status {
  color: var(--text-muted);
}
.trip-bridge-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.option-row {
  display: grid;
  grid-template-columns: minmax(0, 180px) 1fr auto;
  gap: 10px;
  align-items: center;
}
.option-copy strong { display: block; font-size: 14px; }
.option-copy span { display: block; color: var(--text-muted); font-size: 12px; margin-top: 1px; }
.option-track {
  height: 14px;
  border-radius: 999px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  overflow: hidden;
}
.option-fill {
  height: 100%;
  border-radius: 999px;
}
.option-values {
  text-align: right;
  min-width: 110px;
}
.option-values strong {
  display: block;
  font-size: 14px;
}
.option-values span {
  color: var(--text-muted);
  font-size: 12px;
}
.expand-toggle {
  width: 100%;
  border: none;
  border-top: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  cursor: pointer;
  font-size: 13px;
}
.detail-panel {
  display: none;
  border-top: 1px solid var(--border);
  padding: 18px;
  background: var(--surface-2);
}
.detail-panel.open { display: block; }
.detail-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.metric-card, .sweet-card, .household-card, .setting-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  padding: 16px;
}
.metric-card .value {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.03em;
  margin-top: 6px;
}
.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
}
.tag {
  padding: 3px 7px;
  border-radius: 4px;
  background: rgba(139,94,16,0.08);
  color: var(--accent);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}
.tag.warn { background: rgba(122,90,8,0.1); color: var(--warning); }
.tag.success { background: rgba(45,122,79,0.08); color: var(--success); }

.sweet-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 10px;
}
.sweet-card h3 {
  font-size: 14px;
  font-weight: 600;
}
.sweet-card p {
  color: var(--text-muted);
  margin-top: 4px;
  font-size: 13px;
}

.settings-panel details {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  overflow: hidden;
}
.settings-panel summary {
  list-style: none;
  cursor: pointer;
  padding: 14px 18px;
  font-weight: 600;
  font-size: 14px;
}
.settings-panel summary::-webkit-details-marker { display: none; }
.settings-body {
  padding: 0 18px 18px;
  display: grid;
  gap: 14px;
}
.settings-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.settings-grid .field, .household-form-grid .field {
  display: grid;
  gap: 6px;
}
.field label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 600;
}
.field input, .field select {
  width: 100%;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  padding: 10px 12px;
  font-size: 14px;
}
.field input:focus, .field select:focus {
  border-color: var(--accent);
  outline: none;
  box-shadow: 0 0 0 3px rgba(139,94,16,0.1);
}
.caps-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
}
.caps-grid .field label {
  letter-spacing: 0.06em;
  text-transform: none;
  font-size: 11px;
}
.household-form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 0.8fr auto;
  gap: 8px;
  align-items: end;
}
.household-list {
  display: grid;
  gap: 8px;
}
.household-card h3 {
  font-size: 14px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  gap: 12px;
}
.household-card p {
  color: var(--text-muted);
  margin-top: 4px;
  font-size: 13px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border-radius: 8px;
  border: 1px solid transparent;
  padding: 11px 16px;
  cursor: pointer;
  font: inherit;
  font-size: 14px;
  transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
}
.btn:hover { transform: none; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--surface); border-color: var(--border); color: var(--text); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: rgba(166,61,64,0.04); border-color: rgba(166,61,64,0.2); color: var(--danger); }

.freshness {
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
  padding: 4px 0 12px;
}

.empty-state {
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 28px;
  text-align: center;
  color: var(--text-muted);
}
.empty-state strong { display: block; color: var(--text); margin-bottom: 6px; }

@media (max-width: 980px) {
  .settings-grid, .caps-grid, .detail-grid {
    grid-template-columns: 1fr;
  }
  .household-form-grid { grid-template-columns: 1fr; }
}

@media (max-width: 767px) {
  .container, .app-nav-inner { width: calc(100vw - 24px); }
  .page-header { flex-direction: column; align-items: flex-start; padding-top: 28px; }
  .caps-grid { grid-template-columns: 1fr; }
  .trip-bridge-header, .trip-bridge-top {
    flex-direction: column;
    align-items: flex-start;
  }
  .option-row, .comparison-row {
    grid-template-columns: 1fr;
  }
  .option-values { text-align: left; min-width: 0; }
}
</style>
</head>

<script>
'use strict';

var STORAGE_KEY = 'churn_data';
var LEGACY_STORAGE_KEY = 'osaka_data';
var PREFS_KEY = 'valueAdvisorPrefs';
var HOUSEHOLD_KEY = 'churn_household';
var LEGACY_HOUSEHOLD_KEY = 'osaka_household';
var state = { expanded: {} };
var sweetSpotsState = { status: 'loading', data: null, error: null };
var sweetSpotsPromise = null;
var sweetSpotsRequestId = 0;
var DEFAULT_PREFS = {
  surfaceMode: 'stretch_value',
  mode: 'max_value',
  interestedInTravel: true,
  cabinPref: 'economy',
  hotelPref: 'midrangeHotel',
  complexityTolerance: 'medium',
  wtpCaps: {
    economy: 500,
    premiumEconomy: 1000,
    business: 2500,
    first: 5000,
    budgetHotel: 150,
    midrangeHotel: 300,
    luxuryHotel: 600,
    resort: 800
  }
};
var TYPE_COLORS = {
  flexible: 'var(--card-color)',
  credit_card: 'var(--card-color)',
  airline: 'var(--airline-color)',
  hotel: 'var(--hotel-color)',
  other: 'var(--other-color)'
};

function esc(value) {
  var node = document.createElement('span');
  node.textContent = value == null ? '' : String(value);
  return node.innerHTML;
}

function formatDollars(number) {
  return '$' + Number(number || 0).toLocaleString(undefined, {
    minimumFractionDigits: number % 1 ? 2 : 0,
    maximumFractionDigits: 2
  });
}

function formatPoints(number) {
  return Number(number || 0).toLocaleString();
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function round(value, digits) {
  var scale = Math.pow(10, digits || 0);
  return Math.round(value * scale) / scale;
}

function deepClone(value) {
  return JSON.parse(JSON.stringify(value));
}

function mergePrefs(raw) {
  var prefs = deepClone(DEFAULT_PREFS);
  if (!raw || typeof raw !== 'object') return prefs;
  Object.keys(raw).forEach(function (key) {
    if (key === 'wtpCaps' && raw.wtpCaps && typeof raw.wtpCaps === 'object') {
      Object.keys(raw.wtpCaps).forEach(function (capKey) {
        var amount = Number(raw.wtpCaps[capKey]);
        if (isFinite(amount) && amount > 0) prefs.wtpCaps[capKey] = amount;
      });
    } else if (raw[key] != null) {
      prefs[key] = raw[key];
    }
  });
  return prefs;
}

function mapLegacySurfaceMode(mode) {
  return {
    max_value: 'stretch_value',
    min_cash: 'cash_out',
    simple: 'simple',
    travel_now: 'travel_now',
    no_travel: 'floor_value',
    expiring: 'use_soon',
    luxury: 'stretch_value'
  }[mode] || 'stretch_value';
}

function detectAutoMode(data, prefs) {
  var accounts = data && Array.isArray(data.accounts) ? data.accounts : [];
  var hasExpiring = accounts.some(function (account) {
    var expiration = checkExpiration(account);
    return expiration && expiration.atRisk;
  });
  var urgent = hasExpiring && accounts.some(function (account) {
    var expiration = checkExpiration(account);
    return expiration && expiration.atRisk && (expiration.daysRemaining == null || expiration.daysRemaining <= 90);
  });
  if (prefs && prefs.interestedInTravel === false) return 'no_travel';
  if (prefs && prefs.complexityTolerance === 'low') return 'simple';
  if (prefs && (prefs.cabinPref === 'business' || prefs.cabinPref === 'first' || prefs.hotelPref === 'luxuryHotel' || prefs.hotelPref === 'resort')) {
    return 'luxury';
  }
  if (urgent) return 'expiring';
  return 'max_value';
}

function normalizePrefs(raw, data) {
  var prefs = mergePrefs(raw);
  prefs.mode = raw && raw.mode ? raw.mode : detectAutoMode(data, prefs);
  prefs.surfaceMode = raw && raw.surfaceMode ? raw.surfaceMode : mapLegacySurfaceMode(prefs.mode);
  return prefs;
}

function readRewardsData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      raw = localStorage.getItem(LEGACY_STORAGE_KEY);
      if (raw) { localStorage.setItem(STORAGE_KEY, raw); localStorage.removeItem(LEGACY_STORAGE_KEY); }
    }
    if (!raw) return null;
    var data = JSON.parse(raw);
    if (!data || !Array.isArray(data.accounts)) return null;
    return data;
  } catch (error) {
    return 'corrupted';
  }
}

function readPrefs() {
  var data = readRewardsData();
  try {
    var raw = localStorage.getItem(PREFS_KEY);
    if (!raw) return normalizePrefs(null, data);
    return normalizePrefs(JSON.parse(raw), data);
  } catch (error) {
    return normalizePrefs(null, data);
  }
}

function savePrefs(prefs) {
  localStorage.setItem(PREFS_KEY, JSON.stringify(normalizePrefs(prefs, readRewardsData())));
}

function normalizeHouseholdAccount(item) {
  if (!item || typeof item !== 'object') return null;
  var programName = item.program || getProgramNameBySlug(item.programSlug) || '';
  var program = findProgram(programName, item.programSlug);
  return {
    id: typeof item.id === 'string' ? item.id : genId(),
    memberName: typeof item.memberName === 'string' && item.memberName.trim() ? item.memberName.trim() : 'Player two',
    program: programName,
    programSlug: program ? program.slug : (item.programSlug || null),
    balance: Math.max(0, Math.floor(Number(item.balance) || 0)),
    currency: program ? program.currency : (item.currency || 'points'),
    type: program ? program.type : (item.type || 'other')
  };
}

function readHousehold() {
  try {
    var raw = localStorage.getItem(HOUSEHOLD_KEY);
    if (!raw) {
      raw = localStorage.getItem(LEGACY_HOUSEHOLD_KEY);
      if (raw) { localStorage.setItem(HOUSEHOLD_KEY, raw); localStorage.removeItem(LEGACY_HOUSEHOLD_KEY); }
    }
    if (!raw) return [];
    var parsed = JSON.parse(raw);
    if (Array.isArray(parsed)) {
      return parsed.map(normalizeHouseholdAccount).filter(Boolean);
    }
    if (parsed && Array.isArray(parsed.accounts)) {
      return parsed.accounts.map(normalizeHouseholdAccount).filter(Boolean);
    }
    return [];
  } catch (error) {
    return [];
  }
}

function saveHousehold(items) {
  localStorage.setItem(HOUSEHOLD_KEY, JSON.stringify(items.map(normalizeHouseholdAccount).filter(Boolean)));
}

function genId() {
  try {
    return crypto.randomUUID();
  } catch (error) {
    return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
  }
}

function getProgramEntries() {
  return Object.keys(window.PROGRAMS.programs).map(function (name) {
    var program = window.PROGRAMS.programs[name];
    return {
      name: name,
      slug: program.slug,
      program: program
    };
  }).sort(function (left, right) {
    return left.name.localeCompare(right.name);
  });
}

function getProgramNameBySlug(slug) {
  var entry = getProgramEntries().find(function (item) { return item.slug === slug; });
  return entry ? entry.name : null;
}

function findProgram(name, slug) {
  if (slug) {
    var bySlugName = getProgramNameBySlug(slug);
    if (bySlugName) return Object.assign({ name: bySlugName }, window.PROGRAMS.programs[bySlugName]);
  }
  if (name && window.PROGRAMS.programs[name]) return Object.assign({ name: name }, window.PROGRAMS.programs[name]);
  if (name) {
    var match = getProgramEntries().find(function (entry) {
      return entry.name.toLowerCase() === String(name).toLowerCase();
    });
    if (match) return Object.assign({ name: match.name }, match.program);
  }
  return null;
}

function programFromAccount(account) {
  return findProgram(account.program, account.programSlug);
}

function parseRatio(ratioStr) {
  if (!ratioStr || typeof ratioStr !== 'string') return 1;
  var parts = ratioStr.split(':');
  if (parts.length !== 2) return 1;
  var from = parseFloat(parts[0]);
  var to = parseFloat(parts[1]);
  if (!from || !to || isNaN(from) || isNaN(to)) return 1;
  return to / from;
}

function normalizeSweetSpots(payload) {
  return {
    flights: payload && Array.isArray(payload.flights) ? payload.flights : [],
    hotels: payload && Array.isArray(payload.hotels) ? payload.hotels : []
  };
}

function flattenSweetSpots(payload) {
  var normalized = normalizeSweetSpots(payload);
  return normalized.flights.map(function (item) {
    return Object.assign({ _type: 'flight' }, item);
  }).concat(normalized.hotels.map(function (item) {
    return Object.assign({ _type: 'hotel' }, item);
  }));
}

function loadSweetSpots(fetchImpl, forceReload) {
  if (sweetSpotsPromise && !forceReload && !fetchImpl) return sweetSpotsPromise;
  var impl = fetchImpl || window.fetch;
  var requestId = ++sweetSpotsRequestId;
  if (typeof impl !== 'function') {
    sweetSpotsState = { status: 'error', data: null, error: new Error('Fetch unavailable') };
    sweetSpotsPromise = Promise.resolve(sweetSpotsState);
    return sweetSpotsPromise;
  }
  sweetSpotsState = { status: 'loading', data: sweetSpotsState.data, error: null };
  sweetSpotsPromise = Promise.resolve()
    .then(function () {
      return impl('./sweetSpots.json');
    })
    .then(function (response) {
      if (!response || response.ok === false) {
        throw new Error('Could not load sweetSpots.json');
      }
      return response.json();
    })
    .then(function (payload) {
      if (requestId !== sweetSpotsRequestId) return sweetSpotsState;
      sweetSpotsState = { status: 'ready', data: normalizeSweetSpots(payload), error: null };
      if (document.getElementById('app')) render();
      return sweetSpotsState;
    })
    .catch(function (error) {
      if (requestId !== sweetSpotsRequestId) return sweetSpotsState;
      sweetSpotsState = { status: 'error', data: null, error: error };
      if (document.getElementById('app')) render();
      return sweetSpotsState;
    });
  return sweetSpotsPromise;
}

function typeColor(type) {
  return TYPE_COLORS[type] || TYPE_COLORS.other;
}

function applyWTP(rawValue, cabinType, prefs) {
  return window.ChurnEngine.applyWTP(rawValue, cabinType, prefs);
}

function calcNetCpp(balance, bestCpp, surchargeData) {
  return window.ChurnEngine.calcNetCpp(balance, bestCpp, surchargeData);
}

function scoreBFB(option, floor, prefs, mode) {
  return window.ChurnEngine.scoreBFB(option, floor, prefs, mode);
}

function rankByMode(scoredOptions, mode) {
  return window.ChurnEngine.rankByMode(scoredOptions, mode);
}

function checkExpiration(account) {
  return window.ChurnEngine.checkExpiration(account, window.PROGRAMS.expirationRules);
}

function buildAnalysis(data, prefs, household) {
  return window.ChurnEngine.buildAnalysis(data, prefs, household, {
    normalizePrefs: normalizePrefs,
    programFromAccount: programFromAccount,
    expirationRules: window.PROGRAMS.expirationRules
  });
}

function scoreLabel(score) {
  return window.ChurnEngine.scoreLabel(score);
}

function formatScoreLabel(score) {
  return scoreLabel(score) + ' • ' + Number(score || 0).toFixed(1);
}

function buildVerdictLine(analysis) {
  return window.ChurnEngine.buildVerdictLine(analysis);
}

function writeAgentResults(data, prefs) {
  var household = readHousehold();
  var analysis = buildAnalysis(data, prefs, household);
  var best = analysis.bestOverall || analysis.bestSimple || analysis.bestNonTravel || null;
  var urgent = analysis.expiring[0] || null;
  var primary = (urgent && urgent.expiration && urgent.expiration.atRisk) ? urgent.bestOption : best;
  var primaryAccount = primary && primary.account ? primary.account : (urgent && urgent.account ? urgent.account : null);
  var summaryLine = buildVerdictLine(analysis);
  var state = !primary ? 'wait' : (urgent && urgent.expiration && urgent.expiration.atRisk ? 'urgent' : 'stretch');
  var result = {
    generatedAt: new Date().toISOString(),
    mode: analysis.prefs.mode,
    userPreferences: analysis.prefs,
    household: household,
    verdict: {
      state: state,
      title: summaryLine,
      body: '',
      summary: summaryLine,
      program: primaryAccount ? primaryAccount.program : null,
      adjusted_value: primary ? primary.adjustedValue : null,
      option_label: primary ? primary.label : null,
      score_label: primary ? scoreLabel(primary.modeScore) : null
    },
    totals: {
      best: analysis.totalBest,
      floor: analysis.totalFloor,
      leftOnTable: analysis.totalGap
    },
    portfolio: analysis.activeAccounts.map(function (item) {
      return {
        program: item.account.program,
        balance: item.account.balance,
        bestOption: {
          label: item.bestOption.label,
          kind: item.bestOption.kind,
          raw_cpp: item.bestOption.rawCpp,
          net_cpp: item.bestOption.netCpp,
          adjusted_value: item.bestOption.adjustedValue,
          bfb_score: item.bestOption.modeScore,
          sweet_spot: item.bestOption.sweetSpot || '',
          cabin_type: item.bestOption.cabinType
        },
        floorOption: {
          label: item.floorOption.label,
          adjusted_value: item.floorOption.adjustedValue
        },
        leftOnTable: item.leftOnTable,
        expiration: item.expiration,
        householdBalance: item.householdBalance,
        alternatives: item.options.slice(1, 4).map(function (option) {
          return {
            label: option.label,
            kind: option.kind,
            adjusted_value: option.adjustedValue,
            bfb_score: option.modeScore,
            wtp_adjusted: option.adjustedValue !== option.rawValue
          };
        })
      };
    })
  };
  try {
    localStorage.setItem('valueAdvisorResults', JSON.stringify(result));
  } catch (error) {
    // Ignore storage write failures.
  }
  return result;
}

function tripBridgeStatus(available, needed) {
  var gap = Math.max(0, needed - available);
  if (gap <= 0) return { key: 'book-now', label: 'Book now', gap: 0 };
  if (gap <= needed * 0.3) return { key: 'almost-there', label: 'Almost there', gap: gap };
  return { key: 'not-enough', label: 'Need more', gap: gap };
}

function findTripBridgePath(item, targetProgram) {
  var balance = Math.max(0, Number(item && item.account && item.account.balance) || 0);
  if (!balance) return null;
  if (item.account.program === targetProgram) {
    return {
      account: item.account,
      ratio: 1,
      available: balance,
      isDirect: true,
      sourceName: item.account.program,
      transferRatio: '1:1'
    };
  }
  if (!item.program || !Array.isArray(item.program.transferPartners)) return null;
  var bestPath = null;
  item.program.transferPartners.forEach(function (partner) {
    if (partner.partner !== targetProgram) return;
    var ratio = parseRatio(partner.ratio);
    var available = Math.floor(balance * ratio);
    if (!bestPath || available > bestPath.available) {
      bestPath = {
        account: item.account,
        ratio: ratio,
        available: available,
        isDirect: false,
        sourceName: item.account.program,
        transferRatio: partner.ratio
      };
    }
  });
  return bestPath;
}

function findTripBridgeMatches(item, sweetSpots) {
  var statusOrder = { 'book-now': 0, 'almost-there': 1, 'not-enough': 2 };
  return flattenSweetSpots(sweetSpots).map(function (spot) {
    var path = findTripBridgePath(item, spot.program);
    if (!path) return null;
    var status = tripBridgeStatus(path.available, Number(spot.points_required) || 0);
    return {
      spot: spot,
      path: path,
      needed: Number(spot.points_required) || 0,
      available: path.available,
      status: status
    };
  }).filter(Boolean).sort(function (left, right) {
    var leftOrder = statusOrder[left.status.key];
    var rightOrder = statusOrder[right.status.key];
    if (leftOrder !== rightOrder) return leftOrder - rightOrder;
    return (right.spot.cpp_estimate || 0) - (left.spot.cpp_estimate || 0);
  });
}

function renderExpirationBadge(expiration) {
  if (!expiration || !expiration.atRisk) return '';
  return '<span class="account-expiry-badge' + (expiration.expired ? ' is-danger' : '') + '">' +
    esc(expiration.expired ? 'Expired' : expiration.message) +
  '</span>';
}

function renderTripBridge(item) {
  var toneClass = item.expiration && item.expiration.atRisk ? ' trip-bridge--danger' : '';
  if (sweetSpotsState.status === 'loading') {
    return '<div class="trip-bridge' + toneClass + '">' +
      '<div class="trip-bridge-header"><div><div class="mini-label">Trip bridge</div><div class="section-copy">Checking current sweet spots for this balance.</div></div></div>' +
    '</div>';
  }
  if (sweetSpotsState.status === 'error') {
    return '<div class="trip-bridge' + toneClass + '">' +
      '<div class="trip-bridge-header"><div><div class="mini-label">Trip bridge</div><div class="section-copy">Trip ideas unavailable right now. Open the Trips page to retry.</div></div><a href="trips.html" class="subnav-link">Open Trips &rarr;</a></div>' +
    '</div>';
  }
  var matches = findTripBridgeMatches(item, sweetSpotsState.data);
  if (!matches.length) {
    return '<div class="trip-bridge' + toneClass + '">' +
      '<div class="trip-bridge-header"><div><div class="mini-label">Trip bridge</div><div class="section-copy">No matching sweet spots yet.</div></div><a href="trips.html" class="subnav-link">Open Trips &rarr;</a></div>' +
    '</div>';
  }
  return '<div class="trip-bridge' + toneClass + '">' +
    '<div class="trip-bridge-header"><div><div class="mini-label">Trip bridge</div><div class="section-copy">How this balance connects to your trips.</div></div><a href="trips.html" class="subnav-link">Open Trips &rarr;</a></div>' +
    '<div class="trip-bridge-grid">' + matches.slice(0, 3).map(function (match) {
      var descriptor = match.spot._type === 'hotel'
        ? 'Cat ' + esc(match.spot.category) + ' hotel' + (match.spot.nights ? ' • ' + esc(match.spot.nights) + ' nights' : '')
        : esc(match.spot.cabin || 'award') + ' • ' + esc(match.spot.route || '');
      var access = match.path.isDirect
        ? 'Direct balance in ' + match.spot.program
        : 'Transfer from ' + match.path.sourceName + ' at ' + match.path.transferRatio;
      var gapCopy = match.status.gap > 0
        ? formatPoints(match.status.gap) + ' short'
        : formatPoints(match.available) + ' available';
      return '<article class="trip-bridge-card ' + match.status.key + '">' +
        '<div class="trip-bridge-top"><div><h3>' + esc(match.spot.destination) + '</h3><p>' + descriptor + '</p></div><span class="trip-bridge-status">' + esc(match.status.label) + '</span></div>' +
        '<div class="trip-bridge-meta">' +
          '<span class="tag">' + esc(match.spot.program) + '</span>' +
          '<span class="tag">' + esc(formatPoints(match.needed) + ' pts') + '</span>' +
          '<span class="tag">' + esc(gapCopy) + '</span>' +
        '</div>' +
        '<p class="section-copy">' + esc(access + '. ' + (match.spot.caveat || '')) + '</p>' +
      '</article>';
    }).join('') + '</div>' +
  '</div>';
}

function renderVerdictLine(analysis) {
  return '<p class="verdict-line">' + esc(buildVerdictLine(analysis)) + '</p>';
}

function renderAccountOptions(item) {
  var max = item.options.length ? item.options[0].adjustedValue : 1;
  return item.options.slice(0, 4).map(function (option) {
    var pct = max > 0 ? round(option.adjustedValue / max * 100, 0) : 0;
    var color = option.kind === 'transfer_partner' ? 'var(--gold)' : (option.isNonTravel ? 'var(--success)' : 'var(--accent)');
    return '<div class="option-row">' +
      '<div class="option-copy"><strong>' + esc(option.label) + '</strong><span>' + esc(option.kind === 'transfer_partner' ? option.cabinType + ' • ' + option.ratio : option.type.replace(/_/g, ' ')) + '</span></div>' +
      '<div class="option-track"><div class="option-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
      '<div class="option-values"><strong>' + esc(formatDollars(option.adjustedValue)) + '</strong><span>' + esc(formatScoreLabel(option.modeScore) + ' • ' + option.netCpp.toFixed(2) + ' cpp') + '</span></div>' +
    '</div>';
  }).join('');
}

function renderAccountDetails(item) {
  var details = '';
  details += '<div class="detail-grid">' +
    '<div class="metric-card"><div class="mini-label">Best option</div><div class="value">' + esc(formatDollars(item.bestOption.adjustedValue)) + '</div><div class="section-copy">' + esc(item.bestOption.label + ' • ' + formatScoreLabel(item.bestOption.modeScore)) + '</div></div>' +
    '<div class="metric-card"><div class="mini-label">Floor option</div><div class="value">' + esc(formatDollars(item.floorOption.adjustedValue)) + '</div><div class="section-copy">' + esc(item.floorOption.label) + '</div></div>' +
  '</div>';
  if (item.householdBalance > 0) {
    details += '<div class="metric-card" style="margin-top:12px"><div class="mini-label">Household balance</div><div class="value">' + esc(formatPoints(item.householdBalance)) + '</div><div class="section-copy">From household member in same program.</div></div>';
  }
  details += '<div class="sweet-grid" style="margin-top:12px">' + item.options.slice(0, 4).map(function (option) {
    return '<div class="sweet-card">' +
      '<h3>' + esc(option.label) + '</h3>' +
      '<p>' + esc(option.sweetSpot || 'Adjusted for spending caps and booking friction.') + '</p>' +
      '<div class="tag-row">' +
        '<span class="tag">' + esc(option.kind.replace('_', ' ')) + '</span>' +
        '<span class="tag">' + esc(option.cabinType) + '</span>' +
        '<span class="tag ' + (option.surcharges === 'high' ? 'warn' : 'success') + '">surcharges ' + esc(option.surcharges) + '</span>' +
      '</div>' +
    '</div>';
  }).join('') + '</div>';
  return details;
}

function renderByAccount(analysis) {
  return '<section class="panel section-panel">' +
    '<div class="account-list">' + analysis.accounts.map(function (item) {
      var expanded = !!state.expanded[item.account.id];
      return '<article class="account-card">' +
        '<div class="account-shell">' +
          '<div class="account-header">' +
            '<div><div class="account-name"><span class="type-dot ' + esc(item.account.type || 'other') + '"></span><span>' + esc(item.account.program) + '</span>' + renderExpirationBadge(item.expiration) + '</div>' +
            '<div class="account-balance"><strong>' + esc(formatPoints(item.account.balance)) + ' ' + esc(item.account.currency || 'points') + '</strong><div class="section-copy">Best: ' + esc(item.bestOption.label) + ' (' + esc(formatDollars(item.bestOption.adjustedValue)) + ') • floor ' + esc(formatDollars(item.floorOption.adjustedValue)) + '</div></div></div>' +
          '</div>' +
          '<div class="option-list">' + renderAccountOptions(item) + '</div>' +
          renderTripBridge(item) +
        '</div>' +
        '<button type="button" class="expand-toggle" data-expand-account="' + esc(item.account.id) + '" aria-expanded="' + (expanded ? 'true' : 'false') + '">' +
          '<span>Details</span><span>' + (expanded ? 'Hide' : 'Expand') + '</span></button>' +
        '<div class="detail-panel' + (expanded ? ' open' : '') + '">' + renderAccountDetails(item) + '</div>' +
      '</article>';
    }).join('') + '</div>' +
  '</section>';
}

function renderFreshness() {
  return '<div class="freshness">Dataset updated ' + esc(window.PROGRAMS.lastUpdated) + '</div>';
}

function renderEmptyState(title, copy, linkHref, linkLabel) {
  var html = '<section class="panel section-panel"><div class="empty-state"><strong>' + esc(title) + '</strong>' + esc(copy);
  if (linkHref && linkLabel) {
    html += '<br><a href="' + esc(linkHref) + '" class="btn btn-primary" style="display:inline-block;margin-top:14px;text-decoration:none">' + esc(linkLabel) + '</a>';
  }
  html += '</div></section>';
  return html;
}

function render() {
  var app = document.getElementById('app');
  var data = readRewardsData();
  if (data === 'corrupted') {
    app.innerHTML = renderEmptyState('Data could not be read', 'Export a backup from the tracker, then re-import.', 'index.html', 'Open tracker');
    return;
  }
  if (!data || !data.accounts || !data.accounts.length) {
    app.innerHTML = renderEmptyState('No accounts yet', 'Add a loyalty program in the tracker to get started.', 'index.html', 'Open tracker');
    return;
  }
  var prefs = readPrefs();
  var household = readHousehold();
  var analysis = buildAnalysis(data, prefs, household);
  writeAgentResults(data, prefs);
  if (!analysis.activeAccounts.length) {
    app.innerHTML = renderEmptyState('All balances are zero', 'Update your point totals in the tracker to see recommendations.', 'index.html', 'Update balances');
    return;
  }
  app.innerHTML = '' +
    renderVerdictLine(analysis) +
    renderByAccount(analysis) +
    renderFreshness();
}

function bindEvents() {
  var app = document.getElementById('app');
  app.addEventListener('click', function (event) {
    var expandButton = event.target.closest('[data-expand-account]');
    if (expandButton) {
      var id = expandButton.getAttribute('data-expand-account');
      state.expanded[id] = !state.expanded[id];
      render();
      return;
    }
  });
  window.addEventListener('storage', function (event) {
    if (event.key === STORAGE_KEY || event.key === PREFS_KEY || event.key === HOUSEHOLD_KEY) render();
  });
}

window.ChurnAdvisor = {
  DEFAULT_PREFS: DEFAULT_PREFS,
  readRewardsData: readRewardsData,
  readPrefs: readPrefs,
  savePrefs: savePrefs,
  readHousehold: readHousehold,
  saveHousehold: saveHousehold,
  applyWTP: applyWTP,
  calcNetCpp: calcNetCpp,
  scoreBFB: scoreBFB,
  rankByMode: rankByMode,
  detectAutoMode: detectAutoMode,
  scoreLabel: scoreLabel,
  checkExpiration: checkExpiration,
  buildAnalysis: buildAnalysis,
  writeAgentResults: writeAgentResults,
  render: render,
  findProgram: findProgram,
  findTripBridgeMatches: findTripBridgeMatches,
  renderTripBridge: renderTripBridge,
  loadSweetSpots: loadSweetSpots
};

bindEvents();
render();
loadSweetSpots();

/* ── Theme toggle ──────────────────────────────── */
(function () {
  var THEME_KEY = 'churn-theme';
  var html = document.documentElement;
  var btn = document.getElementById('theme-toggle');
  function applyTheme(theme) {
    if (theme === 'dark') {
      html.setAttribute('data-theme', 'dark');
      html.style.colorScheme = 'dark';
      if (btn) btn.textContent = '\u2600';
    } else {
      html.removeAttribute('data-theme');
      html.style.colorScheme = 'light';
      if (btn) btn.textContent = '\u263E';
    }
  }
  var saved = null;
  try { saved = localStorage.getItem(THEME_KEY); } catch (e) {}
  if (saved === 'dark' || saved === 'light') {
    applyTheme(saved);
  } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    applyTheme('dark');
  }
  if (btn) {
    btn.addEventListener('click', function () {
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      try { localStorage.setItem(THEME_KEY, next); } catch (e) {}
    });
  }
})();
