<!DOCTYPE html>
<html lang="en" style="color-scheme:light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Churn — Value Advisor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600;1,9..144,700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
*:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

html { background: var(--bg); }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
}

@keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
}

.container { width: min(1060px, calc(100vw - 40px)); margin: 0 auto; }
.app-nav {
  position: relative;
  z-index: 40;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.app-nav-inner {
  width: min(1060px, calc(100vw - 40px));
  margin: 0 auto;
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.nav-brand {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text);
}
.nav-links {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 500;
  border-radius: 6px;
  transition: color 120ms ease, background 120ms ease;
  min-height: 44px;
  display: flex;
  align-items: center;
}
.nav-links a:hover { color: var(--text); }
.nav-links a.active {
  color: var(--text);
  background: var(--nav-active-bg);
  font-weight: 600;
}
.theme-toggle-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  cursor: pointer;
  padding: 6px 10px;
  font-size: 14px;
  line-height: 1;
  transition: color 120ms ease, border-color 120ms ease;
}
.theme-toggle-btn:hover { color: var(--text); border-color: var(--accent); }
[data-theme="dark"] .eyebrow,
[data-theme="dark"] .section-label { color: #C4841D; }
[data-theme="dark"] .btn-primary { background: #A47214; }
[data-theme="dark"] .btn-primary:hover { background: #B8860B; }

.page-header {
  padding: 40px 0 20px;
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: flex-end;
}
.eyebrow {
  color: var(--accent);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.page-header h1 {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  line-height: 1.1;
  letter-spacing: -0.03em;
  margin-top: 8px;
  color: var(--text);
}
.page-header p {
  color: var(--text-muted);
  margin-top: 8px;
  max-width: 38rem;
  font-size: 15px;
}
.subnav-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--accent);
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
}
.subnav-link:hover { text-decoration: underline; }

.stack {
  display: grid;
  gap: 20px;
  padding-bottom: 48px;
}
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--panel-shadow);
}
.hero-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.85fr);
  gap: 20px;
}
.hero-card, .delta-card {
  padding: 24px;
  animation: fadeInUp 220ms ease-out;
}
.mini-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 700;
}
.hero-value {
  font-family: var(--font-display);
  font-size: clamp(2.2rem, 6vw, 3.8rem);
  line-height: 1;
  letter-spacing: -0.04em;
  margin-top: 8px;
  color: var(--text);
}
.hero-copy {
  margin-top: 8px;
  font-size: 14px;
  color: var(--text-muted);
}
.summary-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
}
.summary-chip {
  padding: 7px 10px;
  border-radius: 6px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  font-size: 13px;
  color: var(--text-muted);
}
.delta-card {
  display: grid;
  align-content: start;
  gap: 12px;
}
.delta-figure {
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--accent);
}
.delta-bars {
  display: grid;
  gap: 10px;
}
.delta-bar {
  display: grid;
  grid-template-columns: 100px 1fr auto;
  gap: 10px;
  align-items: center;
}
.delta-track {
  height: 14px;
  border-radius: 999px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  overflow: hidden;
}
.delta-fill {
  height: 100%;
  border-radius: 999px;
}

.modes-panel {
  padding: 20px 22px 22px;
  animation: fadeInUp 280ms ease-out;
}
.mode-strip {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
  margin-top: 10px;
  -webkit-overflow-scrolling: touch;
}
@media (max-width: 640px) {
  .mode-strip {
    mask-image: linear-gradient(to right, black 85%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%);
  }
  .mode-strip.scrolled-end {
    mask-image: linear-gradient(to left, black 85%, transparent 100%);
    -webkit-mask-image: linear-gradient(to left, black 85%, transparent 100%);
  }
  .mode-strip.scrolled-mid {
    mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
  }
}
.mode-strip::-webkit-scrollbar { display: none; }
.mode-pill {
  flex: 0 0 auto;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text-muted);
  padding: 10px 14px;
  min-width: 136px;
  text-align: left;
  cursor: pointer;
  transition: border-color 120ms ease, background 120ms ease;
}
.mode-pill.active {
  border-color: var(--accent);
  background: rgba(139,94,16,0.06);
  color: var(--text);
}
.mode-pill strong {
  display: block;
  font-size: 14px;
}
.mode-pill span {
  display: block;
  margin-top: 2px;
  font-size: 12px;
}

.section-panel {
  padding: 24px;
  animation: fadeInUp 300ms ease-out;
}
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 12px;
  margin-bottom: 16px;
}
.section-header h2 {
  font-family: var(--font-display);
  font-size: 1.2rem;
  letter-spacing: -0.01em;
  font-weight: 600;
}
.section-copy {
  margin-top: 4px;
  font-size: 14px;
  color: var(--text-muted);
}

.lot-grid {
  display: grid;
  gap: 10px;
}
.lot-item {
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  background: var(--surface);
}
.lot-item h3 {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  gap: 12px;
}
.lot-item p {
  color: var(--text-muted);
  margin-top: 4px;
  font-size: 13px;
}
.comparison-bar {
  margin-top: 10px;
  display: grid;
  gap: 6px;
}
.comparison-row {
  display: grid;
  grid-template-columns: 90px 1fr auto;
  gap: 10px;
  align-items: center;
}
.comparison-track {
  height: 12px;
  border-radius: 999px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  overflow: hidden;
}
.comparison-fill {
  height: 100%;
  border-radius: 999px;
}

.warning-list {
  display: grid;
  gap: 10px;
}
.warning-card {
  border: 1px solid rgba(166,61,64,0.2);
  border-radius: 10px;
  background: rgba(166,61,64,0.03);
  padding: 16px;
}
.warning-card h3 {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
}
.warning-card p {
  color: var(--text-muted);
  margin-top: 4px;
  font-size: 13px;
}
.expired-badge {
  padding: 3px 7px;
  border-radius: 4px;
  background: rgba(166,61,64,0.08);
  color: var(--danger);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-size: 11px;
  font-weight: 700;
}

.recommendation-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.2fr) repeat(3, minmax(0, 1fr));
  gap: 12px;
}
.rec-card {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  background: var(--surface);
  display: grid;
  gap: 8px;
}
.rec-card.featured {
  border-color: var(--accent);
  background: rgba(139,94,16,0.03);
}
.rec-card.wait {
  border-color: var(--border);
  opacity: 0.8;
}
.rec-label {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--text-muted);
}
.rec-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.03em;
}
.rec-value {
  font-size: 15px;
  font-weight: 600;
  color: var(--success);
}
.rec-score {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  width: fit-content;
  padding: 4px 8px;
  border-radius: 4px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
}

.account-list {
  display: grid;
  gap: 12px;
}
.account-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
  box-shadow: 0 1px 2px rgba(0,0,0,0.03);
}
.account-shell {
  padding: 18px;
}
.account-header {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: flex-start;
}
.account-name {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.account-expiry-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 7px;
  border-radius: 999px;
  background: rgba(122,90,8,0.1);
  color: var(--warning);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.account-expiry-badge.is-danger {
  background: var(--error-bg);
  color: var(--danger);
}
.type-dot {
  width: 8px;
  height: 8px;
  border-radius: 999px;
}
.type-dot.flexible, .type-dot.credit_card { background: var(--card-color); }
.type-dot.airline { background: var(--airline-color); }
.type-dot.hotel { background: var(--hotel-color); }
.type-dot.other { background: var(--other-color); }
.account-balance {
  margin-top: 12px;
  font-size: 14px;
  color: var(--text-muted);
}
.account-balance strong {
  display: block;
  color: var(--text);
  font-family: var(--font-display);
  font-size: 26px;
  letter-spacing: -0.03em;
}
.option-list {
  display: grid;
  gap: 8px;
  margin-top: 14px;
}
.trip-bridge {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  display: grid;
  gap: 12px;
}
.trip-bridge--danger {
  margin-top: 14px;
  padding: 14px;
  border: 1px solid rgba(166,61,64,0.2);
  border-radius: 12px;
  background: var(--error-bg);
}
.trip-bridge-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}
.trip-bridge-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 10px;
}
.trip-bridge-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface-2);
  padding: 14px;
  display: grid;
  gap: 10px;
}
.trip-bridge-card.book-now { border-color: rgba(45,122,79,0.22); }
.trip-bridge-card.almost-there { border-color: rgba(122,90,8,0.22); }
.trip-bridge-card.not-enough { border-color: var(--border); }
.trip-bridge-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}
.trip-bridge-top h3 {
  font-size: 14px;
  font-weight: 600;
}
.trip-bridge-top p {
  margin-top: 4px;
  color: var(--text-muted);
  font-size: 12px;
}
.trip-bridge-status {
  display: inline-flex;
  align-items: center;
  white-space: nowrap;
  padding: 4px 8px;
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.trip-bridge-card.book-now .trip-bridge-status {
  color: var(--success);
  border-color: rgba(45,122,79,0.22);
}
.trip-bridge-card.almost-there .trip-bridge-status {
  color: var(--warning);
  border-color: rgba(122,90,8,0.22);
}
.trip-bridge-card.not-enough .trip-bridge-status {
  color: var(--text-muted);
}
.trip-bridge-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.option-row {
  display: grid;
  grid-template-columns: minmax(0, 180px) 1fr auto;
  gap: 10px;
  align-items: center;
}
.option-copy strong { display: block; font-size: 14px; }
.option-copy span { display: block; color: var(--text-muted); font-size: 12px; margin-top: 1px; }
.option-track {
  height: 14px;
  border-radius: 999px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  overflow: hidden;
}
.option-fill {
  height: 100%;
  border-radius: 999px;
}
.option-values {
  text-align: right;
  min-width: 110px;
}
.option-values strong {
  display: block;
  font-size: 14px;
}
.option-values span {
  color: var(--text-muted);
  font-size: 12px;
}
.expand-toggle {
  width: 100%;
  border: none;
  border-top: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  cursor: pointer;
  font-size: 13px;
}
.detail-panel {
  display: none;
  border-top: 1px solid var(--border);
  padding: 18px;
  background: var(--surface-2);
}
.detail-panel.open { display: block; }
.detail-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.metric-card, .sweet-card, .household-card, .setting-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  padding: 16px;
}
.metric-card .value {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.03em;
  margin-top: 6px;
}
.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
}
.tag {
  padding: 3px 7px;
  border-radius: 4px;
  background: rgba(139,94,16,0.08);
  color: var(--accent);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}
.tag.warn { background: rgba(122,90,8,0.1); color: var(--warning); }
.tag.success { background: rgba(45,122,79,0.08); color: var(--success); }

.sweet-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 10px;
}
.sweet-card h3 {
  font-size: 14px;
  font-weight: 600;
}
.sweet-card p {
  color: var(--text-muted);
  margin-top: 4px;
  font-size: 13px;
}

.settings-panel details {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  overflow: hidden;
}
.settings-panel summary {
  list-style: none;
  cursor: pointer;
  padding: 14px 18px;
  font-weight: 600;
  font-size: 14px;
}
.settings-panel summary::-webkit-details-marker { display: none; }
.settings-body {
  padding: 0 18px 18px;
  display: grid;
  gap: 14px;
}
.settings-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.settings-grid .field, .household-form-grid .field {
  display: grid;
  gap: 6px;
}
.field label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 600;
}
.field input, .field select {
  width: 100%;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  padding: 10px 12px;
  font-size: 14px;
}
.field input:focus, .field select:focus {
  border-color: var(--accent);
  outline: none;
  box-shadow: 0 0 0 3px rgba(139,94,16,0.1);
}
.caps-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
}
.caps-grid .field label {
  letter-spacing: 0.06em;
  text-transform: none;
  font-size: 11px;
}
.household-form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 0.8fr auto;
  gap: 8px;
  align-items: end;
}
.household-list {
  display: grid;
  gap: 8px;
}
.household-card h3 {
  font-size: 14px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  gap: 12px;
}
.household-card p {
  color: var(--text-muted);
  margin-top: 4px;
  font-size: 13px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border-radius: 8px;
  border: 1px solid transparent;
  padding: 11px 16px;
  cursor: pointer;
  font: inherit;
  font-size: 14px;
  transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
}
.btn:hover { transform: none; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--surface); border-color: var(--border); color: var(--text); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: rgba(166,61,64,0.04); border-color: rgba(166,61,64,0.2); color: var(--danger); }

.freshness {
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
  padding: 4px 0 12px;
}

.empty-state {
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 28px;
  text-align: center;
  color: var(--text-muted);
}
.empty-state strong { display: block; color: var(--text); margin-bottom: 6px; }

@media (max-width: 980px) {
  .hero-grid, .recommendation-grid, .settings-grid, .caps-grid, .detail-grid {
    grid-template-columns: 1fr;
  }
  .recommendation-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .recommendation-grid .featured { grid-column: 1 / -1; }
  .household-form-grid { grid-template-columns: 1fr; }
}

@media (max-width: 767px) {
  .container, .app-nav-inner { width: calc(100vw - 24px); }
  .page-header { flex-direction: column; align-items: flex-start; padding-top: 28px; }
  .mode-pill { min-width: 128px; }
  .recommendation-grid, .caps-grid { grid-template-columns: 1fr; }
  .trip-bridge-header, .trip-bridge-top {
    flex-direction: column;
    align-items: flex-start;
  }
  .option-row, .comparison-row, .delta-bar {
    grid-template-columns: 1fr;
  }
  .option-values, .delta-bar > :last-child { text-align: left; min-width: 0; }
}

<script src="programs.js"></script>
<script>
'use strict';

var STORAGE_KEY = 'churn_data';
var LEGACY_STORAGE_KEY = 'osaka_data';
var PREFS_KEY = 'valueAdvisorPrefs';
var HOUSEHOLD_KEY = 'churn_household';
var LEGACY_HOUSEHOLD_KEY = 'osaka_household';
var state = { expanded: {} };
var sweetSpotsState = { status: 'loading', data: null, error: null };
var sweetSpotsPromise = null;
var sweetSpotsRequestId = 0;
var DEFAULT_PREFS = {
  surfaceMode: 'auto',
  mode: 'max_value',
  interestedInTravel: true,
  cabinPref: 'economy',
  hotelPref: 'midrangeHotel',
  complexityTolerance: 'medium',
  wtpCaps: {
    economy: 500,
    premiumEconomy: 1000,
    business: 2500,
    first: 5000,
    budgetHotel: 150,
    midrangeHotel: 300,
    luxuryHotel: 600,
    resort: 800
  }
};
var MODE_DEFS = [
  { key: 'max_value', label: 'Max Value', copy: 'Best possible cents-per-point.' },
  { key: 'min_cash', label: 'Min Cash', copy: 'Lower out-of-pocket and low fees.' },
  { key: 'simple', label: 'Simple', copy: 'Few moving parts, easier redemptions.' },
  { key: 'travel_now', label: 'Travel Now', copy: 'Prioritize bookable options fast.' },
  { key: 'no_travel', label: 'No Travel', copy: 'Ignore transfer-heavy travel plays.' },
  { key: 'expiring', label: 'Expiring', copy: 'Urgency beats perfect theoretical value.' },
  { key: 'luxury', label: 'Luxury', copy: 'Bias toward premium cabins and resorts.' }
];
var SURFACE_MODES = [
  {
    key: 'stretch_value',
    label: 'Stretch for value',
    copy: 'Accept a transfer or a few extra steps when the upside is real.',
    explain: 'Use this when you want the best realistic upside, not just the easiest cash-out.'
  },
  {
    key: 'easy_win',
    label: 'Easy win',
    copy: 'Favor lower-friction options you would actually book today.',
    explain: 'Use this when you want fewer steps, lower fees, and less booking uncertainty.'
  },
  {
    key: 'use_soon',
    label: 'Use soon',
    copy: 'Push expiring balances and near-term wins to the top.',
    explain: 'Use this when time matters more than chasing the perfect theoretical redemption.'
  }
];
var LEGACY_MODE_TO_SURFACE = {
  max_value: 'stretch_value',
  luxury: 'stretch_value',
  simple: 'easy_win',
  min_cash: 'easy_win',
  no_travel: 'easy_win',
  travel_now: 'use_soon',
  expiring: 'use_soon'
};
var TYPE_COLORS = {
  flexible: 'var(--card-color)',
  credit_card: 'var(--card-color)',
  airline: 'var(--airline-color)',
  hotel: 'var(--hotel-color)',
  other: 'var(--other-color)'
};

function esc(value) {
  var node = document.createElement('span');
  node.textContent = value == null ? '' : String(value);
  return node.innerHTML;
}

function formatDollars(number) {
  return '$' + Number(number || 0).toLocaleString(undefined, {
    minimumFractionDigits: number % 1 ? 2 : 0,
    maximumFractionDigits: 2
  });
}

function formatPoints(number) {
  return Number(number || 0).toLocaleString();
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function round(value, digits) {
  var scale = Math.pow(10, digits || 0);
  return Math.round(value * scale) / scale;
}

function deepClone(value) {
  return JSON.parse(JSON.stringify(value));
}

function mergePrefs(raw) {
  var prefs = deepClone(DEFAULT_PREFS);
  if (!raw || typeof raw !== 'object') return prefs;
  Object.keys(raw).forEach(function (key) {
    if (key === 'wtpCaps' && raw.wtpCaps && typeof raw.wtpCaps === 'object') {
      Object.keys(raw.wtpCaps).forEach(function (capKey) {
        var amount = Number(raw.wtpCaps[capKey]);
        if (isFinite(amount) && amount > 0) prefs.wtpCaps[capKey] = amount;
      });
    } else if (raw[key] != null) {
      prefs[key] = raw[key];
    }
  });
  return prefs;
}

function getSurfaceMode(key) {
  return SURFACE_MODES.find(function (mode) { return mode.key === key; }) || null;
}

function detectAutoSurfaceMode(data, prefs) {
  var accounts = data && Array.isArray(data.accounts) ? data.accounts : [];
  var urgent = accounts.some(function (account) {
    var expiration = checkExpiration(account);
    return expiration && expiration.atRisk && (expiration.daysRemaining == null || expiration.daysRemaining <= 90);
  });
  if (urgent) return 'use_soon';
  if (prefs && (prefs.interestedInTravel === false || prefs.complexityTolerance === 'low')) return 'easy_win';
  return 'stretch_value';
}

function resolveInternalMode(surfaceMode, data, prefs) {
  var accounts = data && Array.isArray(data.accounts) ? data.accounts : [];
  var hasExpiring = accounts.some(function (account) {
    var expiration = checkExpiration(account);
    return expiration && expiration.atRisk;
  });
  if (surfaceMode === 'use_soon') {
    if (hasExpiring) return 'expiring';
    return prefs && prefs.interestedInTravel === false ? 'no_travel' : 'travel_now';
  }
  if (surfaceMode === 'easy_win') {
    return prefs && prefs.interestedInTravel === false ? 'no_travel' : 'simple';
  }
  if (prefs && prefs.interestedInTravel === false) return 'no_travel';
  if (prefs && (prefs.cabinPref === 'business' || prefs.cabinPref === 'first' || prefs.hotelPref === 'luxuryHotel' || prefs.hotelPref === 'resort')) {
    return 'luxury';
  }
  return 'max_value';
}

function autoSelectMode(data, prefs) {
  var normalized = mergePrefs(prefs);
  var requested = normalized.surfaceMode;
  var surfaceMode = requested && requested !== 'auto' && getSurfaceMode(requested)
    ? requested
    : detectAutoSurfaceMode(data, normalized);
  return {
    surfaceMode: surfaceMode,
    mode: resolveInternalMode(surfaceMode, data, normalized)
  };
}

function normalizePrefs(raw, data) {
  var prefs = mergePrefs(raw);
  var hasExplicitSurface = !!(raw && typeof raw === 'object' && raw.surfaceMode != null && raw.surfaceMode !== '');
  if (!hasExplicitSurface) {
    var legacyMode = raw && typeof raw === 'object' ? raw.mode : null;
    prefs.surfaceMode = LEGACY_MODE_TO_SURFACE[legacyMode] || 'auto';
  } else if (!getSurfaceMode(prefs.surfaceMode) && prefs.surfaceMode !== 'auto') {
    prefs.surfaceMode = 'auto';
  }
  var selected = autoSelectMode(data, prefs);
  prefs.surfaceMode = selected.surfaceMode;
  prefs.mode = selected.mode;
  return prefs;
}

function readRewardsData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      raw = localStorage.getItem(LEGACY_STORAGE_KEY);
      if (raw) { localStorage.setItem(STORAGE_KEY, raw); localStorage.removeItem(LEGACY_STORAGE_KEY); }
    }
    if (!raw) return null;
    var data = JSON.parse(raw);
    if (!data || !Array.isArray(data.accounts)) return null;
    return data;
  } catch (error) {
    return 'corrupted';
  }
}

function readPrefs() {
  var data = readRewardsData();
  try {
    var raw = localStorage.getItem(PREFS_KEY);
    if (!raw) return normalizePrefs(null, data);
    return normalizePrefs(JSON.parse(raw), data);
  } catch (error) {
    return normalizePrefs(null, data);
  }
}

function savePrefs(prefs) {
  localStorage.setItem(PREFS_KEY, JSON.stringify(normalizePrefs(prefs, readRewardsData())));
}

function normalizeHouseholdAccount(item) {
  if (!item || typeof item !== 'object') return null;
  var programName = item.program || getProgramNameBySlug(item.programSlug) || '';
  var program = findProgram(programName, item.programSlug);
  return {
    id: typeof item.id === 'string' ? item.id : genId(),
    memberName: typeof item.memberName === 'string' && item.memberName.trim() ? item.memberName.trim() : 'Player two',
    program: programName,
    programSlug: program ? program.slug : (item.programSlug || null),
    balance: Math.max(0, Math.floor(Number(item.balance) || 0)),
    currency: program ? program.currency : (item.currency || 'points'),
    type: program ? program.type : (item.type || 'other')
  };
}

function readHousehold() {
  try {
    var raw = localStorage.getItem(HOUSEHOLD_KEY);
    if (!raw) {
      raw = localStorage.getItem(LEGACY_HOUSEHOLD_KEY);
      if (raw) { localStorage.setItem(HOUSEHOLD_KEY, raw); localStorage.removeItem(LEGACY_HOUSEHOLD_KEY); }
    }
    if (!raw) return [];
    var parsed = JSON.parse(raw);
    if (Array.isArray(parsed)) {
      return parsed.map(normalizeHouseholdAccount).filter(Boolean);
    }
    if (parsed && Array.isArray(parsed.accounts)) {
      return parsed.accounts.map(normalizeHouseholdAccount).filter(Boolean);
    }
    return [];
  } catch (error) {
    return [];
  }
}

function saveHousehold(items) {
  localStorage.setItem(HOUSEHOLD_KEY, JSON.stringify(items.map(normalizeHouseholdAccount).filter(Boolean)));
}

function genId() {
  try {
    return crypto.randomUUID();
  } catch (error) {
    return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
  }
}

function getProgramEntries() {
  return Object.keys(window.PROGRAMS.programs).map(function (name) {
    var program = window.PROGRAMS.programs[name];
    return {
      name: name,
      slug: program.slug,
      program: program
    };
  }).sort(function (left, right) {
    return left.name.localeCompare(right.name);
  });
}

function getProgramNameBySlug(slug) {
  var entry = getProgramEntries().find(function (item) { return item.slug === slug; });
  return entry ? entry.name : null;
}

function findProgram(name, slug) {
  if (slug) {
    var bySlugName = getProgramNameBySlug(slug);
    if (bySlugName) return Object.assign({ name: bySlugName }, window.PROGRAMS.programs[bySlugName]);
  }
  if (name && window.PROGRAMS.programs[name]) return Object.assign({ name: name }, window.PROGRAMS.programs[name]);
  if (name) {
    var match = getProgramEntries().find(function (entry) {
      return entry.name.toLowerCase() === String(name).toLowerCase();
    });
    if (match) return Object.assign({ name: match.name }, match.program);
  }
  return null;
}

function programFromAccount(account) {
  return findProgram(account.program, account.programSlug);
}

function parseRatio(ratioStr) {
  if (!ratioStr || typeof ratioStr !== 'string') return 1;
  var parts = ratioStr.split(':');
  if (parts.length !== 2) return 1;
  var from = parseFloat(parts[0]);
  var to = parseFloat(parts[1]);
  if (!from || !to || isNaN(from) || isNaN(to)) return 1;
  return to / from;
}

function normalizeSweetSpots(payload) {
  return {
    flights: payload && Array.isArray(payload.flights) ? payload.flights : [],
    hotels: payload && Array.isArray(payload.hotels) ? payload.hotels : []
  };
}

function flattenSweetSpots(payload) {
  var normalized = normalizeSweetSpots(payload);
  return normalized.flights.map(function (item) {
    return Object.assign({ _type: 'flight' }, item);
  }).concat(normalized.hotels.map(function (item) {
    return Object.assign({ _type: 'hotel' }, item);
  }));
}

function loadSweetSpots(fetchImpl, forceReload) {
  if (sweetSpotsPromise && !forceReload && !fetchImpl) return sweetSpotsPromise;
  var impl = fetchImpl || window.fetch;
  var requestId = ++sweetSpotsRequestId;
  if (typeof impl !== 'function') {
    sweetSpotsState = { status: 'error', data: null, error: new Error('Fetch unavailable') };
    sweetSpotsPromise = Promise.resolve(sweetSpotsState);
    return sweetSpotsPromise;
  }
  sweetSpotsState = { status: 'loading', data: sweetSpotsState.data, error: null };
  sweetSpotsPromise = Promise.resolve()
    .then(function () {
      return impl('./sweetSpots.json');
    })
    .then(function (response) {
      if (!response || response.ok === false) {
        throw new Error('Could not load sweetSpots.json');
      }
      return response.json();
    })
    .then(function (payload) {
      if (requestId !== sweetSpotsRequestId) return sweetSpotsState;
      sweetSpotsState = { status: 'ready', data: normalizeSweetSpots(payload), error: null };
      if (document.getElementById('app')) render();
      return sweetSpotsState;
    })
    .catch(function (error) {
      if (requestId !== sweetSpotsRequestId) return sweetSpotsState;
      sweetSpotsState = { status: 'error', data: null, error: error };
      if (document.getElementById('app')) render();
      return sweetSpotsState;
    });
  return sweetSpotsPromise;
}

function typeColor(type) {
  return TYPE_COLORS[type] || TYPE_COLORS.other;
}

function hospitalityKey(cabinType, prefs) {
  if (cabinType === 'hotel') return prefs.hotelPref || 'midrangeHotel';
  if (cabinType === 'midrange') return 'midrangeHotel';
  if (cabinType === 'luxury') return 'luxuryHotel';
  return cabinType;
}

function capKeyForCabin(cabinType, prefs) {
  var key = hospitalityKey(cabinType, prefs);
  if (prefs.wtpCaps[key] != null) return key;
  return null;
}

function applyWTP(rawValue, cabinType, prefs) {
  var key = capKeyForCabin(cabinType, prefs);
  if (!key) return round(rawValue, 0);
  var cap = Number(prefs.wtpCaps[key]);
  if (!isFinite(cap) || cap <= 0) return round(rawValue, 0);
  if (rawValue <= cap) return round(rawValue, 0);
  return round(cap + (rawValue - cap) * 0.35, 0);
}

function calcNetCpp(balance, bestCpp, surchargeData) {
  var surcharges = surchargeData && surchargeData.surcharges || 'low';
  var availability = surchargeData && surchargeData.availability || 'high';
  var flexibility = surchargeData && surchargeData.flexibility || 'medium';
  var surchargePenalty = { low: 0.02, medium: 0.11, high: 0.24 }[surcharges] || 0;
  var availabilityPenalty = { high: 0, medium: 0.04, low: 0.1 }[availability] || 0;
  var flexibilityBonus = { high: 0.05, medium: 0.02, low: 0 }[flexibility] || 0;
  return round(Math.max(0.3, bestCpp * (1 - surchargePenalty - availabilityPenalty + flexibilityBonus)), 2);
}

function complexityLevel(option) {
  if (option.kind === 'transfer_partner') {
    if (option.availability === 'low' || option.flexibility === 'low') return 'high';
    return 'medium';
  }
  if (option.type === 'cash_back' || option.type === 'gift_cards' || option.type === 'travel_booking') return 'low';
  return 'medium';
}

function complexityScore(level) {
  return { low: 1, medium: 0.7, high: 0.4 }[level] || 0.7;
}

function availabilityScore(level) {
  return { high: 1, medium: 0.72, low: 0.42 }[level] || 0.72;
}

function flexibilityScore(level) {
  return { high: 1, medium: 0.72, low: 0.44 }[level] || 0.72;
}

function surchargeScore(level) {
  return { low: 1, medium: 0.65, high: 0.32 }[level] || 0.65;
}

function preferenceFit(cabinType, prefs) {
  if (!cabinType || cabinType === 'cash') return 0.82;
  if (cabinType.indexOf('Hotel') > -1 || cabinType === 'resort') {
    var hotelRank = { budgetHotel: 1, midrangeHotel: 2, luxuryHotel: 3, resort: 4 };
    var desiredHotel = hotelRank[prefs.hotelPref || 'midrangeHotel'] || 2;
    var actualHotel = hotelRank[cabinType] || desiredHotel;
    return clamp(1 - Math.abs(desiredHotel - actualHotel) * 0.18, 0.34, 1);
  }
  var cabinRank = { economy: 1, premiumEconomy: 2, business: 3, first: 4 };
  var desiredCabin = cabinRank[prefs.cabinPref || 'economy'] || 1;
  var actualCabin = cabinRank[cabinType] || desiredCabin;
  return clamp(1 - Math.abs(desiredCabin - actualCabin) * 0.2, 0.3, 1);
}

function luxuryFit(cabinType) {
  return { economy: 0.2, premiumEconomy: 0.45, business: 0.85, first: 1, budgetHotel: 0.2, midrangeHotel: 0.45, luxuryHotel: 0.9, resort: 1 }[cabinType] || 0.25;
}

function normalizeBaseOption(option, floor, prefs) {
  var floorValue = floor ? floor.adjustedValue : option.adjustedValue;
  var liftRatio = floorValue > 0 ? (option.adjustedValue - floorValue) / floorValue : 0;
  var valueComponent = clamp(55 + liftRatio * 45, 0, 100);
  var simplicityComponent = complexityScore(option.complexity) * 100;
  var availabilityComponent = availabilityScore(option.availability) * 100;
  var flexibilityComponent = flexibilityScore(option.flexibility) * 100;
  var preferenceComponent = preferenceFit(option.cabinType, prefs) * 100;
  var surchargeComponent = surchargeScore(option.surcharges) * 100;
  var baseScore = valueComponent * 0.38 + simplicityComponent * 0.16 + availabilityComponent * 0.16 + flexibilityComponent * 0.12 + preferenceComponent * 0.1 + surchargeComponent * 0.08;
  if (option.householdBalance > 0) baseScore += 4;
  return Object.assign({}, option, {
    floorValue: floorValue,
    liftRatio: round(liftRatio, 3),
    baseScore: round(baseScore, 1)
  });
}

function scoreBFB(option, floor, prefs, mode) {
  return normalizeBaseOption(option, floor, prefs);
}

function rankByMode(scoredOptions, mode) {
  return scoredOptions.map(function (option) {
    var score = option.baseScore;
    switch (mode) {
      case 'max_value':
        score += option.liftRatio * 32 + (option.kind === 'transfer_partner' ? 6 : 0);
        break;
      case 'min_cash':
        score += surchargeScore(option.surcharges) * 22 + (option.isNonTravel ? 12 : 0) + availabilityScore(option.availability) * 8;
        score -= option.surcharges === 'high' ? 12 : 0;
        break;
      case 'simple':
        score += complexityScore(option.complexity) * 28 + (option.isSimple ? 18 : -12);
        break;
      case 'travel_now':
        score += availabilityScore(option.availability) * 28 + flexibilityScore(option.flexibility) * 10;
        score -= option.availability === 'low' ? 16 : 0;
        break;
      case 'no_travel':
        score += option.isNonTravel ? 34 : -28;
        score += option.isSimple ? 10 : 0;
        break;
      case 'expiring':
        score += option.urgencyBoost || 0;
        score += option.isSimple ? 14 : 0;
        break;
      case 'luxury':
        score += luxuryFit(option.cabinType) * 34 + (option.kind === 'transfer_partner' ? 6 : 0);
        break;
    }
    return Object.assign({}, option, { modeScore: round(score, 1) });
  }).sort(function (left, right) {
    return right.modeScore - left.modeScore;
  });
}

function fallbackCabinType(program, fallbackType, prefs) {
  if (fallbackType === 'cash_back' || fallbackType === 'gift_cards' || fallbackType === 'merchandise') return 'cash';
  if (program && program.type === 'hotel') return program.cpp >= 1.5 ? 'luxuryHotel' : 'midrangeHotel';
  return prefs.cabinPref || 'economy';
}

function buildFallbackOptions(account, program, prefs, householdBalance) {
  var fallbackOptions = program && Array.isArray(program.fallbackOptions) && program.fallbackOptions.length
    ? program.fallbackOptions
    : [{ type: 'cash_back', cpp: account.cpp || 1, label: 'Cash back' }];
  return fallbackOptions.map(function (item) {
    var rawValue = account.balance * item.cpp / 100;
    var cabinType = fallbackCabinType(program, item.type, prefs);
    var adjustedValue = item.type === 'cash_back' || item.type === 'gift_cards' || item.type === 'merchandise'
      ? rawValue
      : applyWTP(rawValue, cabinType, prefs);
    return {
      id: account.id + '-fallback-' + item.type,
      accountId: account.id,
      accountProgram: account.program,
      kind: 'fallback',
      type: item.type,
      label: item.label,
      rawCpp: round(item.cpp, 2),
      netCpp: round(item.cpp, 2),
      rawValue: round(rawValue, 0),
      adjustedValue: round(adjustedValue, 0),
      cabinType: cabinType,
      surcharges: 'low',
      availability: 'high',
      flexibility: item.type === 'travel_portal' ? 'medium' : 'high',
      complexity: item.type === 'travel_portal' ? 'medium' : 'low',
      sweetSpot: '',
      isTravel: item.type.indexOf('travel') === 0 || item.type === 'travel_booking' || item.type === 'pay_with_points',
      isSimple: true,
      isNonTravel: item.type === 'cash_back' || item.type === 'gift_cards' || item.type === 'merchandise',
      householdBalance: householdBalance || 0,
      urgencyBoost: 0
    };
  });
}

function buildTransferOptions(account, program, prefs, householdBalance) {
  if (!program || !Array.isArray(program.transferPartners) || !program.transferPartners.length) return [];
  return program.transferPartners.map(function (partner) {
    var netCpp = calcNetCpp(account.balance, partner.bestCpp, partner);
    var rawValue = account.balance * partner.bestCpp / 100;
    var adjustedValue = applyWTP(account.balance * netCpp / 100, partner.cabinType, prefs);
    var transferShape = {
      kind: 'transfer_partner',
      availability: partner.availability,
      flexibility: partner.flexibility
    };
    return {
      id: account.id + '-transfer-' + partner.partner,
      accountId: account.id,
      accountProgram: account.program,
      kind: 'transfer_partner',
      type: 'transfer_partner',
      label: partner.partner,
      rawCpp: round(partner.bestCpp, 2),
      netCpp: netCpp,
      rawValue: round(rawValue, 0),
      adjustedValue: round(adjustedValue, 0),
      cabinType: partner.cabinType,
      surcharges: partner.surcharges,
      availability: partner.availability,
      flexibility: partner.flexibility,
      complexity: complexityLevel(transferShape),
      sweetSpot: partner.sweetSpot,
      ratio: partner.ratio,
      isTravel: true,
      isSimple: false,
      isNonTravel: false,
      householdBalance: householdBalance || 0,
      urgencyBoost: 0
    };
  });
}

function checkExpiration(account) {
  var rule = window.PROGRAMS.expirationRules[account.program];
  if (!rule || !rule.expires) return null;
  var activityDate = account.lastActivityDate || account.lastUpdated;
  if (!activityDate) return { atRisk: true, expired: false, daysRemaining: null, message: 'Unknown last activity date.' };
  var lastUpdated = new Date(activityDate);
  if (isNaN(lastUpdated.getTime())) return { atRisk: true, expired: false, daysRemaining: null, message: 'Unknown last activity date.' };
  var expiresAt = new Date(lastUpdated);
  expiresAt.setMonth(expiresAt.getMonth() + rule.inactivityMonths);
  var daysRemaining = Math.ceil((expiresAt.getTime() - Date.now()) / 86400000);
  if (daysRemaining <= 0) return { atRisk: true, expired: true, daysRemaining: 0, message: 'Expired', expiresAt: expiresAt.toISOString().split('T')[0] };
  if (daysRemaining <= 180) {
    return { atRisk: true, expired: false, daysRemaining: daysRemaining, message: daysRemaining + ' days remaining', expiresAt: expiresAt.toISOString().split('T')[0] };
  }
  return null;
}

function analyzeAccount(rawAccount, prefs, household) {
  var account = Object.assign({}, rawAccount);
  account.balance = Math.max(0, Number(account.balance) || 0);
  account.cpp = Number(account.cpp) || 1;
  var program = programFromAccount(account);
  var householdBalance = household.filter(function (member) {
    return member.programSlug && account.programSlug && member.programSlug === account.programSlug;
  }).reduce(function (sum, member) {
    return sum + member.balance;
  }, 0);
  var fallbackOptions = buildFallbackOptions(account, program, prefs, householdBalance);
  var cashFloor = fallbackOptions.find(function (option) { return option.type === 'cash_back'; }) || fallbackOptions[0];
  var transferOptions = prefs.interestedInTravel === false ? [] : buildTransferOptions(account, program, prefs, householdBalance);
  var expiration = checkExpiration(account);
  var urgencyBoost = expiration && expiration.atRisk ? (expiration.expired ? 24 : 16) : 0;
  var options = fallbackOptions.concat(transferOptions).map(function (option) {
    option.urgencyBoost = urgencyBoost + (option.isSimple ? 6 : 0) + availabilityScore(option.availability) * 4;
    return option;
  });
  var scored = rankByMode(options.map(function (option) {
    return scoreBFB(option, cashFloor, prefs, prefs.mode);
  }), prefs.mode);
  var bestOption = scored[0] || cashFloor;
  var bestSimple = scored.find(function (option) { return option.isSimple; }) || bestOption;
  var bestNonTravel = scored.find(function (option) { return option.isNonTravel; }) || bestSimple;
  var gapValue = Math.max(0, round(bestOption.adjustedValue - cashFloor.adjustedValue, 0));
  var gapPercent = cashFloor.adjustedValue > 0 ? round(gapValue / cashFloor.adjustedValue * 100, 0) : 0;
  return {
    account: account,
    program: program,
    householdBalance: householdBalance,
    floorOption: cashFloor,
    bestOption: bestOption,
    bestSimple: bestSimple,
    bestNonTravel: bestNonTravel,
    options: scored,
    fallbackOptions: fallbackOptions,
    transferOptions: transferOptions,
    expiration: expiration,
    leftOnTable: {
      gap: gapValue,
      gapPercent: gapPercent
    }
  };
}

function buildAnalysis(data, prefs, household) {
  prefs = normalizePrefs(prefs, data);
  var accounts = (data.accounts || []).map(function (account) {
    return analyzeAccount(account, prefs, household);
  });
  var active = accounts.filter(function (item) { return item.account.balance > 0; });
  var totalBest = active.reduce(function (sum, item) { return sum + item.bestOption.adjustedValue; }, 0);
  var totalFloor = active.reduce(function (sum, item) { return sum + item.floorOption.adjustedValue; }, 0);
  var totalGap = Math.max(0, totalBest - totalFloor);
  var allOptions = active.map(function (item) {
    return item.options[0] ? Object.assign({ account: item.account }, item.options[0]) : null;
  }).filter(Boolean);
  var bestOverall = allOptions.slice().sort(function (left, right) { return right.modeScore - left.modeScore; })[0] || null;
  var bestSimple = active.map(function (item) {
    return Object.assign({ account: item.account }, item.bestSimple);
  }).sort(function (left, right) { return right.modeScore - left.modeScore; })[0] || null;
  var bestNonTravel = active.map(function (item) {
    return Object.assign({ account: item.account }, item.bestNonTravel);
  }).sort(function (left, right) { return right.modeScore - left.modeScore; })[0] || null;
  var expiring = active.filter(function (item) { return item.expiration && item.expiration.atRisk; }).sort(function (left, right) {
    return (left.expiration.daysRemaining || 9999) - (right.expiration.daysRemaining || 9999);
  });
  var sweetSpots = active.reduce(function (items, item) {
    item.options.filter(function (option) {
      return option.kind === 'transfer_partner' && option.rawCpp >= 1.8;
    }).forEach(function (option) {
      items.push({
        account: item.account,
        option: option
      });
    });
    return items;
  }, []).sort(function (left, right) {
    return right.option.modeScore - left.option.modeScore;
  });
  return {
    prefs: prefs,
    household: household,
    accounts: accounts,
    activeAccounts: active,
    totalBest: round(totalBest, 0),
    totalFloor: round(totalFloor, 0),
    totalGap: round(totalGap, 0),
    bestOverall: bestOverall,
    bestSimple: bestSimple,
    bestNonTravel: bestNonTravel,
    expiring: expiring,
    sweetSpots: sweetSpots
  };
}

function worthSavingCard(analysis) {
  var liftPct = analysis.totalFloor > 0 ? (analysis.totalBest - analysis.totalFloor) / analysis.totalFloor : 0;
  var urgent = analysis.expiring.some(function (item) {
    return item.expiration && item.expiration.atRisk && (item.expiration.daysRemaining == null || item.expiration.daysRemaining <= 90);
  });
  if (!urgent && liftPct < 0.12) {
    return {
      state: 'wait',
      title: 'Worth waiting',
      body: 'Your best option is only ' + round(liftPct * 100, 0) + '% above floor value. Points are not under real pressure today, so patience costs very little.',
      accent: 'muted'
    };
  }
  if (!analysis.bestOverall) {
    return {
      state: 'wait',
      title: 'Need more signal',
      body: 'Add more balances or set travel preferences in the tracker to get a stronger recommendation.',
      accent: 'muted'
    };
  }
  return {
    state: 'use_now',
    title: 'Strong opportunity',
    body: analysis.bestOverall.account.program + ' is showing a meaningful edge right now via ' + analysis.bestOverall.label + '.',
    accent: 'highlight',
    option: analysis.bestOverall
  };
}

function scoreLabel(score) {
  if (!isFinite(score)) return 'Unscored';
  if (score >= 90) return 'Very strong fit';
  if (score >= 82) return 'Strong fit';
  if (score >= 72) return 'Good fit';
  if (score >= 62) return 'Worth considering';
  return 'Backup option';
}

function formatScoreLabel(score) {
  return scoreLabel(score) + ' • ' + Number(score || 0).toFixed(1);
}

function explainRecommendation(card) {
  if (!card || !card.account) return '';
  if (card.kind === 'transfer_partner') {
    return card.account.program + ' wins because ' + card.label + ' still has real upside after fees, availability, and friction are discounted.';
  }
  if (card.isNonTravel) {
    return card.account.program + ' wins because the cash-like option stays close enough that simplicity beats chasing a transfer.';
  }
  if (card.isSimple) {
    return card.account.program + ' wins because it is easy to use without giving up much value.';
  }
  return card.account.program + ' wins because it balances value, availability, and ease better than the alternatives.';
}

function buildVerdict(analysis) {
  var surface = getSurfaceMode(analysis.prefs.surfaceMode) || SURFACE_MODES[0];
  var worthSaving = worthSavingCard(analysis);
  var urgent = analysis.expiring[0] || null;
  var best = analysis.bestOverall || analysis.bestSimple || analysis.bestNonTravel || null;
  if (surface.key === 'use_soon' && urgent) {
    return {
      state: urgent.expiration && urgent.expiration.expired ? 'expired' : 'urgent',
      title: 'Use ' + urgent.account.program + ' soon',
      body: urgent.account.program + ' is showing ' + (urgent.expiration ? urgent.expiration.message.toLowerCase() : 'real urgency') + '. The best practical move right now is ' + urgent.bestOption.label + ' for about ' + formatDollars(urgent.bestOption.adjustedValue) + '.',
      option: urgent.bestOption,
      program: urgent.account.program
    };
  }
  if (worthSaving.state === 'wait') {
    return {
      state: 'wait',
      title: 'Save for a better moment',
      body: worthSaving.body,
      option: null,
      program: null
    };
  }
  if (!best) {
    return {
      state: 'wait',
      title: 'Need more signal',
      body: 'Add more balances or update your preferences to get a stronger recommendation.',
      option: null,
      program: null
    };
  }
  if (surface.key === 'easy_win') {
    return {
      state: 'easy',
      title: 'Take the easy win',
      body: best.account.program + ' has the cleanest answer right now: ' + best.label + ' for about ' + formatDollars(best.adjustedValue) + '.',
      option: best,
      program: best.account.program
    };
  }
  return {
    state: 'stretch',
    title: 'Stretch for more value',
    body: best.account.program + ' has enough upside through ' + best.label + ' to justify the extra steps right now.',
    option: best,
    program: best.account.program
  };
}

function writeAgentResults(data, prefs) {
  var household = readHousehold();
  var analysis = buildAnalysis(data, prefs, household);
  var verdict = buildVerdict(analysis);
  var surface = getSurfaceMode(analysis.prefs.surfaceMode) || SURFACE_MODES[0];
  var result = {
    generatedAt: new Date().toISOString(),
    mode: analysis.prefs.mode,
    surfaceMode: analysis.prefs.surfaceMode,

    userPreferences: analysis.prefs,
    household: household,
    verdict: {
      state: verdict.state,

      surfaceLabel: surface.label,

      option_label: verdict.option ? verdict.option.label : null,

    },
    totals: {
      best: analysis.totalBest,
      floor: analysis.totalFloor,

    },
    portfolio: analysis.activeAccounts.map(function (item) {
      return {

          label: item.bestOption.label,

          adjusted_value: item.bestOption.adjustedValue,
          bfb_score: item.bestOption.modeScore,
          sweet_spot: item.bestOption.sweetSpot || '',
          cabin_type: item.bestOption.cabinType
        },
        floorOption: {
          label: item.floorOption.label,
          adjusted_value: item.floorOption.adjustedValue
        },
        leftOnTable: item.leftOnTable,
        expiration: item.expiration,
        householdBalance: item.householdBalance,
        alternatives: item.options.slice(1, 4).map(function (option) {
          return {

            bfb_score: option.modeScore,

          };

      };

  };
  try {
    localStorage.setItem('valueAdvisorResults', JSON.stringify(result));
  } catch (error) {
    // Ignore storage write failures.
  }
  return result;
}

function tripBridgeStatus(available, needed) {
  var gap = Math.max(0, needed - available);
  if (gap <= 0) return { key: 'book-now', label: 'Book now', gap: 0 };
  if (gap <= needed * 0.3) return { key: 'almost-there', label: 'Almost there', gap: gap };
  return { key: 'not-enough', label: 'Need more', gap: gap };
}

function findTripBridgePath(item, targetProgram) {
  var balance = Math.max(0, Number(item && item.account && item.account.balance) || 0);
  if (!balance) return null;
  if (item.account.program === targetProgram) {
    return {
      account: item.account,
      ratio: 1,
      available: balance,
      isDirect: true,
      sourceName: item.account.program,
      transferRatio: '1:1'
    };
  }
  if (!item.program || !Array.isArray(item.program.transferPartners)) return null;
  var bestPath = null;
  item.program.transferPartners.forEach(function (partner) {
    if (partner.partner !== targetProgram) return;
    var ratio = parseRatio(partner.ratio);
    var available = Math.floor(balance * ratio);
    if (!bestPath || available > bestPath.available) {
      bestPath = {
        account: item.account,
        ratio: ratio,
        available: available,
        isDirect: false,
        sourceName: item.account.program,
        transferRatio: partner.ratio
      };
    }
  });
  return bestPath;
}

function findTripBridgeMatches(item, sweetSpots) {
  var statusOrder = { 'book-now': 0, 'almost-there': 1, 'not-enough': 2 };
  return flattenSweetSpots(sweetSpots).map(function (spot) {
    var path = findTripBridgePath(item, spot.program);
    if (!path) return null;
    var status = tripBridgeStatus(path.available, Number(spot.points_required) || 0);
    return {
      spot: spot,
      path: path,
      needed: Number(spot.points_required) || 0,
      available: path.available,
      status: status
    };
  }).filter(Boolean).sort(function (left, right) {
    var leftOrder = statusOrder[left.status.key];
    var rightOrder = statusOrder[right.status.key];
    if (leftOrder !== rightOrder) return leftOrder - rightOrder;
    return (right.spot.cpp_estimate || 0) - (left.spot.cpp_estimate || 0);
  });
}

          '<div class="account-header">' +
            '<div><div class="account-name"><span class="type-dot ' + esc(item.account.type || 'other') + '"></span><span>' + esc(item.account.program) + '</span>' + renderExpirationBadge(item.expiration) + '</div>' +
            '<div class="account-balance"><strong>' + esc(formatPoints(item.account.balance)) + ' ' + esc(item.account.currency || 'points') + '</strong><div class="section-copy">Best answer here: ' + esc(item.bestOption.label) + ' • floor ' + esc(formatDollars(item.floorOption.adjustedValue)) + '</div></div></div>' +
            '<div class="rec-score">' + esc(formatScoreLabel(item.bestOption.modeScore)) + '</div>' +
          '</div>' +
          '<div class="option-list">' + renderAccountOptions(item) + '</div>' +
          renderTripBridge(item) +
        '</div>' +
        '<button type="button" class="expand-toggle" data-expand-account="' + esc(item.account.id) + '" aria-expanded="' + (expanded ? 'true' : 'false') + '">' +
          '<span>See detail and sweet spots</span><span>' + (expanded ? 'Hide' : 'Expand') + '</span></button>' +
        '<div class="detail-panel' + (expanded ? ' open' : '') + '">' + renderAccountDetails(item) + '</div>' +
      '</article>';
    }).join('') + '</div>' +
  '</section>';
}

function renderFreshness() {
  return '<div class="freshness">Program dataset updated ' + esc(window.PROGRAMS.lastUpdated) + ' • results auto-saved • household data stored separately</div>';
}

function renderEmptyState(title, copy, linkHref, linkLabel) {
  var html = '<section class="panel section-panel"><div class="empty-state"><strong>' + esc(title) + '</strong>' + esc(copy);
  if (linkHref && linkLabel) {
    html += '<br><a href="' + esc(linkHref) + '" class="btn btn-primary" style="display:inline-block;margin-top:14px;text-decoration:none">' + esc(linkLabel) + '</a>';
  }
  html += '</div></section>';
  return html;
}

function render() {
  var app = document.getElementById('app');
  var data = readRewardsData();
  if (data === 'corrupted') {
    app.innerHTML = renderEmptyState('Data could not be read', 'Your tracker data couldn\u0027t be read. Go to the tracker page and export a backup, then try re-importing it.', 'index.html', 'Open tracker');
    return;
  }
  if (!data || !data.accounts || !data.accounts.length) {
    app.innerHTML = renderEmptyState('Add accounts in the tracker first', 'Head to the tracker page and add at least one loyalty program balance to get started.', 'index.html', 'Open tracker');
    return;
  }
  var prefs = readPrefs();
  var household = readHousehold();
  var analysis = buildAnalysis(data, prefs, household);
  writeAgentResults(data, prefs);
  if (!analysis.activeAccounts.length) {
    app.innerHTML = renderEmptyState('No active balances to score', 'Your accounts are set up, but every balance is zero. Update your point totals in the tracker to see recommendations.', 'index.html', 'Update balances in tracker');
    return;
  }
  app.innerHTML = '' +
    renderHero(analysis) +
    renderRecommendations(analysis) +
    renderByAccount(analysis) +
    renderFreshness();
  bindModeStripScroll();
}

function handleModeChange(mode) {
  var prefs = readPrefs();
  prefs.surfaceMode = mode;
  savePrefs(prefs);
  render();
}

function bindModeStripScroll() {
  var strip = document.querySelector('.mode-strip');
  if (!strip) return;
  function updateMask() {
    var sl = strip.scrollLeft, max = strip.scrollWidth - strip.clientWidth;
    if (max <= 0) { strip.className = 'mode-strip'; return; }
    if (sl < 4) strip.className = 'mode-strip';
    else if (sl > max - 4) strip.className = 'mode-strip scrolled-end';
    else strip.className = 'mode-strip scrolled-mid';
  }
  strip.addEventListener('scroll', updateMask, { passive: true });
  updateMask();
}

function bindEvents() {
  var app = document.getElementById('app');
  app.addEventListener('click', function (event) {
    var modeButton = event.target.closest('[data-mode]');
    var expandButton = event.target.closest('[data-expand-account]');
    if (modeButton) {
      handleModeChange(modeButton.getAttribute('data-mode'));
      return;
    }
    if (expandButton) {
      var id = expandButton.getAttribute('data-expand-account');
      state.expanded[id] = !state.expanded[id];
      render();
      return;
    }
  });
  app.addEventListener('keydown', function (event) {
    var tab = event.target.closest('[data-mode]');
    if (!tab) return;
    if (event.key !== 'ArrowRight' && event.key !== 'ArrowLeft') return;
    event.preventDefault();
    var index = SURFACE_MODES.findIndex(function (mode) { return mode.key === tab.getAttribute('data-mode'); });
    var next = event.key === 'ArrowRight' ? (index + 1) % SURFACE_MODES.length : (index - 1 + SURFACE_MODES.length) % SURFACE_MODES.length;
    handleModeChange(SURFACE_MODES[next].key);
    window.setTimeout(function () {
      var button = document.querySelector('[data-mode="' + SURFACE_MODES[next].key + '"]');
      if (button) button.focus();
    }, 20);
  });
  window.addEventListener('storage', function (event) {
    if (event.key === STORAGE_KEY || event.key === PREFS_KEY || event.key === HOUSEHOLD_KEY) render();
  });
}

window.ChurnAdvisor = {
  DEFAULT_PREFS: DEFAULT_PREFS,
  MODE_DEFS: MODE_DEFS,
  SURFACE_MODES: SURFACE_MODES,
  readRewardsData: readRewardsData,
  readPrefs: readPrefs,
  savePrefs: savePrefs,
  readHousehold: readHousehold,
  saveHousehold: saveHousehold,
  applyWTP: applyWTP,
  calcNetCpp: calcNetCpp,
  scoreBFB: scoreBFB,
  rankByMode: rankByMode,
  autoSelectMode: autoSelectMode,
  scoreLabel: scoreLabel,
  checkExpiration: checkExpiration,
  buildAnalysis: buildAnalysis,
  writeAgentResults: writeAgentResults,
  render: render,
  findProgram: findProgram,
  findTripBridgeMatches: findTripBridgeMatches,
  renderTripBridge: renderTripBridge,
  loadSweetSpots: loadSweetSpots
};

bindEvents();
render();
loadSweetSpots();

/* ── Theme toggle ──────────────────────────────── */
(function () {
  var THEME_KEY = 'churn-theme';
  var html = document.documentElement;
  var btn = document.getElementById('theme-toggle');
  function applyTheme(theme) {
    if (theme === 'dark') {
      html.setAttribute('data-theme', 'dark');
      html.style.colorScheme = 'dark';
      if (btn) btn.textContent = '\u2600';
    } else {
      html.removeAttribute('data-theme');
      html.style.colorScheme = 'light';
      if (btn) btn.textContent = '\u263E';
    }
  }
  var saved = null;
  try { saved = localStorage.getItem(THEME_KEY); } catch (e) {}
  if (saved === 'dark' || saved === 'light') {
    applyTheme(saved);
  } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    applyTheme('dark');
  }
  if (btn) {
    btn.addEventListener('click', function () {
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      try { localStorage.setItem(THEME_KEY, next); } catch (e) {}
    });
  }
})();
</script>
