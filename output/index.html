<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osaka — Rewards Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
*:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

:root {
  --bg: #0c0d12; --surface: #16181f; --surface-2: #1e2028; --border: #282a36;
  --text: #f0f0f3; --text-muted: #6b6e80; --accent: #3b82f6; --accent-light: #60a5fa;
  --accent-glow: rgba(59,130,246,0.2); --danger: #ff4d6a; --success: #34d399;
  --warning: #fbbf24; --airline-color: #38bdf8; --hotel-color: #c084fc;
  --card-color: #fb923c; --other-color: #6b6e80; --radius: 14px; --radius-sm: 8px;
  --error-bg: rgba(255,77,106,0.08);
}

body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 88px; -webkit-font-smoothing: antialiased; line-height: 1.5; }

@keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
@keyframes toastIn { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes toastOut { from { transform: translateY(0); opacity: 1; } to { transform: translateY(100px); opacity: 0; } }

.animate-in { animation: fadeInUp 0.3s ease-out forwards; }
.animate-in:nth-child(2) { animation-delay: 40ms; }
.animate-in:nth-child(3) { animation-delay: 80ms; }
.animate-in:nth-child(4) { animation-delay: 120ms; }
.animate-in:nth-child(5) { animation-delay: 160ms; }

header { padding: 24px 20px 16px; }
header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; }
header p { color: var(--text-muted); font-size: 14px; margin-top: 2px; }

nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(22,24,31,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
nav button { flex: 1; padding: 10px 8px 8px; background: none; border: none; color: var(--text-muted); font-size: 11px; font-weight: 500; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.25s, transform 0.15s; -webkit-tap-highlight-color: transparent; }
nav button.active { color: var(--accent-light); }
nav button:active { transform: scale(0.92); }
nav button .icon { font-size: 22px; }

.view { display: none; padding: 8px 16px 16px; max-width: 600px; margin: 0 auto; }
.view.active { display: block; animation: fadeIn 0.2s ease; }

.hero { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px 20px; margin-bottom: 16px; }
.hero .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.hero .value { font-size: 40px; font-weight: 800; letter-spacing: -2px; margin-top: 4px; }
.hero .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

.error-banner { background: var(--error-bg); border: 1px solid var(--danger); border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: var(--danger); display: none; }
.error-banner.visible { display: block; }
.success-banner { background: rgba(52,211,153,0.08); border: 1px solid var(--success); border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: var(--success); display: none; }
.success-banner.visible { display: block; }

.category-row { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 2px 0; }
.category-row::-webkit-scrollbar { display: none; }
.category-pill { flex-shrink: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; min-width: 120px; transition: transform 0.2s, box-shadow 0.2s; }
.category-pill:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
.category-pill .pill-icon { font-size: 20px; }
.category-pill .pill-label { font-size: 11px; color: var(--text-muted); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.category-pill .pill-value { font-size: 18px; font-weight: 700; margin-top: 2px; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 10px; transition: transform 0.15s, box-shadow 0.2s; }
.card:active { transform: scale(0.98); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.card-program { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.type-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.type-dot.airline { background: var(--airline-color); }
.type-dot.hotel { background: var(--hotel-color); }
.type-dot.credit_card { background: var(--card-color); }
.type-dot.other { background: var(--other-color); }
.type-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.card-balance { font-size: 30px; font-weight: 800; letter-spacing: -1.5px; }
.card-currency { font-size: 13px; color: var(--text-muted); font-weight: 400; margin-left: 4px; }
.card-meta { font-size: 12px; color: var(--text-muted); margin-top: 6px; display: flex; align-items: center; gap: 8px; }
.stale-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(251,191,36,0.15); color: var(--warning); font-weight: 600; }
.card-actions { display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }

.benefit-urgency { font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 700; letter-spacing: 0.3px; }
.urgency-green { background: rgba(52,211,153,0.12); color: var(--success); }
.urgency-yellow { background: rgba(251,191,36,0.12); color: var(--warning); }
.urgency-red { background: rgba(255,77,106,0.12); color: var(--danger); animation: pulse 2s ease-in-out infinite; }
.urgency-gray { background: rgba(107,110,128,0.15); color: var(--text-muted); text-decoration: line-through; }
.urgency-used { background: rgba(52,211,153,0.12); color: var(--success); }
.benefit-linked { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.btn { padding: 9px 16px; border-radius: var(--radius-sm); border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
.btn:active { transform: scale(0.95); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-light); }
.btn-danger { background: transparent; color: var(--danger); }
.btn-ghost { background: transparent; color: var(--text-muted); }
.btn-ghost:hover { color: var(--text); }
.btn-add { width: 100%; padding: 16px; background: var(--surface); border: 2px dashed var(--border); border-radius: var(--radius); color: var(--text-muted); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-bottom: 12px; }
.btn-add:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

.modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-backdrop.active { display: flex; }
.modal { background: var(--surface-2); border-radius: 20px 20px 0 0; padding: 28px 20px; width: 100%; max-width: 600px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.3s ease-out; }
.modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 15px; font-family: inherit; transition: border-color 0.2s, box-shadow 0.2s; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.form-actions { display: flex; gap: 10px; margin-top: 24px; }
.form-actions .btn { flex: 1; padding: 14px; font-size: 15px; }
.empty-state { text-align: center; padding: 56px 20px; color: var(--text-muted); }
.empty-state .emoji { font-size: 56px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; color: var(--text); font-weight: 700; margin-bottom: 6px; }
.empty-state p { font-size: 14px; line-height: 1.5; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding: 4px 0; }
.section-header h2 { font-size: 20px; font-weight: 700; }

.profile-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 10px; }
.profile-card .pf-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 4px; }
.profile-card .pf-value { font-size: 16px; font-weight: 600; }
.profile-card .pf-value.empty { color: var(--text-muted); font-style: italic; font-weight: 400; }
.profile-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.profile-tag { font-size: 12px; padding: 4px 10px; background: rgba(59,130,246,0.1); border-radius: 99px; color: var(--accent-light); font-weight: 500; }
.cb-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
.cb-group label { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text); text-transform: none; letter-spacing: 0; font-weight: 400; cursor: pointer; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); transition: border-color 0.2s; }
.cb-group label:has(input:checked) { border-color: var(--accent); background: rgba(59,130,246,0.08); }
.cb-group input[type="checkbox"] { width: auto; accent-color: var(--accent); }

/* Undo toast */
.undo-toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 20px; display: flex; align-items: center; gap: 12px; z-index: 300; animation: toastIn 0.3s ease-out; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.undo-toast.leaving { animation: toastOut 0.3s ease-in forwards; }
.undo-toast .toast-msg { font-size: 14px; }
.undo-toast .toast-timer { font-size: 12px; color: var(--text-muted); min-width: 20px; }
.undo-toast .btn { padding: 6px 14px; font-size: 13px; }

/* Data management buttons */
.data-actions { display: flex; gap: 8px; margin-top: 16px; }
.data-actions .btn { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; }
.import-input { display: none; }
.storage-meter { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; margin-top: 16px; }
.storage-meter .meter-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 8px; }
.meter-track { height: 10px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.meter-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.3s; }
.meter-fill.warn { background: var(--warning); }
.meter-fill.danger { background: var(--danger); }
.meter-text { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

/* Points distribution chart */
.points-chart { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 20px; }
.points-chart .chart-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 14px; }
.chart-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.chart-bar-row:last-child { margin-bottom: 0; }
.chart-bar-label { font-size: 12px; font-weight: 600; min-width: 70px; white-space: nowrap; }
.chart-bar-track { flex: 1; height: 24px; background: var(--bg); border-radius: 6px; overflow: hidden; }
.chart-bar-fill { height: 100%; border-radius: 6px; transition: width 0.5s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; min-width: 32px; }
.chart-bar-fill span { font-size: 11px; font-weight: 700; color: #fff; }
.chart-bar-value { font-size: 13px; font-weight: 700; min-width: 60px; text-align: right; }

/* Inline edit + save flash */
.card-balance[contenteditable] { cursor: text; outline: none; border-radius: 4px; padding: 2px 4px; margin: -2px -4px; transition: background 0.2s; }
.card-balance[contenteditable]:focus { background: rgba(59,130,246,0.1); box-shadow: 0 0 0 2px var(--accent-glow); }
.save-flash { animation: flashGreen 0.6s ease; }
@keyframes flashGreen { 0% { background: rgba(52,211,153,0.3); } 100% { background: transparent; } }

/* Benefit summary */
.benefit-summary { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 16px; }
.benefit-summary .bs-row { display: flex; justify-content: space-between; align-items: center; }
.benefit-summary .bs-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.benefit-summary .bs-value { font-size: 16px; font-weight: 700; }
.benefit-summary .bs-detail { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.benefit-summary .bs-upcoming { color: var(--warning); font-weight: 600; }
</style>
</head>
<body>

<header><h1>Osaka</h1><p>Your rewards, beautifully organized</p></header>

<section id="view-dashboard" class="view active">
  <div id="error-banner" class="error-banner"></div>
  <div id="success-banner" class="success-banner"></div>
  <div id="hero-card"></div>
  <div id="category-pills" class="category-row"></div>
  <div id="points-chart"></div>
  <div id="benefit-summary"></div>
  <div class="section-header"><h2>Recent</h2></div>
  <div id="dashboard-list"></div>
</section>

<section id="view-accounts" class="view">
  <div class="section-header"><h2>Accounts</h2></div>
  <button class="btn-add" onclick="openAccountModal()">+ Add Account</button>
  <div id="accounts-list"></div>
</section>

<section id="view-benefits" class="view">
  <div class="section-header"><h2>Benefits</h2></div>
  <button class="btn-add" onclick="openBenefitModal()">+ Add Benefit</button>
  <div id="benefits-list"></div>
</section>

<section id="view-profile" class="view">
  <div class="section-header"><h2>Travel Profile</h2><button class="btn btn-ghost" onclick="openProfileModal()">Edit</button></div>
  <div id="profile-display"></div>
  <div class="data-actions">
    <button class="btn btn-ghost" onclick="exportData()">Export Data</button>
    <button class="btn btn-ghost" onclick="document.getElementById('import-file').click()">Import Data</button>
    <input type="file" id="import-file" class="import-input" accept=".json" onchange="importData(event)">
  </div>
  <div id="storage-meter"></div>
</section>

<nav>
  <button class="active" onclick="switchTab('dashboard')" data-tab="dashboard"><span class="icon">📊</span>Dashboard</button>
  <button onclick="switchTab('accounts')" data-tab="accounts"><span class="icon">💳</span>Accounts</button>
  <button onclick="switchTab('benefits')" data-tab="benefits"><span class="icon">🎁</span>Benefits</button>
  <button onclick="switchTab('profile')" data-tab="profile"><span class="icon">👤</span>Profile</button>
</nav>

<div id="undo-container"></div>

<div id="account-modal" class="modal-backdrop" onclick="closeModal(event,'account-modal')"><div class="modal" onclick="event.stopPropagation()"><h2 id="account-modal-title">Add Account</h2><form id="account-form" onsubmit="saveAccount(event)"><input type="hidden" id="account-id"><div class="form-group"><label>Program Name</label><input type="text" id="account-program" required placeholder="e.g., Chase Ultimate Rewards" maxlength="100"></div><div class="form-group"><label>Type</label><select id="account-type"><option value="airline">Airline</option><option value="hotel">Hotel</option><option value="credit_card">Credit Card</option><option value="other">Other</option></select></div><div class="form-group"><label>Account Number</label><input type="text" id="account-number" placeholder="e.g., xxxx-1234" maxlength="50"></div><div class="form-group"><label>Balance</label><input type="number" id="account-balance" required min="0" max="999999999" step="1" placeholder="85000"></div><div class="form-group"><label>Currency</label><select id="account-currency"><option value="points">Points</option><option value="miles">Miles</option></select></div><div class="form-group"><label>Notes</label><textarea id="account-notes" rows="2" placeholder="Optional..." maxlength="500"></textarea></div><div class="form-actions"><button type="button" class="btn btn-ghost" onclick="closeModalById('account-modal')">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div></form></div></div>

<div id="benefit-modal" class="modal-backdrop" onclick="closeModal(event,'benefit-modal')"><div class="modal" onclick="event.stopPropagation()"><h2 id="benefit-modal-title">Add Benefit</h2><form id="benefit-form" onsubmit="saveBenefit(event)"><input type="hidden" id="benefit-id"><div class="form-group"><label>Linked Account</label><select id="benefit-card" required></select></div><div class="form-group"><label>Benefit Name</label><input type="text" id="benefit-name" required placeholder="e.g., Global Entry Credit" maxlength="100"></div><div class="form-group"><label>Value</label><input type="text" id="benefit-value" placeholder="e.g., $100" maxlength="20"></div><div class="form-group"><label>Renewal Date</label><input type="date" id="benefit-renewal"></div><div class="form-group"><label>Status</label><select id="benefit-used"><option value="false">Unused</option><option value="true">Used</option></select></div><div class="form-group"><label>Notes</label><textarea id="benefit-notes" rows="2" placeholder="Optional..." maxlength="500"></textarea></div><div class="form-actions"><button type="button" class="btn btn-ghost" onclick="closeModalById('benefit-modal')">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div></form></div></div>

<div id="profile-modal" class="modal-backdrop" onclick="closeModal(event,'profile-modal')"><div class="modal" onclick="event.stopPropagation()"><h2>Edit Travel Profile</h2><form id="profile-form" onsubmit="saveProfile(event)"><div class="form-group"><label>Home Airport (IATA)</label><input type="text" id="profile-airport" placeholder="e.g., SFO" maxlength="4" style="text-transform:uppercase"></div><div class="form-group"><label>Preferred Alliances</label><div class="cb-group" id="alliance-group"><label><input type="checkbox" value="oneworld"> oneworld</label><label><input type="checkbox" value="Star Alliance"> Star Alliance</label><label><input type="checkbox" value="SkyTeam"> SkyTeam</label></div></div><div class="form-group"><label>Preferred Cabin</label><select id="profile-class"><option value="economy">Economy</option><option value="premium_economy">Premium Economy</option><option value="business">Business</option><option value="first">First</option></select></div><div class="form-group"><label>Preferred Regions</label><div class="cb-group" id="region-group"><label><input type="checkbox" value="Asia"> Asia</label><label><input type="checkbox" value="Europe"> Europe</label><label><input type="checkbox" value="North America"> N. America</label><label><input type="checkbox" value="South America"> S. America</label><label><input type="checkbox" value="Africa"> Africa</label><label><input type="checkbox" value="Oceania"> Oceania</label></div></div><div class="form-actions"><button type="button" class="btn btn-ghost" onclick="closeModalById('profile-modal')">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div></form></div></div>

<script>
'use strict';
var STORAGE_KEY='osaka_data',SCHEMA_VERSION=2,VALID_TYPES=['airline','hotel','credit_card','other'],VALID_CURRENCIES=['points','miles'],MAX_TEXT=100,MAX_NOTES=500,MAX_BALANCE=999999999;

function sanitize(str,maxLen){if(typeof str!=='string')return'';return str.replace(/<[^>]*>/g,'').trim().slice(0,maxLen||MAX_TEXT)}
function validateType(t){return VALID_TYPES.includes(t)?t:'other'}
function validateCurrency(c){return VALID_CURRENCIES.includes(c)?c:'points'}
function validateBalance(v){var n=Number(v);if(isNaN(n)||!isFinite(n)||n<0)return 0;return Math.min(Math.floor(n),MAX_BALANCE)}

function defaultData(){return{_version:SCHEMA_VERSION,accounts:[],benefits:[],profile:{homeAirport:'',preferredAlliances:[],travelPreferences:{regions:[],classPreference:'economy'}}}}

/* Migrate schema from older versions */
function migrateData(d){
  if(!d._version||d._version<2){
    d._version=SCHEMA_VERSION;
    if(!d.profile)d.profile=defaultData().profile;
    d.accounts.forEach(function(a){if(!a.currency)a.currency='points';if(!a.type)a.type='other'});
  }
  return d;
}

/* Repair individual account records */
function repairAccount(a){
  if(!a.id||typeof a.id!=='string')a.id='repair-'+Date.now()+'-'+Math.random().toString(36).slice(2,6);
  if(typeof a.program!=='string')a.program='Unknown Program';
  a.type=validateType(a.type);a.currency=validateCurrency(a.currency);
  a.balance=validateBalance(a.balance);
  if(typeof a.accountNumber!=='string')a.accountNumber='';
  if(typeof a.notes!=='string')a.notes='';
  return a;
}

/* Repair individual benefit records */
function repairBenefit(b){
  if(!b.id||typeof b.id!=='string')b.id='repair-'+Date.now()+'-'+Math.random().toString(36).slice(2,6);
  if(typeof b.name!=='string')b.name='Unknown Benefit';
  if(typeof b.value!=='string')b.value='';
  if(typeof b.notes!=='string')b.notes='';
  b.used=!!b.used;
  return b;
}

function loadData(){
  try{
    var raw=localStorage.getItem(STORAGE_KEY);if(!raw)return defaultData();
    var d=JSON.parse(raw);if(typeof d!=='object'||d===null)return defaultData();
    d=migrateData(d);
    if(!Array.isArray(d.accounts))d.accounts=[];
    if(!Array.isArray(d.benefits))d.benefits=[];
    d.accounts=d.accounts.filter(function(a){return a&&typeof a==='object'}).map(repairAccount);
    d.benefits=d.benefits.filter(function(b){return b&&typeof b==='object'}).map(repairBenefit);
    if(!d.profile||typeof d.profile!=='object')d.profile=defaultData().profile;
    if(!d.profile.travelPreferences)d.profile.travelPreferences=defaultData().profile.travelPreferences;
    if(!Array.isArray(d.profile.preferredAlliances))d.profile.preferredAlliances=[];
    if(!Array.isArray(d.profile.travelPreferences.regions))d.profile.travelPreferences.regions=[];
    var ids=new Set(d.accounts.map(function(a){return a.id}));
    d.benefits=d.benefits.filter(function(b){return ids.has(b.cardId)});
    return d;
  }catch(e){showError('Data was corrupted. Starting fresh.');return defaultData()}
}

function saveData(data){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));updateStorageMeter();return true}
  catch(e){
    if(e.name==='QuotaExceededError'||e.code===22)showError('Storage full. Delete some accounts or export and clear data.');
    else showError('Failed to save: '+(e.message||'Unknown error'));
    return false;
  }
}

function timeAgo(d){if(!d)return'';var days=Math.floor((Date.now()-new Date(d).getTime())/86400000);if(days<0)return'just now';if(days===0)return'today';if(days===1)return'yesterday';if(days<7)return days+'d ago';if(days<30)return Math.floor(days/7)+'w ago';return Math.floor(days/30)+'mo ago'}
function daysUntil(d){if(!d)return Infinity;return Math.ceil((new Date(d).getTime()-Date.now())/86400000)}

/* === EXPORT / IMPORT === */
function exportData(){
  var data=loadData();
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='osaka-backup-'+new Date().toISOString().split('T')[0]+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showSuccess('Data exported successfully.');
}

function importData(event){
  var file=event.target.files[0];if(!file)return;
  event.target.value='';
  if(file.size>1024*1024){showError('Import file too large (max 1MB).');return}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var imported=JSON.parse(e.target.result);
      var errors=validateImport(imported);
      if(errors.length>0){showError('Invalid import: '+errors[0]);return}
      if(!confirm('Import will replace all current data. Continue?'))return;
      var clean=sanitizeImport(imported);
      clean._version=SCHEMA_VERSION;
      if(saveData(clean)){showSuccess('Data imported successfully ('+clean.accounts.length+' accounts, '+clean.benefits.length+' benefits).');render()}
    }catch(err){showError('Invalid JSON file.')}
  };
  reader.onerror=function(){showError('Failed to read file.')};
  reader.readAsText(file);
}

/* Pure validation — checks structure without mutating input */
function validateImport(d){
  var errors=[];
  if(typeof d!=='object'||d===null)return['Not a valid JSON object'];
  if(!Array.isArray(d.accounts))errors.push('Missing or invalid accounts array');
  if(!Array.isArray(d.benefits))errors.push('Missing or invalid benefits array');
  if(errors.length>0)return errors;
  d.accounts.forEach(function(a,i){
    if(!a.id||typeof a.id!=='string')errors.push('Account '+i+': missing id');
    if(!a.program||typeof a.program!=='string')errors.push('Account '+i+': missing program name');
    if(typeof a.balance!=='number'||a.balance<0)errors.push('Account '+i+': invalid balance');
  });
  d.benefits.forEach(function(b,i){
    if(!b.id||typeof b.id!=='string')errors.push('Benefit '+i+': missing id');
    if(!b.name||typeof b.name!=='string')errors.push('Benefit '+i+': missing name');
  });
  return errors;
}

/* Sanitize — applies type/balance/text sanitization to a validated import */
function sanitizeImport(d){
  var clean=JSON.parse(JSON.stringify(d));
  clean.accounts.forEach(function(a){
    a.type=validateType(a.type);a.currency=validateCurrency(a.currency);
    a.program=sanitize(a.program,MAX_TEXT);a.accountNumber=sanitize(a.accountNumber||'',50);
    a.notes=sanitize(a.notes||'',MAX_NOTES);a.balance=validateBalance(a.balance);
  });
  clean.benefits.forEach(function(b){
    b.name=sanitize(b.name,MAX_TEXT);b.value=sanitize(b.value||'',20);
    b.notes=sanitize(b.notes||'',MAX_NOTES);b.used=!!b.used;
  });
  /* Remove orphaned benefits (cardId not in accounts) */
  var acctIds=new Set(clean.accounts.map(function(a){return a.id}));
  clean.benefits=clean.benefits.filter(function(b){return acctIds.has(b.cardId)});
  if(!clean.profile||typeof clean.profile!=='object')clean.profile=defaultData().profile;
  return clean;
}

/* === STORAGE METER === */
function updateStorageMeter(){
  var el=document.getElementById('storage-meter');if(!el)return;
  try{
    var used=new Blob([localStorage.getItem(STORAGE_KEY)||'']).size;
    var limit=5*1024*1024;
    var pct=Math.round((used/limit)*100);
    var cls='';if(pct>80)cls=' danger';else if(pct>60)cls=' warn';
    var usedKB=(used/1024).toFixed(1);
    el.innerHTML='<div class="storage-meter"><div class="meter-label">Local Storage</div><div class="meter-track"><div class="meter-fill'+cls+'" style="width:'+Math.min(pct,100)+'%"></div></div><div class="meter-text">'+usedKB+'KB used (~'+pct+'%)</div></div>';
  }catch(e){el.innerHTML=''}
}

/* === INLINE BALANCE EDITING === */
function handleInlineEdit(balDiv,accountId,oldBalance){
  var currSpan=balDiv.querySelector('.card-currency');
  if(currSpan)currSpan.style.display='none';
  balDiv.textContent=String(oldBalance);
  balDiv.setAttribute('contenteditable','true');
  balDiv.focus();
  var range=document.createRange();range.selectNodeContents(balDiv);
  var sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  var handled=false;
  function onBlur(){
    if(handled)return;handled=true;
    balDiv.removeAttribute('contenteditable');
    var raw=balDiv.textContent.replace(/[^0-9]/g,'');
    var newBal=validateBalance(raw);
    if(newBal===oldBalance){renderDashboard();return}
    var data=loadData();
    var acct=data.accounts.find(function(a){return a.id===accountId});
    if(acct){acct.balance=newBal;acct.lastUpdated=new Date().toISOString().split('T')[0];saveData(data)}
    var card=balDiv.closest('.card');
    if(card){card.classList.add('save-flash');setTimeout(function(){card.classList.remove('save-flash');renderDashboard()},600)}
  }
  balDiv.addEventListener('blur',onBlur,{once:true});
  balDiv.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();balDiv.blur()}if(e.key==='Escape'){handled=true;balDiv.removeAttribute('contenteditable');renderDashboard()}});
}

  var data=loadData(),p=data.profile;
  document.getElementById('profile-airport').value=p.homeAirport||'';
  document.querySelectorAll('#alliance-group input').forEach(function(cb){cb.checked=p.preferredAlliances.includes(cb.value)});
  document.getElementById('profile-class').value=p.travelPreferences.classPreference||'economy';
  document.querySelectorAll('#region-group input').forEach(function(cb){cb.checked=p.travelPreferences.regions.includes(cb.value)});
  document.getElementById('profile-modal').classList.add('active');
}

function closeModal(e,id){if(e.target===e.currentTarget)document.getElementById(id).classList.remove('active')}
function closeModalById(id){document.getElementById(id).classList.remove('active')}

function saveAccount(e){
  e.preventDefault();
  var program=sanitize(document.getElementById('account-program').value,MAX_TEXT);
  var balance=validateBalance(document.getElementById('account-balance').value);
  if(!program){showError('Program name is required.');return}
  var data=loadData(),id=document.getElementById('account-id').value;
  var acct={id:id||genId(),type:validateType(document.getElementById('account-type').value),program:program,accountNumber:sanitize(document.getElementById('account-number').value,50),balance:balance,currency:validateCurrency(document.getElementById('account-currency').value),lastUpdated:new Date().toISOString().split('T')[0],notes:sanitize(document.getElementById('account-notes').value,MAX_NOTES)};
  if(id){var idx=data.accounts.findIndex(function(a){return a.id===id});if(idx!==-1)data.accounts[idx]=acct}else data.accounts.push(acct);
  saveData(data);closeModalById('account-modal');render();
}

function deleteAccount(id){
  var data=loadData();
  var acct=data.accounts.find(function(a){return a.id===id});if(!acct)return;
  var linkedBenefits=data.benefits.filter(function(b){return b.cardId===id});
  var snapshot=JSON.parse(JSON.stringify(data));
  data.accounts=data.accounts.filter(function(a){return a.id!==id});
  data.benefits=data.benefits.filter(function(b){return b.cardId!==id});
  saveData(data);render();
  showUndo('Deleted "'+acct.program+'"'+(linkedBenefits.length?' and '+linkedBenefits.length+' benefit(s)':''),function(){saveData(snapshot);});
}

function saveBenefit(e){
  e.preventDefault();
  var name=sanitize(document.getElementById('benefit-name').value,MAX_TEXT);
  var cardId=document.getElementById('benefit-card').value;
  if(!name||!cardId)return;
  var data=loadData(),id=document.getElementById('benefit-id').value;
  var ben={id:id||genId(),cardId:cardId,name:name,value:sanitize(document.getElementById('benefit-value').value,20),renewalDate:document.getElementById('benefit-renewal').value||'',used:document.getElementById('benefit-used').value==='true',notes:sanitize(document.getElementById('benefit-notes').value,MAX_NOTES)};
  if(id){var idx=data.benefits.findIndex(function(b){return b.id===id});if(idx!==-1)data.benefits[idx]=ben}else data.benefits.push(ben);
  saveData(data);closeModalById('benefit-modal');render();
}

function deleteBenefit(id){
  var data=loadData();
  var ben=data.benefits.find(function(b){return b.id===id});if(!ben)return;
  var snapshot=JSON.parse(JSON.stringify(data));
  data.benefits=data.benefits.filter(function(b){return b.id!==id});
  saveData(data);render();
  showUndo('Deleted "'+ben.name+'"',function(){saveData(snapshot)});
}

function toggleUsed(id){var data=loadData(),b=data.benefits.find(function(x){return x.id===id});if(b){b.used=!b.used;saveData(data);render()}}

function saveProfile(e){
  e.preventDefault();var data=loadData();
  var alliances=[],regions=[];
  document.querySelectorAll('#alliance-group input:checked').forEach(function(cb){alliances.push(cb.value)});
  document.querySelectorAll('#region-group input:checked').forEach(function(cb){regions.push(cb.value)});
  data.profile={homeAirport:sanitize(document.getElementById('profile-airport').value,4).toUpperCase(),preferredAlliances:alliances,travelPreferences:{regions:regions,classPreference:document.getElementById('profile-class').value||'economy'}};
  saveData(data);closeModalById('profile-modal');render();
}

render();
</script>
</body>
</html>
