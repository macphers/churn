<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osaka — Rewards Tracker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0d12;
  --surface: #16181f;
  --surface-2: #1e2028;
  --border: #282a36;
  --text: #f0f0f3;
  --text-muted: #6b6e80;
  --accent: #3b82f6;
  --accent-light: #60a5fa;
  --accent-glow: rgba(59,130,246,0.2);
  --danger: #ff4d6a;
  --success: #34d399;
  --warning: #fbbf24;
  --airline-color: #38bdf8;
  --hotel-color: #c084fc;
  --card-color: #fb923c;
  --other-color: #6b6e80;
  --radius: 14px;
  --radius-sm: 8px;
  --error-bg: rgba(255,77,106,0.08);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 88px;
  -webkit-font-smoothing: antialiased;
}

/* Animations */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

@keyframes countUp {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes checkmark {
  0% { transform: scale(0); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

.animate-in {
  animation: fadeInUp 0.3s ease-out forwards;
}

.animate-in:nth-child(2) { animation-delay: 40ms; }
.animate-in:nth-child(3) { animation-delay: 80ms; }
.animate-in:nth-child(4) { animation-delay: 120ms; }
.animate-in:nth-child(5) { animation-delay: 160ms; }
.animate-in:nth-child(6) { animation-delay: 200ms; }

/* Header */
header {
  padding: 24px 20px 16px;
  position: relative;
}

header h1 {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.8px;
  color: var(--text);
}

header p { color: var(--text-muted); font-size: 14px; margin-top: 2px; }

/* Navigation */
nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(22,24,31,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}

nav button {
  flex: 1;
  padding: 10px 8px 8px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  transition: color 0.25s, transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}

nav button.active { color: var(--accent-light); }
nav button:active { transform: scale(0.92); }
nav button .icon { font-size: 22px; }

/* Views */
.view { display: none; padding: 8px 16px 16px; max-width: 600px; margin: 0 auto; }
.view.active { display: block; animation: fadeIn 0.2s ease; }

/* Summary Hero */
.hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 20px;
  margin-bottom: 16px;
}

.hero .label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
}

.hero .value {
  font-size: 40px;
  font-weight: 800;
  letter-spacing: -2px;
  color: var(--text);
  margin-top: 4px;
}

.hero .subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Error banner */
.error-banner {
  background: var(--error-bg);
  border: 1px solid var(--danger);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-bottom: 12px;
  font-size: 13px;
  color: var(--danger);
  display: none;
}
.error-banner.visible { display: block; }

.field-error { border-color: var(--danger) !important; }
.field-error-msg { color: var(--danger); font-size: 11px; margin-top: 3px; display: none; }
.field-error-msg.visible { display: block; }

/* Category pills */
.category-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 2px 0;
}

.category-row::-webkit-scrollbar { display: none; }

.category-pill {
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  min-width: 120px;
  transition: transform 0.2s, box-shadow 0.2s;
}

.category-pill:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}

.category-pill .pill-icon { font-size: 20px; }
.category-pill .pill-label { font-size: 11px; color: var(--text-muted); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.category-pill .pill-value { font-size: 18px; font-weight: 700; margin-top: 2px; }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 10px;
  transition: transform 0.15s, box-shadow 0.2s;
}

.card:active { transform: scale(0.98); }

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.card-program {
  font-size: 16px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}

.type-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}

.type-dot.airline { background: var(--airline-color); }
.type-dot.hotel { background: var(--hotel-color); }
.type-dot.credit_card { background: var(--card-color); }
.type-dot.other { background: var(--other-color); }

.type-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}

.card-balance {
  font-size: 30px;
  font-weight: 800;
  letter-spacing: -1.5px;
}

.card-currency {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 400;
  margin-left: 4px;
}

.card-meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.stale-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: rgba(251,191,36,0.15);
  color: var(--warning);
  font-weight: 600;
}

.card-actions {
  display: flex;
  gap: 8px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

/* Benefits */
.benefit-urgency {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 99px;
  font-weight: 700;
  letter-spacing: 0.3px;
}

.urgency-green { background: rgba(52,211,153,0.12); color: var(--success); }
.urgency-yellow { background: rgba(251,191,36,0.12); color: var(--warning); }
.urgency-red { background: rgba(255,77,106,0.12); color: var(--danger); animation: pulse 2s ease-in-out infinite; }
.urgency-gray { background: rgba(107,110,128,0.15); color: var(--text-muted); text-decoration: line-through; }
.urgency-used { background: rgba(52,211,153,0.12); color: var(--success); }

.benefit-linked {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Buttons */
.btn {
  padding: 9px 16px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.btn:active { transform: scale(0.95); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-light); }
.btn-danger { background: transparent; color: var(--danger); }
.btn-ghost { background: transparent; color: var(--text-muted); }
.btn-ghost:hover { color: var(--text); }

.btn-add {
  width: 100%;
  padding: 16px;
  background: var(--surface);
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 12px;
}

.btn-add:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

/* Modal */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}

.modal-backdrop.active { display: flex; }

.modal {
  background: var(--surface-2);
  border-radius: 20px 20px 0 0;
  padding: 28px 20px;
  width: 100%;
  max-width: 600px;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease-out;
}

.modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }

.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.form-actions {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}

.form-actions .btn { flex: 1; padding: 14px; font-size: 15px; }

/* Empty State */
.empty-state {
  text-align: center;
  padding: 56px 20px;
  color: var(--text-muted);
}

.empty-state .emoji { font-size: 56px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; color: var(--text); font-weight: 700; margin-bottom: 6px; }
.empty-state p { font-size: 14px; line-height: 1.5; }

/* Section Header */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  padding: 4px 0;
}

.section-header h2 { font-size: 20px; font-weight: 700; }
.section-label { font-size: 14px; font-weight: 700; color: var(--text-muted); margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>

<header>
  <h1>Osaka</h1>
  <p>Your rewards, beautifully organized</p>
</header>

<section id="view-dashboard" class="view active">
  <div id="error-banner" class="error-banner"></div>
  <div id="hero-card"></div>
  <div id="category-pills" class="category-row"></div>
  <div class="section-header"><h2>Recent</h2></div>
  <div id="dashboard-list"></div>
</section>

<section id="view-accounts" class="view">
  <div class="section-header"><h2>Accounts</h2></div>
  <button class="btn-add" onclick="openAccountModal()">+ Add Account</button>
  <div id="accounts-list"></div>
</section>

<section id="view-benefits" class="view">
  <div class="section-header"><h2>Benefits</h2></div>
  <button class="btn-add" onclick="openBenefitModal()">+ Add Benefit</button>
  <div id="benefits-list"></div>
</section>

<nav>
  <button class="active" onclick="switchTab('dashboard')" data-tab="dashboard">
    <span class="icon">📊</span>Dashboard
  </button>
  <button onclick="switchTab('accounts')" data-tab="accounts">
    <span class="icon">💳</span>Accounts
  </button>
  <button onclick="switchTab('benefits')" data-tab="benefits">
    <span class="icon">🎁</span>Benefits
  </button>
</nav>

<!-- Account Modal -->
<div id="account-modal" class="modal-backdrop" onclick="closeModal(event,'account-modal')">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="account-modal-title">Add Account</h2>
    <form id="account-form" onsubmit="saveAccount(event)">
      <input type="hidden" id="account-id">
      <div class="form-group">
        <label>Program Name</label>
        <input type="text" id="account-program" required placeholder="e.g., Chase Ultimate Rewards">
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="account-type">
          <option value="airline">✈️ Airline</option>
          <option value="hotel">🏨 Hotel</option>
          <option value="credit_card">💳 Credit Card</option>
          <option value="other">📦 Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Account Number</label>
        <input type="text" id="account-number" placeholder="e.g., xxxx-1234">
      </div>
      <div class="form-group">
        <label>Balance</label>
        <input type="number" id="account-balance" required min="0" step="1" placeholder="85000">
      </div>
      <div class="form-group">
        <label>Currency</label>
        <select id="account-currency">
          <option value="points">Points</option>
          <option value="miles">Miles</option>
        </select>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="account-notes" rows="2" placeholder="Optional..."></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModalById('account-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- Benefit Modal -->
<div id="benefit-modal" class="modal-backdrop" onclick="closeModal(event,'benefit-modal')">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="benefit-modal-title">Add Benefit</h2>
    <form id="benefit-form" onsubmit="saveBenefit(event)">
      <input type="hidden" id="benefit-id">
      <div class="form-group">
        <label>Linked Account</label>
        <select id="benefit-card" required></select>
      </div>
      <div class="form-group">
        <label>Benefit Name</label>
        <input type="text" id="benefit-name" required placeholder="e.g., Global Entry Credit">
      </div>
      <div class="form-group">
        <label>Value</label>
        <input type="text" id="benefit-value" placeholder="e.g., $100">
      </div>
      <div class="form-group">
        <label>Renewal Date</label>
        <input type="date" id="benefit-renewal">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="benefit-used">
          <option value="false">Unused</option>
          <option value="true">Used</option>
        </select>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="benefit-notes" rows="2" placeholder="Optional..."></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModalById('benefit-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<script>
'use strict';

const STORAGE_KEY = 'osaka_data';
const SCHEMA_VERSION = 1;
const VALID_TYPES = ['airline', 'hotel', 'credit_card', 'other'];
const VALID_CURRENCIES = ['points', 'miles'];

function defaultData() { return { _version: SCHEMA_VERSION, accounts: [], benefits: [] }; }

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultData();
    const d = JSON.parse(raw);
    if (typeof d !== 'object' || d === null) return defaultData();
    if (!Array.isArray(d.accounts)) d.accounts = [];
    if (!Array.isArray(d.benefits)) d.benefits = [];
    // Clean orphaned benefits
    const ids = new Set(d.accounts.map(a => a.id));
    d.benefits = d.benefits.filter(b => ids.has(b.cardId));
    d._version = SCHEMA_VERSION;
    return d;
  } catch {
    showError('Data was corrupted. Starting fresh.');
    return defaultData();
  }
}

function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    return true;
  } catch (e) {
    if (e.name === 'QuotaExceededError' || e.code === 22) {
      showError('Storage full. Delete some accounts to free space.');
    } else {
      showError('Failed to save: ' + (e.message || 'Unknown error'));
    }
    return false;
  }
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  if (el) { el.textContent = msg; el.classList.add('visible'); setTimeout(() => el.classList.remove('visible'), 6000); }
}

function genId() {
  try { return crypto.randomUUID(); }
  catch { return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10); }
}

function fmt(n) { return Number(n).toLocaleString(); }

function timeAgo(d) {
  if (!d) return '';
  const days = Math.floor((Date.now() - new Date(d).getTime()) / 86400000);
  if (days < 0) return 'just now';
  if (days === 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days < 7) return days + 'd ago';
  if (days < 30) return Math.floor(days / 7) + 'w ago';
  return Math.floor(days / 30) + 'mo ago';
}

function daysUntil(d) {
  if (!d) return Infinity;
  return Math.ceil((new Date(d).getTime() - Date.now()) / 86400000);
}

function typeIcon(t) {
  return { airline: '✈️', hotel: '🏨', credit_card: '💳', other: '📦' }[t] || '📦';
}

/* === TABS === */

function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  document.querySelector(`nav button[data-tab="${tab}"]`).classList.add('active');
  render();
}

/* === RENDER === */

function renderDashboard() {
  const data = loadData();
  const { accounts, benefits } = data;

  // Hero
  const heroEl = document.getElementById('hero-card');
  const total = accounts.reduce((sum, a) => sum + (Number(a.balance) || 0), 0);
  heroEl.innerHTML = `<div class="hero animate-in">
    <div class="label">Total Rewards</div>
    <div class="value">${fmt(total)}</div>
    <div class="subtitle">${accounts.length} account${accounts.length !== 1 ? 's' : ''} · ${benefits.length} benefit${benefits.length !== 1 ? 's' : ''}</div>
  </div>`;

  // Category pills
  const pillsEl = document.getElementById('category-pills');
  pillsEl.innerHTML = '';
  const cats = [
    { key: 'airline', label: 'Airlines', icon: '✈️', color: 'var(--airline-color)' },
    { key: 'hotel', label: 'Hotels', icon: '🏨', color: 'var(--hotel-color)' },
    { key: 'credit_card', label: 'Cards', icon: '💳', color: 'var(--card-color)' },
    { key: 'other', label: 'Other', icon: '📦', color: 'var(--other-color)' }
  ];

  cats.forEach((c, i) => {
    const bal = accounts.filter(a => a.type === c.key).reduce((s, a) => s + (Number(a.balance) || 0), 0);
    if (bal > 0) {
      const pill = document.createElement('div');
      pill.className = 'category-pill animate-in';
      pill.style.animationDelay = (i * 60) + 'ms';
      pill.innerHTML = `<div class="pill-icon">${c.icon}</div><div class="pill-label">${c.label}</div><div class="pill-value" style="color:${c.color}">${fmt(bal)}</div>`;
      pillsEl.appendChild(pill);
    }
  });

  // Recent accounts
  const listEl = document.getElementById('dashboard-list');
  listEl.innerHTML = '';

  if (accounts.length === 0) {
    listEl.innerHTML = `<div class="empty-state animate-in">
      <div class="emoji">🗺️</div>
      <h3>Your journey starts here</h3>
      <p>Add your first rewards account and watch<br>your points come together in one place.</p>
    </div>`;
    return;
  }

  const sorted = [...accounts].sort((a, b) => (b.balance || 0) - (a.balance || 0));
  sorted.forEach((a, i) => {
    const card = document.createElement('div');
    card.className = 'card animate-in';
    card.style.animationDelay = (i * 60) + 'ms';

    const isStale = a.lastUpdated && daysUntil(a.lastUpdated) < -30;

    const programSpan = document.createElement('span');
    programSpan.textContent = a.program;

    const header = document.createElement('div');
    header.className = 'card-header';
    const left = document.createElement('div');
    left.className = 'card-program';
    const dot = document.createElement('span');
    dot.className = 'type-dot ' + a.type;
    left.appendChild(dot);
    left.appendChild(programSpan);
    const right = document.createElement('span');
    right.className = 'type-label';
    right.textContent = a.type.replace('_', ' ');
    header.appendChild(left);
    header.appendChild(right);

    const balDiv = document.createElement('div');
    balDiv.className = 'card-balance';
    balDiv.textContent = fmt(a.balance);
    const currSpan = document.createElement('span');
    currSpan.className = 'card-currency';
    currSpan.textContent = a.currency || 'points';
    balDiv.appendChild(currSpan);

    const meta = document.createElement('div');
    meta.className = 'card-meta';
    const metaText = document.createElement('span');
    metaText.textContent = (a.accountNumber ? a.accountNumber + ' · ' : '') + 'Updated ' + timeAgo(a.lastUpdated);
    meta.appendChild(metaText);
    if (isStale) {
      const badge = document.createElement('span');
      badge.className = 'stale-badge';
      badge.textContent = 'STALE';
      meta.appendChild(badge);
    }

    card.appendChild(header);
    card.appendChild(balDiv);
    card.appendChild(meta);
    listEl.appendChild(card);
  });
}

function renderAccounts() {
  const data = loadData();
  const listEl = document.getElementById('accounts-list');
  listEl.innerHTML = '';

  if (data.accounts.length === 0) {
    listEl.innerHTML = `<div class="empty-state animate-in">
      <div class="emoji">✨</div>
      <h3>No accounts yet</h3>
      <p>Add your airline miles, hotel points,<br>and credit card rewards.</p>
    </div>`;
    return;
  }

  data.accounts.forEach((a, i) => {
    const card = document.createElement('div');
    card.className = 'card animate-in';
    card.style.animationDelay = (i * 50) + 'ms';

    const header = document.createElement('div');
    header.className = 'card-header';
    const prog = document.createElement('div');
    prog.className = 'card-program';
    prog.textContent = typeIcon(a.type) + ' ' + a.program;
    const label = document.createElement('span');
    label.className = 'type-label';
    label.textContent = a.type.replace('_', ' ');
    header.appendChild(prog);
    header.appendChild(label);

    const bal = document.createElement('div');
    bal.className = 'card-balance';
    bal.textContent = fmt(a.balance) + ' ' + (a.currency || 'points');

    const meta = document.createElement('div');
    meta.className = 'card-meta';
    const parts = [];
    if (a.accountNumber) parts.push(a.accountNumber);
    parts.push('Updated ' + timeAgo(a.lastUpdated));
    meta.textContent = parts.join(' · ');

    card.appendChild(header);
    card.appendChild(bal);
    card.appendChild(meta);

    if (a.notes) {
      const notes = document.createElement('div');
      notes.className = 'card-meta';
      notes.textContent = a.notes;
      card.appendChild(notes);
    }

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const editBtn = document.createElement('button');
    editBtn.className = 'btn btn-ghost';
    editBtn.textContent = 'Edit';
    editBtn.onclick = () => openAccountModal(a.id);
    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-danger';
    delBtn.textContent = 'Delete';
    delBtn.onclick = () => deleteAccount(a.id);
    actions.appendChild(editBtn);
    actions.appendChild(delBtn);
    card.appendChild(actions);
    listEl.appendChild(card);
  });
}

function renderBenefits() {
  const data = loadData();
  const listEl = document.getElementById('benefits-list');
  listEl.innerHTML = '';

  if (data.benefits.length === 0) {
    listEl.innerHTML = `<div class="empty-state animate-in">
      <div class="emoji">🎁</div>
      <h3>No benefits tracked</h3>
      <p>Don't let card perks go to waste.<br>Track lounge access, credits, and more.</p>
    </div>`;
    return;
  }

  const acctMap = {};
  data.accounts.forEach(a => { acctMap[a.id] = a.program; });

  // Sort: urgent first, then unused, then used
  const sorted = [...data.benefits].sort((a, b) => {
    if (a.used !== b.used) return a.used ? 1 : -1;
    return daysUntil(a.renewalDate) - daysUntil(b.renewalDate);
  });

  sorted.forEach((b, i) => {
    const card = document.createElement('div');
    card.className = 'card animate-in';
    card.style.animationDelay = (i * 50) + 'ms';

    const header = document.createElement('div');
    header.className = 'card-header';
    const title = document.createElement('div');
    title.className = 'card-program';
    title.textContent = b.name;

    // Urgency badge
    const days = daysUntil(b.renewalDate);
    let urgClass, urgText;
    if (b.used) { urgClass = 'urgency-used'; urgText = '✓ Used'; }
    else if (days < 0) { urgClass = 'urgency-gray'; urgText = 'Expired'; }
    else if (days <= 7) { urgClass = 'urgency-red'; urgText = days + 'd left'; }
    else if (days <= 30) { urgClass = 'urgency-yellow'; urgText = days + 'd left'; }
    else if (days < Infinity) { urgClass = 'urgency-green'; urgText = days + 'd left'; }
    else { urgClass = 'urgency-green'; urgText = 'Active'; }

    const badge = document.createElement('span');
    badge.className = 'benefit-urgency ' + urgClass;
    badge.textContent = urgText;
    header.appendChild(title);
    header.appendChild(badge);

    const meta = document.createElement('div');
    meta.className = 'card-meta';
    const parts = [];
    if (b.value) parts.push(b.value);
    if (b.renewalDate) parts.push('Renews ' + new Date(b.renewalDate).toLocaleDateString());
    meta.textContent = parts.join(' · ');

    const linked = document.createElement('div');
    linked.className = 'benefit-linked';
    linked.textContent = acctMap[b.cardId] ? '🔗 ' + acctMap[b.cardId] : '';

    card.appendChild(header);
    card.appendChild(meta);
    card.appendChild(linked);

    if (b.notes) {
      const notes = document.createElement('div');
      notes.className = 'card-meta';
      notes.textContent = b.notes;
      card.appendChild(notes);
    }

    const actions = document.createElement('div');
    actions.className = 'card-actions';

    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'btn btn-ghost';
    toggleBtn.textContent = b.used ? 'Mark Unused' : '✓ Mark Used';
    toggleBtn.onclick = () => toggleUsed(b.id);

    const editBtn = document.createElement('button');
    editBtn.className = 'btn btn-ghost';
    editBtn.textContent = 'Edit';
    editBtn.onclick = () => openBenefitModal(b.id);

    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-danger';
    delBtn.textContent = 'Delete';
    delBtn.onclick = () => deleteBenefit(b.id);

    actions.appendChild(toggleBtn);
    actions.appendChild(editBtn);
    actions.appendChild(delBtn);
    card.appendChild(actions);
    listEl.appendChild(card);
  });
}

function render() { renderDashboard(); renderAccounts(); renderBenefits(); }

/* === MODALS === */

function openAccountModal(id) {
  const form = document.getElementById('account-form');
  form.reset();
  document.getElementById('account-id').value = '';
  if (id) {
    const a = loadData().accounts.find(x => x.id === id);
    if (a) {
      document.getElementById('account-modal-title').textContent = 'Edit Account';
      document.getElementById('account-id').value = a.id;
      document.getElementById('account-program').value = a.program;
      document.getElementById('account-type').value = a.type;
      document.getElementById('account-number').value = a.accountNumber || '';
      document.getElementById('account-balance').value = a.balance;
      document.getElementById('account-currency').value = a.currency || 'points';
      document.getElementById('account-notes').value = a.notes || '';
    }
  } else {
    document.getElementById('account-modal-title').textContent = 'Add Account';
  }
  document.getElementById('account-modal').classList.add('active');
}

function openBenefitModal(id) {
  const form = document.getElementById('benefit-form');
  form.reset();
  document.getElementById('benefit-id').value = '';
  const data = loadData();
  const sel = document.getElementById('benefit-card');
  sel.innerHTML = '';
  if (data.accounts.length === 0) {
    const opt = document.createElement('option');
    opt.textContent = 'Add an account first';
    opt.disabled = true;
    sel.appendChild(opt);
  } else {
    data.accounts.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.id;
      opt.textContent = typeIcon(a.type) + ' ' + a.program;
      sel.appendChild(opt);
    });
  }
  if (id) {
    const b = data.benefits.find(x => x.id === id);
    if (b) {
      document.getElementById('benefit-modal-title').textContent = 'Edit Benefit';
      document.getElementById('benefit-id').value = b.id;
      document.getElementById('benefit-card').value = b.cardId;
      document.getElementById('benefit-name').value = b.name;
      document.getElementById('benefit-value').value = b.value || '';
      document.getElementById('benefit-renewal').value = b.renewalDate || '';
      document.getElementById('benefit-used').value = String(b.used);
      document.getElementById('benefit-notes').value = b.notes || '';
    }
  } else {
    document.getElementById('benefit-modal-title').textContent = 'Add Benefit';
  }
  document.getElementById('benefit-modal').classList.add('active');
}

function closeModal(e, id) { if (e.target === e.currentTarget) document.getElementById(id).classList.remove('active'); }
function closeModalById(id) { document.getElementById(id).classList.remove('active'); }

/* === CRUD === */

function saveAccount(e) {
  e.preventDefault();
  const program = document.getElementById('account-program').value.trim();
  const balanceRaw = document.getElementById('account-balance').value;
  const balance = Number(balanceRaw);
  if (!program) { showError('Program name is required.'); return; }
  if (!balanceRaw || isNaN(balance) || !Number.isFinite(balance) || balance < 0) { showError('Balance must be a non-negative number.'); return; }

  const data = loadData();
  const id = document.getElementById('account-id').value;
  const acct = {
    id: id || genId(),
    type: document.getElementById('account-type').value,
    program,
    accountNumber: document.getElementById('account-number').value.trim(),
    balance,
    currency: document.getElementById('account-currency').value,
    lastUpdated: new Date().toISOString().split('T')[0],
    notes: document.getElementById('account-notes').value.trim()
  };

  if (id) {
    const idx = data.accounts.findIndex(a => a.id === id);
    if (idx !== -1) data.accounts[idx] = acct;
  } else {
    data.accounts.push(acct);
  }
  saveData(data);
  closeModalById('account-modal');
  render();
}

function deleteAccount(id) {
  const data = loadData();
  const linked = data.benefits.filter(b => b.cardId === id).length;
  if (!confirm(linked ? `Delete account and ${linked} linked benefit(s)?` : 'Delete this account?')) return;
  data.accounts = data.accounts.filter(a => a.id !== id);
  data.benefits = data.benefits.filter(b => b.cardId !== id);
  saveData(data);
  render();
}

function saveBenefit(e) {
  e.preventDefault();
  const name = document.getElementById('benefit-name').value.trim();
  const cardId = document.getElementById('benefit-card').value;
  if (!name || !cardId) return;

  const data = loadData();
  const id = document.getElementById('benefit-id').value;
  const ben = {
    id: id || genId(),
    cardId,
    name,
    value: document.getElementById('benefit-value').value.trim(),
    renewalDate: document.getElementById('benefit-renewal').value || '',
    used: document.getElementById('benefit-used').value === 'true',
    notes: document.getElementById('benefit-notes').value.trim()
  };

  if (id) {
    const idx = data.benefits.findIndex(b => b.id === id);
    if (idx !== -1) data.benefits[idx] = ben;
  } else {
    data.benefits.push(ben);
  }
  saveData(data);
  closeModalById('benefit-modal');
  render();
}

function deleteBenefit(id) {
  if (!confirm('Delete this benefit?')) return;
  const data = loadData();
  data.benefits = data.benefits.filter(b => b.id !== id);
  saveData(data);
  render();
}

function toggleUsed(id) {
  const data = loadData();
  const b = data.benefits.find(x => x.id === id);
  if (b) { b.used = !b.used; saveData(data); render(); }
}

/* === INIT === */
render();
</script>
</body>
</html>
