<html lang="en" style="color-scheme:light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Churn — Trip Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600;1,9..144,700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
*:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

html { background: var(--bg); }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
}

@keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
}

.container { width: min(1060px, calc(100vw - 40px)); margin: 0 auto; }
.app-nav {
  position: relative;
  z-index: 40;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.app-nav-inner {
  width: min(1060px, calc(100vw - 40px));
  margin: 0 auto;
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.nav-brand {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text);
}
.nav-links {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 500;
  border-radius: 6px;
  transition: color 120ms ease, background 120ms ease;
  min-height: 44px;
  display: flex;
  align-items: center;
}
.nav-links a:hover { color: var(--text); }
.nav-links a.active {
  color: var(--text);
  background: var(--nav-active-bg);
  font-weight: 600;
}
.nav-end {
  display: flex;
  gap: 4px;
  margin-left: 8px;
}
.theme-toggle-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  cursor: pointer;
  padding: 6px 10px;
  font-size: 14px;
  line-height: 1;
  transition: color 120ms ease, border-color 120ms ease;
}
.theme-toggle-btn:hover { color: var(--text); border-color: var(--accent); }
[data-theme="dark"] .eyebrow,
[data-theme="dark"] .section-label { color: #C4841D; }
[data-theme="dark"] .btn-primary { background: #A47214; }
[data-theme="dark"] .btn-primary:hover { background: #B8860B; }

/* ── Page Header ─────────────────────────────── */
.page-header {
  padding: 40px 0 20px;
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: flex-end;
}
.eyebrow {
  color: var(--accent);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.page-header h1 {
  font-family: var(--font-display);
  font-size: 32px;
  line-height: 1.15;
  letter-spacing: -0.01em;
  margin-top: 8px;
  color: var(--text);
}
.page-header .subtitle {
  font-size: 15px;
  color: var(--text-muted);
  margin-top: 8px;
}

/* ── Search & Filters ────────────────────────── */
.search-filters {
  margin-bottom: 24px;
}
.search-input {
  width: 100%;
  padding: 12px 16px 12px 40px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  transition: border-color 150ms ease;
}
.search-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px var(--accent-glow); }
.search-input::placeholder { color: var(--text-dim); }
.search-wrap {
  position: relative;
  margin-bottom: 12px;
}
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  pointer-events: none;
}
.filter-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.filter-pill {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 9999px;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 120ms ease;
  min-height: 44px;
  display: flex;
  align-items: center;
}
.filter-pill:hover { border-color: var(--accent); color: var(--text); }
.filter-pill.active {
  background: var(--accent-glow);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}
.filter-separator {
  width: 1px;
  background: var(--border);
  margin: 4px 4px;
  align-self: stretch;
}

/* ── Trip Sections ───────────────────────────── */
.trip-section {
  margin-bottom: 32px;
  animation: fadeInUp 0.4s ease both;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  cursor: pointer;
  user-select: none;
}
.section-indicator {
  width: 3px;
  height: 28px;
  border-radius: 2px;
  flex-shrink: 0;
}
.section-indicator.book-now { background: var(--success); }
.section-indicator.almost-there { background: #C4841D; }
.section-indicator.not-enough { background: var(--border-strong); }
.section-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
}
.section-count {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}
.section-chevron {
  margin-left: auto;
  color: var(--text-dim);
  transition: transform 200ms ease;
  font-size: 14px;
}
.section-header.collapsed .section-chevron { transform: rotate(-90deg); }
.trip-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.trip-list.hidden { display: none; }

/* ── Trip Cards ──────────────────────────────── */
.trip-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  box-shadow: var(--panel-shadow);
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: start;
  animation: slideUp 0.3s ease both;
  position: relative;
  border-left: 3px solid transparent;
}
.trip-card.book-now { border-left-color: var(--success); }
.trip-card.almost-there { border-left-color: #C4841D; }
.trip-card.not-enough { border-left-color: var(--border-strong); opacity: 0.65; }

.trip-type-icon {
  font-size: 14px;
  margin-right: 6px;
}
.trip-destination {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  font-style: italic;
  color: var(--text);
  line-height: 1.2;
}
.trip-route {
  font-size: 14px;
  color: var(--text-muted);
  margin-top: 2px;
}
.trip-cabin {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 9999px;
  background: var(--accent-glow);
  color: var(--accent);
  margin-top: 6px;
}

/* Transfer path receipt */
.transfer-path {
  margin-top: 12px;
  padding: 12px 16px;
  background: var(--surface-2);
  border-radius: var(--radius-sm);
  font-size: 13px;
}
.transfer-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 3px 0;
}
.transfer-label {
  font-family: var(--font-body);
  font-weight: 500;
  color: var(--text-muted);
}
.transfer-value {
  font-family: var(--font-mono);
  font-weight: 500;
  color: var(--text);
  font-size: 13px;
}
.transfer-note {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 6px;
}

/* Points summary (right side) */
.trip-points {
  text-align: right;
  min-width: 120px;
}
.trip-points-value {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
}
.trip-points-label {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}
.trip-cpp {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--accent);
  margin-top: 8px;
  font-weight: 500;
}
.trip-cash {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}
.trip-caveat {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 8px;
  grid-column: 1 / -1;
  line-height: 1.4;
}

/* Progress bar for Almost There */
.progress-wrap {
  margin-top: 10px;
}
.progress-label {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 9999px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: #C4841D;
  border-radius: 9999px;
  transition: width 0.4s ease;
}

/* Buttons — match index.html */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border-radius: 8px;
  border: 1px solid transparent;
  padding: 11px 16px;
  font-size: 14px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--surface); border-color: var(--border); color: var(--text); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

/* Empty state — match index.html dashed-border card */
.empty-state {
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 28px;
  text-align: center;
  color: var(--text-muted);
}
.empty-state strong { color: var(--text); display: block; margin-bottom: 6px; }
.empty-state .btn { margin-top: 14px; }
.empty-state a {
  color: var(--accent);
  text-decoration: underline;
}
.empty-section-msg {
  font-size: 14px;
  color: var(--text-dim);
  padding: 8px 0;
}

/* ── Responsive ──────────────────────────────── */
@media (max-width: 600px) {
  .container, .app-nav-inner { width: calc(100vw - 24px); }
  .trip-card {
    grid-template-columns: 1fr;
    padding: 16px 20px;
  }
  .trip-points {
    text-align: left;
    min-width: unset;
  }
  .nav-links { gap: 2px; }
  .nav-links a { padding: 8px 8px; font-size: 12px; }
  .page-header h1 { font-size: 26px; }
}
</style>

<nav class="app-nav">

      <a href="index.html#accounts">Accounts</a>

    </div>

</nav>

<header class="container page-header" style="animation: fadeInUp 0.4s ease both;">
  <div>
    <div class="eyebrow">Redemption Atlas</div>
    <h1 id="page-title">Your Trips</h1>
    <p class="subtitle" id="page-subtitle">See what your points can unlock.</p>
  </div>
</header>

<main class="container" style="padding-bottom: 64px;">
  <div class="search-filters">
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" class="search-input" id="search-input" placeholder="Search destinations, programs, cabins...">
    </div>

      <button class="filter-pill active" data-filter="all">All</button>

      <div class="filter-separator"></div>
      <button class="filter-pill" data-filter="asia">Asia</button>
      <button class="filter-pill" data-filter="europe">Europe</button>
      <button class="filter-pill" data-filter="hawaii">Hawaii</button>
      <button class="filter-pill" data-filter="caribbean">Caribbean</button>
      <button class="filter-pill" data-filter="south-pacific">South Pacific</button>
      <button class="filter-pill" data-filter="domestic-us">US Domestic</button>
    </div>
  </div>

  <div id="trips-content">
    <div class="empty-state">
      <p>Loading trip data...</p>
    </div>
  </div>
</main>

<script src="programs.js"></script>
<script>
/* ══════════════════════════════════════════════════
   RESOLVER ENGINE
   Connects localStorage accounts → transfer paths → sweet spots → tri-state
   ══════════════════════════════════════════════════ */

/**
 * Parse a transfer ratio string into a numeric multiplier.
 * "1:1" → 1, "1:2" → 2, "3:1" → 1/3
 * Coupling note: ratio format is defined in programs.js transferPartners[].ratio
 */
function parseRatio(ratioStr) {
  if (!ratioStr || typeof ratioStr !== 'string') return 1;
  var parts = ratioStr.split(':');
  if (parts.length !== 2) return 1;
  var from = parseFloat(parts[0]);
  var to = parseFloat(parts[1]);
  if (!from || !to || isNaN(from) || isNaN(to)) return 1;
  return to / from;
}

/**
 * Find all transfer paths from a user's accounts to a target program.
 * Returns array of { account, ratio, available, isDirect, sourceName }
 */
function findPaths(accounts, programs, targetProgram) {
  var paths = [];
  for (var i = 0; i < accounts.length; i++) {
    var acct = accounts[i];
    var balance = Number(acct.balance) || 0;
    if (balance <= 0) continue;

    // Direct match: account IS the target program (airline/hotel direct balance)
    if (acct.program === targetProgram) {
      paths.push({
        account: acct,
        ratio: 1,
        available: balance,
        isDirect: true,
        sourceName: acct.program
      });
      continue;
    }

    // Transfer path: flexible currency → transfer partner
    if (acct.type === 'flexible') {
      var prog = programs[acct.program];
      if (!prog || !prog.transferPartners) continue;
      for (var j = 0; j < prog.transferPartners.length; j++) {
        var tp = prog.transferPartners[j];
        // Coupling note: tp.partner is a display name string from programs.js
        // that must match sweetSpots.json program field exactly
        if (tp.partner === targetProgram) {
          var ratio = parseRatio(tp.ratio);
          paths.push({
            account: acct,
            ratio: ratio,
            available: Math.floor(balance * ratio),
            isDirect: false,
            sourceName: acct.program,
            transferRatio: tp.ratio
          });
        }
      }
    }
  }
  return paths;
}

/**
 * Main resolver: categorize sweet spots into Book Now / Almost There / Not Enough.
 *
 * @param {Array} accounts - from localStorage churn_data
 * @param {Object} programs - from window.PROGRAMS.programs
 * @param {Object} sweetSpots - parsed sweetSpots.json { flights: [], hotels: [] }
 * @returns {{ bookNow: [], almostThere: [], notEnough: [] }}
 */
function resolveTrips(accounts, programs, sweetSpots) {
  var allSpots = [];

  // Combine flights and hotels with a type tag
  (sweetSpots.flights || []).forEach(function (s) {
    allSpots.push(Object.assign({ _type: 'flight' }, s));
  });
  (sweetSpots.hotels || []).forEach(function (s) {
    allSpots.push(Object.assign({ _type: 'hotel' }, s));
  });

  var bookNow = [];
  var almostThere = [];
  var notEnough = [];

  for (var i = 0; i < allSpots.length; i++) {
    var spot = allSpots[i];
    var needed = spot.points_required;
    var paths = findPaths(accounts, programs, spot.program);

    // Pick best path: most available points
    var bestPath = null;
    for (var j = 0; j < paths.length; j++) {
      if (!bestPath || paths[j].available > bestPath.available) {
        bestPath = paths[j];
      }
    }

    var available = bestPath ? bestPath.available : 0;
    var gap = needed - available;
    var pct = needed > 0 ? available / needed : 0;

    var result = {
      spot: spot,
      bestPath: bestPath,
      available: available,
      needed: needed,
      gap: gap,
      pct: pct
    };

    if (gap <= 0) {
      bookNow.push(result);
    } else if (gap <= needed * 0.3) {
      almostThere.push(result);
    } else {
      notEnough.push(result);
    }
  }

  // Sort each category by cpp_estimate descending
  var byCpp = function (a, b) { return (b.spot.cpp_estimate || 0) - (a.spot.cpp_estimate || 0); };
  bookNow.sort(byCpp);
  almostThere.sort(byCpp);
  notEnough.sort(byCpp);

  return { bookNow: bookNow, almostThere: almostThere, notEnough: notEnough };
}

/* ══════════════════════════════════════════════════
   DATA LOADING
   ══════════════════════════════════════════════════ */

function loadAccounts() {
  try {
    var raw = localStorage.getItem('churn_data');
    if (!raw) {
      // Try legacy key
      raw = localStorage.getItem('osaka_data');
    }
    if (!raw) return [];
    var data = JSON.parse(raw);
    return (data && data.accounts) ? data.accounts : [];
  } catch (e) {
    return [];
  }
}

/* ══════════════════════════════════════════════════
   RENDERING
   ══════════════════════════════════════════════════ */

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatNumber(n) {
  if (n == null) return '0';
  return Number(n).toLocaleString();
}

function renderTripCard(result, status) {
  var spot = result.spot;
  var isHotel = spot._type === 'hotel';
  var icon = isHotel ? '&#127976;' : '&#9992;';

  var cabinOrCategory = '';
  if (!isHotel && spot.cabin) {
    cabinOrCategory = '<span class="trip-cabin">' + spot.cabin + '</span>';
  } else if (isHotel && spot.category) {
    cabinOrCategory = '<span class="trip-cabin">Cat ' + spot.category + '</span>';
  }
  if (isHotel && spot.nights) {
    cabinOrCategory += '<span class="trip-cabin" style="margin-left:4px;">' + spot.nights + ' nights</span>';
  }

  // Transfer path receipt
  var transferHtml = '';
  if (result.bestPath) {
    var rows = '';
    if (!result.bestPath.isDirect) {
      rows += '<div class="transfer-row"><span class="transfer-label">From</span><span class="transfer-value">' + esc(result.bestPath.sourceName) + '</span></div>';
      rows += '<div class="transfer-row"><span class="transfer-label">Transfer to</span><span class="transfer-value">' + esc(spot.program) + '</span></div>';
      rows += '<div class="transfer-row"><span class="transfer-label">Ratio</span><span class="transfer-value">' + esc(result.bestPath.transferRatio) + '</span></div>';
    } else {
      rows += '<div class="transfer-row"><span class="transfer-label">Program</span><span class="transfer-value">' + esc(spot.program) + '</span></div>';
    }
    rows += '<div class="transfer-row"><span class="transfer-label">Available</span><span class="transfer-value">' + formatNumber(result.available) + ' pts</span></div>';
    rows += '<div class="transfer-row"><span class="transfer-label">Required</span><span class="transfer-value">' + formatNumber(result.needed) + ' pts</span></div>';

    var note = '';
    if (status === 'book-now' && !result.bestPath.isDirect) {
      note = '<div class="transfer-note">Transfer required (1\u20135 business days)</div>';
    }

    transferHtml = '<div class="transfer-path">' + rows + note + '</div>';
  }

  // Progress bar for Almost There
  var progressHtml = '';
  if (status === 'almost-there') {
    var pctVal = Math.min(Math.round(result.pct * 100), 100);
    progressHtml = '<div class="progress-wrap">' +
      '<div class="progress-label">' + formatNumber(result.available) + ' / ' + formatNumber(result.needed) + ' pts</div>' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + pctVal + '%"></div></div>' +
      '</div>';
  }

  var cppHtml = spot.cpp_estimate ? '<div class="trip-cpp">' + spot.cpp_estimate.toFixed(1) + '\u00A2/pt</div>' : '';
  var cashHtml = spot.cash_value_estimate ? '<div class="trip-cash">~$' + formatNumber(spot.cash_value_estimate) + ' value</div>' : '';
  var caveatHtml = spot.caveat ? '<div class="trip-caveat">' + esc(spot.caveat) + '</div>' : '';

  return '<div class="trip-card ' + status + '" data-type="' + esc(spot._type) + '" data-region="' + esc(spot.region || '') + '" data-destination="' + esc((spot.destination || '').toLowerCase()) + '" data-program="' + esc((spot.program || '').toLowerCase()) + '" data-cabin="' + esc(spot.cabin || '') + '">' +
    '<div class="trip-info">' +
      '<div><span class="trip-type-icon">' + icon + '</span><span class="trip-destination">' + esc(spot.destination) + '</span></div>' +
      '<div class="trip-route">' + esc(spot.route || (isHotel ? spot.program : '')) + (spot.direction === 'round_trip' ? ' (RT)' : spot.direction === 'one_way' ? ' (OW)' : '') + '</div>' +
      cabinOrCategory +
      transferHtml +
      progressHtml +
    '</div>' +
    '<div class="trip-points">' +
      '<div class="trip-points-value">' + formatNumber(result.needed) + '</div>' +
      '<div class="trip-points-label">pts required</div>' +
      cppHtml +
      cashHtml +
    '</div>' +
    caveatHtml +
  '</div>';
}

function renderSection(title, results, status, defaultCollapsed) {
  if (results.length === 0) return '';

  var collapsed = defaultCollapsed ? ' collapsed' : '';
  var hidden = defaultCollapsed ? ' hidden' : '';
  var chevron = '\u25BC';

  var cardsHtml = '';
  for (var i = 0; i < results.length; i++) {
    cardsHtml += renderTripCard(results[i], status);
  }

  return '<div class="trip-section" data-section="' + status + '">' +
    '<div class="section-header' + collapsed + '" onclick="toggleSection(this)">' +
      '<div class="section-indicator ' + status + '"></div>' +
      '<span class="section-title">' + title + '</span>' +
      '<span class="section-count">' + results.length + ' trip' + (results.length !== 1 ? 's' : '') + '</span>' +
      '<span class="section-chevron">' + chevron + '</span>' +
    '</div>' +
    '<div class="trip-list' + hidden + '">' + cardsHtml + '</div>' +
  '</div>';
}

function renderTrips(resolved) {
  var content = document.getElementById('trips-content');

  var html = renderSection('Book Now', resolved.bookNow, 'book-now', false);
  html += renderSection('Almost There', resolved.almostThere, 'almost-there', false);
  html += renderSection('Not Enough', resolved.notEnough, 'not-enough', true);

  if (!html) {
    html = '<div class="empty-section-msg">No trips match your current filters.</div>';
  }

  content.innerHTML = html;
}

function renderEmptyState() {
  var content = document.getElementById('trips-content');
  content.innerHTML = '<div class="empty-state">' +
    '<strong>No accounts yet</strong>' +
    '<p>Add your first loyalty program in <a href="index.html">Churn</a> to see what trips your points unlock.</p>' +
    '<a href="index.html" class="btn btn-primary" style="margin-top:14px; text-decoration:none;">Add account</a>' +
    '</div>';
}

function renderErrorState() {
  var content = document.getElementById('trips-content');
  content.innerHTML = '<div class="empty-state">' +
    '<strong>Could not load trip data</strong>' +
    '<p>Please try refreshing the page.</p>' +
    '</div>';
}

/* ══════════════════════════════════════════════════
   SECTION TOGGLE
   ══════════════════════════════════════════════════ */

function toggleSection(header) {
  header.classList.toggle('collapsed');
  var list = header.nextElementSibling;
  if (list) list.classList.toggle('hidden');
}

/* ══════════════════════════════════════════════════
   FILTERING
   ══════════════════════════════════════════════════ */

var activeTypeFilter = 'all';
var activeRegionFilter = null;
var searchQuery = '';

function applyFilters() {
  var cards = document.querySelectorAll('.trip-card');
  var query = searchQuery.toLowerCase().trim();

  cards.forEach(function (card) {
    var type = card.getAttribute('data-type');
    var region = card.getAttribute('data-region');
    var dest = card.getAttribute('data-destination');
    var program = card.getAttribute('data-program');
    var cabin = card.getAttribute('data-cabin') || '';

    var typeMatch = activeTypeFilter === 'all' || type === activeTypeFilter;
    var regionMatch = !activeRegionFilter || region === activeRegionFilter;
    var searchMatch = !query ||
      dest.indexOf(query) !== -1 ||
      program.indexOf(query) !== -1 ||
      cabin.indexOf(query) !== -1 ||
      region.indexOf(query) !== -1;

    card.style.display = (typeMatch && regionMatch && searchMatch) ? '' : 'none';
  });

  // Update section visibility: hide sections with no visible cards
  document.querySelectorAll('.trip-section').forEach(function (section) {
    var visibleCards = section.querySelectorAll('.trip-card:not([style*="display: none"])');
    var list = section.querySelector('.trip-list');
    var emptyMsg = section.querySelector('.empty-section-msg');

    if (visibleCards.length === 0) {
      if (!emptyMsg && list) {
        var msg = document.createElement('div');
        msg.className = 'empty-section-msg';
        msg.textContent = 'No matching trips.';
        list.appendChild(msg);
      }
    } else if (emptyMsg) {
      emptyMsg.remove();
    }
  });
}

function bindFilters() {
  var pills = document.querySelectorAll('.filter-pill');
  var typeFilters = ['all', 'flight', 'hotel'];
  var regionFilters = ['asia', 'europe', 'hawaii', 'caribbean', 'south-pacific', 'domestic-us'];

  pills.forEach(function (pill) {
    pill.addEventListener('click', function () {
      var filter = pill.getAttribute('data-filter');

      if (typeFilters.indexOf(filter) !== -1) {
        // Type filter: exclusive within type group
        activeTypeFilter = filter;
        pills.forEach(function (p) {
          if (typeFilters.indexOf(p.getAttribute('data-filter')) !== -1) {
            p.classList.toggle('active', p.getAttribute('data-filter') === filter);
          }
        });
      } else if (regionFilters.indexOf(filter) !== -1) {
        // Region filter: toggle on/off
        if (activeRegionFilter === filter) {
          activeRegionFilter = null;
          pill.classList.remove('active');
        } else {
          // Deactivate other region pills
          pills.forEach(function (p) {
            if (regionFilters.indexOf(p.getAttribute('data-filter')) !== -1) {
              p.classList.remove('active');
            }
          });
          activeRegionFilter = filter;
          pill.classList.add('active');
        }
      }

      applyFilters();
    });
  });

  var searchInput = document.getElementById('search-input');
  searchInput.addEventListener('input', function () {
    searchQuery = searchInput.value;
    applyFilters();
  });
}

/* ══════════════════════════════════════════════════
   PAGE HEADER
   ══════════════════════════════════════════════════ */

function updatePageHeader(accounts) {
  var totalPoints = 0;
  for (var i = 0; i < accounts.length; i++) {
    totalPoints += Number(accounts[i].balance) || 0;
  }

  var title = document.getElementById('page-title');
  var subtitle = document.getElementById('page-subtitle');

  if (accounts.length > 0 && totalPoints > 0) {
    title.textContent = 'Your Trips';
    subtitle.textContent = 'What your ' + formatNumber(totalPoints) + ' pts unlock right now.';
  } else {
    title.textContent = 'Trip Planner';
    subtitle.textContent = 'See what your points can unlock.';
  }
}

/* ══════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════ */

// Expose resolver for testing
window.TripResolver = {
  parseRatio: parseRatio,
  findPaths: findPaths,
  resolveTrips: resolveTrips
};

var accounts = loadAccounts();
var programs = (window.PROGRAMS && window.PROGRAMS.programs) ? window.PROGRAMS.programs : {};

updatePageHeader(accounts);

if (accounts.length === 0) {
  renderEmptyState();
  bindFilters();
} else {
  fetch('./sweetSpots.json')
    .then(function (resp) {
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return resp.json();
    })
    .then(function (sweetSpots) {
      var resolved = resolveTrips(accounts, programs, sweetSpots);
      renderTrips(resolved);
      bindFilters();
    })
    .catch(function (err) {
      console.error('Failed to load sweet spots:', err);
      renderErrorState();
    });
}

/* ── Theme toggle ──────────────────────────────── */
(function () {
  var THEME_KEY = 'churn-theme';
  var html = document.documentElement;
  var btn = document.getElementById('theme-toggle');
  function applyTheme(theme) {
    if (theme === 'dark') {
      html.setAttribute('data-theme', 'dark');
      html.style.colorScheme = 'dark';
      if (btn) btn.textContent = '\u2600';
    } else {
      html.removeAttribute('data-theme');
      html.style.colorScheme = 'light';
      if (btn) btn.textContent = '\u263E';
    }
  }
  var saved = null;
  try { saved = localStorage.getItem(THEME_KEY); } catch (e) {}
  if (saved === 'dark' || saved === 'light') {
    applyTheme(saved);
  } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    applyTheme('dark');
  }
  if (btn) {
    btn.addEventListener('click', function () {
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      try { localStorage.setItem(THEME_KEY, next); } catch (e) {}
    });
  }
})();
</script>
